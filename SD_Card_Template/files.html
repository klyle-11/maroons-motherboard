<!DOCTYPE html>
<!-- Nomad Files Page (with menu dark-mode sync) -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Jcorp Nomad Media Server – Files" />
  <title>Nomad • Files</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <style>
    :root {
      --primary: #007bff;
      --primary-dark: #0056b3;
      --bg: #f4f4f9;
      --text: #333;
      --radius: 8px;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html,body{height:100%}
    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 0 0.5rem;
    }

    /* Dark mode overrides (applied by .dark class on body) */
    body.dark {
      background: #07121a;
      color: #e6eef8;
    }
    body.dark header { background: #052233; color: #e9f4ff; }
    body.dark .toolbar { background: #07121a; border-bottom-color: rgba(255,255,255,0.04); }
    body.dark .file-list li { background: #071827; box-shadow: 0 6px 18px rgba(0,0,0,0.35); color: #e6eef8; }
    body.dark .back-btn { background: #03314a; color: #e6eef8; }
    body.dark a { color: var(--primary); }
    body.dark .file-info { color: #9fb6cc; }

    header {
      background: var(--primary);
      color: #fff;
      padding: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 50;
      margin-left: -0.5rem;
      margin-right: -0.5rem;
      padding-left: calc(1rem + 0.5rem);
      padding-right: calc(1rem + 0.5rem);
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    header h1 { font-size: 1.5rem; white-space: nowrap; }
    .back-btn {
      color: #fff;
      text-decoration: none;
      background: var(--primary-dark);
      padding: 0.5rem 0.75rem;
      border-radius: var(--radius);
      white-space: nowrap;
    }

    .toolbar {
      background: var(--bg);
      padding: 0.75rem 1rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 56px;
      z-index: 45;
      justify-content: flex-end;
      margin-left: -0.5rem;
      margin-right: -0.5rem;
      padding-left: calc(1rem + 0.5rem);
      padding-right: calc(1rem + 0.5rem);
    }
    .toolbar input[type="search"] {
      flex: 1 1 200px;
      padding: 0.5rem 0.75rem;
      border: 1px solid #ccc;
      background: #fff;
      border-radius: var(--radius);
      font-size: 0.9rem;
      min-width: 0;
    }
    /* keep search visible / readable even in dark mode (JS also forces this) */
    body.dark .toolbar input[type="search"] { background: #fff; color: #000; }

    .toolbar select {
      padding: 0.5rem 0.75rem;
      border: 1px solid #ccc;
      background: #fff;
      border-radius: var(--radius);
      font-size: 0.9rem;
      min-width: 120px;
    }

    main {
      flex: 1;
      padding: 1rem;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }
    ul.file-list { list-style: none; padding: 0; margin: 0; }
    ul.file-list li {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 0.75rem 1rem;
      margin-bottom: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      word-break: break-word;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInUp 0.3s forwards;
    }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    ul.file-list li a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 60%;
      display: inline-block;
    }
    .file-info {
      font-size: 0.85rem;
      color: #555;
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 110px;
      text-align: right;
    }
    footer {
      padding: 1rem;
      text-align: center;
      font-size: 0.9rem;
      color: #666;
      margin-left: -0.5rem;
      margin-right: -0.5rem;
      padding-left: calc(1rem + 0.5rem);
      padding-right: calc(1rem + 0.5rem);
    }

    @media (max-width: 600px) {
      body { padding: 0 0.25rem; }
      header { flex-direction: column; align-items: flex-start; gap: 0.5rem; padding-left: calc(1rem + 0.25rem); padding-right: calc(1rem + 0.25rem); margin-left: -0.25rem; margin-right: -0.25rem; }
      header h1 { white-space: normal; font-size: 1.3rem; }
      .back-btn { width: 100%; text-align: center; white-space: normal; }
      .toolbar { flex-direction: column; align-items: stretch; justify-content: center; padding-left: calc(1rem + 0.25rem); padding-right: calc(1rem + 0.25rem); margin-left: -0.25rem; margin-right: -0.25rem; }
      .toolbar input[type="search"], .toolbar select { flex: none; width: 100%; min-width: auto; }
      main { padding: 0.75rem 0.5rem; width: 100%; }
      ul.file-list li { flex-direction: column; align-items: flex-start; gap: 0.5rem; padding: 0.5rem 0.75rem; }
      ul.file-list li a { max-width: 100%; white-space: normal; word-break: break-word; }
      .file-info { white-space: normal; width: 100%; text-align: left; min-width: auto; }
      footer { padding-left: calc(1rem + 0.25rem); padding-right: calc(1rem + 0.25rem); margin-left: -0.25rem; margin-right: -0.25rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Files</h1>
    <a class="back-btn" href="/menu">← Back to Menu</a>
  </header>

  <div class="toolbar">
    <input id="searchInput" type="search" placeholder="Search files…" aria-label="Search files" />
    <select id="typeFilter" aria-label="Filter by type">
      <option value="all">All</option>
      <option value="pdf">PDF</option>
      <option value="txt">TXT</option>
      <option value="zip">ZIP</option>
      <option value="mp3">MP3</option>
      <option value="mp4">MP4</option>
      <option value="html">HTML</option>
      <option value="stl">STL</option>
      <option value="png">PNG</option>
      <option value="jpg">JPG</option>
      <option value="exe">EXE</option>
      <option value="docx">DOCX</option>
      <option value="xlsx">XLSX</option>
      <option value="pptx">PPTX</option>
    </select>
    <select id="sortSelect" aria-label="Sort files">
      <option value="nameAsc">Name A→Z</option>
      <option value="nameDesc">Name Z→A</option>
      <option value="sizeAsc">Size ↑</option>
      <option value="sizeDesc">Size ↓</option>
      <option value="typeAsc">Type ↑</option>
      <option value="typeDesc">Type ↓</option>
    </select>
  </div>

  <main>
    <ul id="fileList" class="file-list"></ul>
  </main>

  <footer>© <span id="year"></span> Jcorp Nomad</footer>

  <script>
    /* ---------- THEME BOOT & SYNC ---------- */
    const THEME_KEY = 'nomad_dark_mode';
    function applyThemeFlag(dark){
      document.body.classList.toggle('dark', !!dark);
      // Keep search readable: force white background + black text for search inputs
      const search = document.querySelector('.toolbar input[type="search"]');
      if (search) { search.style.background = '#fff'; search.style.color = '#000'; }
    }
    // apply on load
    (function initThemeFromStorage(){
      try {
        const saved = localStorage.getItem(THEME_KEY);
        const isDark = (saved === 'true');
        applyThemeFlag(isDark);
      } catch (e) { applyThemeFlag(false); }
    })();
    // listen for theme changes in other tabs/pages (keeps pages in sync)
    window.addEventListener('storage', (ev) => {
      if (ev.key === THEME_KEY) {
        const dark = ev.newValue === 'true';
        applyThemeFlag(dark);
      }
    });

    /* ---------- page logic ---------- */
    document.getElementById('year').textContent = new Date().getFullYear();

    const fileListEl = document.getElementById('fileList');
    const searchInput = document.getElementById('searchInput');
    const sortSelect = document.getElementById('sortSelect');
    const typeFilter = document.getElementById('typeFilter');

    let files = [], filtered = [];

    function formatBytes(bytes) {
      if (!bytes && bytes !== 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(Math.max(bytes || 0, 1)) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    async function init() {
      try {
        // try NDJSON index; fallback to generic /media.json if NDJSON missing
        let text = null;
        try {
          const res = await fetch('/.system-index/Files.index.ndjson', {cache:'no-store', credentials:'same-origin'});
          if (!res.ok) throw new Error('ndjson fetch failed');
          text = await res.text();
        } catch (e) {
          // try a more generic path for index
          try {
            const res2 = await fetch('/Files.index.ndjson', {cache:'no-store', credentials:'same-origin'});
            if (res2.ok) text = await res2.text();
          } catch(e2){}
        }

        if (text && text.trim().length) {
          files = text.trim().split('\n')
            .map(line => {
              try { return JSON.parse(line); } catch (e) { return null; }
            })
            .filter(Boolean)
            .filter(obj => obj.t === 'f' || obj.t === 'f' /* ensure only files */)
            .map(obj => {
              const path = obj.p || (obj.n && obj.n.startsWith('/') ? obj.n : '/' + (obj.n || ''));
              const ext = (obj.n || '').split('.').pop().toLowerCase();
              return {
                name: obj.n || path.split('/').pop(),
                path: path,
                type: ext,
                size: obj.sz || obj.size || 0
              };
            });
        } else {
          // fallback: try media.json or /media.json
          try {
            const r = await fetch('/media.json', {cache:'no-store', credentials:'same-origin'});
            if (r.ok) {
              const j = await r.json();
              const raw = j.files || j.Files || [];
              files = raw.map(obj => {
                const p = obj.path || obj.file || obj.url || ('/' + (obj.name || ''));
                const name = obj.name || obj.title || p.split('/').pop();
                const ext = (name.split('.').pop() || '').toLowerCase();
                return { name, path: p, type: ext, size: obj.sz || obj.size || 0 };
              }).filter(Boolean);
            } else {
              throw new Error('no fallback data');
            }
          } catch (e) {
            console.error('No index available to build Files list', e);
            fileListEl.innerHTML = '<li>Error loading files.</li>';
            return;
          }
        }

        applyFilters();
      } catch (e) {
        console.error('Error loading NDJSON:', e);
        fileListEl.innerHTML = '<li>Error loading files.</li>';
      }
    }

    function applyFilters() {
      const term = (searchInput.value || '').trim().toLowerCase();
      const type = typeFilter.value;
      filtered = files.filter(f =>
        (term === '' || (f.name || '').toLowerCase().includes(term)) &&
        (type === 'all' || (f.type || '').toLowerCase() === type)
      );
      applySort();
    }

    function applySort() {
      const mode = sortSelect.value;
      filtered.sort((a, b) => {
        if (mode === 'nameAsc') return (a.name || '').localeCompare(b.name || '');
        if (mode === 'nameDesc') return (b.name || '').localeCompare(a.name || '');
        if (mode === 'sizeAsc') return (a.size || 0) - (b.size || 0);
        if (mode === 'sizeDesc') return (b.size || 0) - (a.size || 0);
        if (mode === 'typeAsc') return (a.type || '').localeCompare(b.type || '');
        if (mode === 'typeDesc') return (b.type || '').localeCompare(a.type || '');
        return 0;
      });
      render();
    }

    function render() {
      fileListEl.innerHTML = '';
      filtered.forEach((f, i) => {
        const li = document.createElement('li');
        li.style.animationDelay = `${i * 50}ms`;

        const link = document.createElement('a');
        // clicking a file in the menu triggers downloads. For direct clicks here:
        // set the href to the canonical path (server serves it) and let browser download
        link.href = f.path;
        link.download = f.name;
        link.textContent = f.name;
        link.title = f.name;

        const info = document.createElement('div');
        info.className = 'file-info';
        info.textContent = `${(f.type || '').toUpperCase()} • ${formatBytes(f.size || 0)}`;

        li.appendChild(link);
        li.appendChild(info);
        fileListEl.appendChild(li);
      });
    }

    searchInput.addEventListener('input', () => { clearTimeout(window.__debounce); window.__debounce = setTimeout(applyFilters, 150); });
    typeFilter.addEventListener('change', applyFilters);
    sortSelect.addEventListener('change', applySort);

    // Boot
    init();
  </script>
</body>
</html>

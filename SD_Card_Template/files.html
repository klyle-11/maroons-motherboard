<!DOCTYPE html>
<!-- Nomad Files Page -->
<!-- Version 2.3 -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Jcorp Nomad Media Server – Files" />
  <title>Nomad • Files</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="/master.css" />
  <script>
(function() {
  try {
    const isDark = localStorage.getItem('nomad_dark_mode') === 'true';
    if (isDark) document.documentElement.classList.add('dark');

    const saved = localStorage.getItem('nomad_custom_theme');
    if (saved) {
      const colors = JSON.parse(saved);
      const style = document.createElement('style');
      style.id = 'custom-theme-style';
      style.textContent = `
        :root {
          --primary: ${colors.primary} !important;
          --primary-dark: ${colors.primaryDark} !important;
          --bg: ${colors.bgLight} !important;
          --card: ${colors.cardLight} !important;
          --card-bg: ${colors.cardLight} !important;
          --text: ${colors.textLight} !important;
          --muted: ${colors.mutedLight} !important;
        }
        body.dark {
          --bg: ${colors.bgDark} !important;
          --card: ${colors.cardDark} !important;
          --card-bg: ${colors.cardDark} !important;
          --text: ${colors.textDark} !important;
          --muted: ${colors.mutedDark} !important;
          --primary: ${colors.primaryDarkTheme} !important;
        }
      `;
      document.head.appendChild(style);
    }
  } catch(e) {}
})();
</script>
  <script src="/theme-manager.js"></script>
  <style>
    /* Functional CSS: Full-height layout and sticky positioning */
    html, body { height: 100%; }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 0 0.5rem;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      margin-left: -0.5rem;
      margin-right: -0.5rem;
      padding-left: calc(1rem + 0.5rem);
      padding-right: calc(1rem + 0.5rem);
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .toolbar {
      padding: 0.75rem 1rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 56px;
      z-index: 45;
      justify-content: flex-end;
      margin-left: -0.5rem;
      margin-right: -0.5rem;
      padding-left: calc(1rem + 0.5rem);
      padding-right: calc(1rem + 0.5rem);
      background: var(--bg);
    }
    .toolbar input[type="search"] {
      flex: 1 1 200px;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      border-radius: var(--radius);
      font-size: 0.9rem;
      min-width: 0;
    }
    body.dark .toolbar input[type="search"] { background: var(--card); color: var(--text); }

    .toolbar select {
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      border-radius: var(--radius);
      font-size: 0.9rem;
      min-width: 120px;
    }

    main {
      flex: 1;
      padding: 1rem;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }

    ul.file-list { list-style: none; padding: 0; margin: 0; }
    ul.file-list li {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 0.75rem 1rem;
      margin-bottom: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      word-break: break-word;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInUp 0.3s forwards;
    }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    ul.file-list li a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 60%;
      display: inline-block;
    }
    .file-info {
      font-size: 0.85rem;
      color: var(--text-secondary);
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 110px;
      text-align: right;
    }

    @media (max-width: 600px) {
      body { padding: 0 0.25rem; }
      header { padding-left: calc(1rem + 0.25rem); padding-right: calc(1rem + 0.25rem); margin-left: -0.25rem; margin-right: -0.25rem; }
      .toolbar { flex-direction: column; align-items: stretch; justify-content: center; padding-left: calc(1rem + 0.25rem); padding-right: calc(1rem + 0.25rem); margin-left: -0.25rem; margin-right: -0.25rem; }
      .toolbar input[type="search"], .toolbar select { flex: none; width: 100%; min-width: auto; }
      main { padding: 0.75rem 0.5rem; width: 100%; }
      ul.file-list li { flex-direction: column; align-items: flex-start; gap: 0.5rem; padding: 0.5rem 0.75rem; }
      ul.file-list li a { max-width: 100%; white-space: normal; word-break: break-word; }
      .file-info { white-space: normal; width: 100%; text-align: left; min-width: auto; }
    }
    body.dark .back-btn { background: var(--white-alpha-12); color: var(--color-white); }
  </style>
</head>
<body data-page="files">
  <header>
    <h1>Files</h1>
    <a class="back-btn" href="/menu">← Back to Menu</a>
  </header>

  <div class="toolbar">
    <input id="searchInput" type="search" placeholder="Search files…" aria-label="Search files" />
    <select id="typeFilter" aria-label="Filter by type">
      <option value="all">All</option>
      <option value="pdf">PDF</option>
      <option value="txt">TXT</option>
      <option value="zip">ZIP</option>
      <option value="mp3">MP3</option>
      <option value="mp4">MP4</option>
      <option value="html">HTML</option>
      <option value="stl">STL</option>
      <option value="png">PNG</option>
      <option value="jpg">JPG</option>
      <option value="exe">EXE</option>
      <option value="docx">DOCX</option>
      <option value="xlsx">XLSX</option>
      <option value="pptx">PPTX</option>
    </select>
    <select id="sortSelect" aria-label="Sort files">
      <option value="nameAsc">Name A→Z</option>
      <option value="nameDesc">Name Z→A</option>
      <option value="sizeAsc">Size ↑</option>
      <option value="sizeDesc">Size ↓</option>
      <option value="typeAsc">Type ↑</option>
      <option value="typeDesc">Type ↓</option>
    </select>
  </div>

  <main>
    <ul id="fileList" class="file-list"></ul>
  </main>

<script>
    /* Config */
    const ROOT_PATH = '/Files';
    const INDEX_ENDPOINT = '/api/index';
    const DOWNLOAD_ENDPOINT = '/download';

    function fileUrl(path) {
      return `${DOWNLOAD_ENDPOINT}?file=${encodeURIComponent(path)}`;
    }
    /* State */
    const files = [];
    let filtered = [];

    function formatBytes(bytes) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function normalizePath(p) {
      return '/' + (p || '').replace(/^\/+/, '').replace(/\/+$/, '');
    }

    async function fetchIndex(path) {
      const INDEX_ENDPOINT = '/api/index';
      const url = `${INDEX_ENDPOINT}?path=${encodeURIComponent(normalizePath(path))}&_=${Date.now()}`;
      const res = await fetch(url, { cache: 'no-store' });

      if (res.status === 202) {
        throw new Error('INDEX_BUILDING');
      }

      if (!res.ok) throw new Error('index fetch failed ' + res.status);
      const text = await res.text();
      const lines = text.split('\n').filter(Boolean);
      const header = lines.length ? JSON.parse(lines[0]) : null;
      const entries = [];
      for (let i = 1; i < lines.length; i++) {
        try { entries.push(JSON.parse(lines[i])); } catch (e) { }
      }
      return { header, entries };
    }

    async function init() {
      try {
        const fileListEl = document.getElementById('fileList');
        fileListEl.innerHTML = '<li>Loading files...</li>';

        const resp = await fetchIndex('/Files');
        if (resp.entries && resp.entries.length > 0) {
          files.length = 0;
          files.push(...resp.entries
            .filter(Boolean)
            .filter(obj => obj.t === 'f')
            .map(obj => {
              const path = obj.n && obj.n.startsWith('/Files/') ? obj.n : `/Files/${(obj.n || '').replace(/^\/+/, '')}`;
              const ext = (obj.n || '').split('.').pop().toLowerCase();
              return {
                name: obj.n || path.split('/').pop(),
                path: path,
                type: ext,
                size: obj.sz || 0
              };
            })
          );
        } else {
          try {
            const r = await fetch('/media.json', { cache: 'no-store', credentials: 'same-origin' });
            if (r.ok) {
              const j = await r.json();
              const raw = j.files || j.Files || [];
              files.length = 0;
              files.push(...raw.map(obj => {
                const p = (obj.path || obj.file || obj.url || ('/' + (obj.name || ''))).startsWith('/Files/') ? (obj.path || obj.file || obj.url || ('/' + (obj.name || ''))) : `/Files/${((obj.path || obj.file || obj.url || ('/' + (obj.name || ''))).replace(/^\/+/, ''))}`;
                const name = obj.name || obj.title || p.split('/').pop();
                const ext = (name.split('.').pop() || '').toLowerCase();
                return { name, path: p, type: ext, size: obj.sz || obj.size || 0 };
              }).filter(Boolean));
            } else {
              throw new Error('no fallback data');
            }
          } catch (e) {
            console.error('No index available to build Files list', e);
            fileListEl.innerHTML = '<li>No files found. The index may be building.</li>';
            return;
          }
        }

        applyFilters();
      } catch (e) {
        if (e.message === 'INDEX_BUILDING') {
          document.getElementById('fileList').innerHTML = '<li>Index is building, please wait...</li>';
          setTimeout(init, 5000);
        } else {
          console.error('Error loading files:', e);
          document.getElementById('fileList').innerHTML = '<li>Error loading files.</li>';
        }
      }
    }

    function applyFilters() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const typeFilter = document.getElementById('typeFilter').value;
      const sortBy = document.getElementById('sortSelect').value;

      filtered = files.filter(file => {
        const matchesSearch = file.name.toLowerCase().includes(search);
        const matchesType = typeFilter === 'all' || file.type === typeFilter;
        return matchesSearch && matchesType;
      });

      filtered.sort((a, b) => {
        switch (sortBy) {
          case 'nameAsc': return a.name.localeCompare(b.name);
          case 'nameDesc': return b.name.localeCompare(a.name);
          case 'sizeAsc': return a.size - b.size;
          case 'sizeDesc': return b.size - a.size;
          case 'typeAsc': return a.type.localeCompare(b.type);
          case 'typeDesc': return b.type.localeCompare(a.type);
          default: return 0;
        }
      });

      renderFiles();
    }

    function renderFiles() {
      const fileListEl = document.getElementById('fileList');
      if (filtered.length === 0) {
        fileListEl.innerHTML = '<li>No files match your criteria.</li>';
        return;
      }

      fileListEl.innerHTML = filtered.map(file => `
        <li>
          <a href="${fileUrl(file.path)}" download="${file.name}">${file.name}</a>
          <div class="file-info">${formatBytes(file.size)} • ${file.type.toUpperCase()}</div>
        </li>
      `).join('');
    }

    document.addEventListener('DOMContentLoaded', () => {

      document.getElementById('searchInput').addEventListener('input', applyFilters);
      document.getElementById('typeFilter').addEventListener('change', applyFilters);
      document.getElementById('sortSelect').addEventListener('change', applyFilters);

      init();
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="description" content="Jcorp Nomad — Menu" />
<title>Jcorp Nomad</title>
<link rel="icon" href="/favicon.ico" />
<style>
  :root{
    --primary:#007bff;
    --primary-dark:#0056b3;
    --bg:#f4f4f9;
    --card:#ffffff;
    --muted:#6b7280;
    --text:#0b1220;
    --line:rgba(11,18,32,0.06);
    --radius:10px;
    --header-height:64px;
    --page-max:1400px; /* wider layout on desktop */
  }

  body.dark{
    --bg:#071226;
    --card:#071722;
    --muted:#93a9c6;
    --text:#eaf6ff;
    --line:rgba(255,255,255,0.04);
    --primary:#4aa3ff;
    --primary-dark:#2f84ff;
  }

  html,body{height:100%;margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
  body { display:flex; flex-direction:column; }
  a{color:inherit;text-decoration:none}

  /* full-page background layer to avoid mobile variable bleed / white gaps */
  .page-bg { position:fixed; inset:0; background:var(--bg); z-index:0; pointer-events:none; transition:background .18s linear; }

  /* Header */
  header {
    display:flex;
    align-items:center;
    gap:12px;
    justify-content:space-between;
    padding:10px 14px;
    border-bottom:1px solid var(--line);
    position:sticky; top:0;
    background:var(--primary);
    color:#fff;
    z-index:80;
    backdrop-filter: blur(6px);
    height:var(--header-height);
    box-sizing:border-box;
  }
  .brand { display:flex;align-items:center;gap:12px; min-width:0; }
  .logo { display:flex;align-items:center;justify-content:center;padding:4px;height:48px;min-width:48px;border-radius:10px;overflow:hidden;background:rgba(255,255,255,0.06);box-shadow:0 6px 18px rgba(0,0,0,0.06);flex-shrink:0; }
  .logo img{ display:block; max-height:40px; max-width:180px; object-fit:contain; pointer-events:none; user-select:none; }
  .title { font-weight:800; font-size:1.06rem; line-height:1; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .header-space { display:flex; align-items:center; gap:8px; margin-left:auto; }

  .icon-btn { width:44px;height:44px;border-radius:11px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.06);display:inline-grid;place-items:center;cursor:pointer;color:#fff; transition:transform .12s, box-shadow .12s, opacity .12s; font-size:16px; }
  .icon-btn:active{ transform:translateY(1px); }
  .admin-btn { width:38px;height:38px;border-radius:10px;border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.06); color:#fff; display:inline-grid; place-items:center; cursor:pointer; }

  /* Main layout */
  main{
    max-width:var(--page-max);
    margin:18px auto;
    padding:12px 20px;
    position:relative;
    display:flex;
    flex-direction:column;
    min-height: calc(100vh - var(--header-height) - 36px);
    box-sizing:border-box;
    z-index:1; /* above page-bg */
    align-items:center; /* center content horizontally */
  }
  .content-area { flex: 1 1 auto; display:flex; flex-direction:column; gap:12px; width:100%; align-items:center; }
  .welcome-center { text-align:center; margin-bottom:6px; width:100%; }
  .welcome-center h1 { margin:0; font-size:1.4rem; font-weight:900; letter-spacing:-0.3px; color:var(--text); }
  .welcome-center p { margin:6px 0 0; color:var(--muted); font-size:1rem; }

  /* Search row */
  .search-row { display:flex; flex-direction:column; align-items:center; gap:8px; margin:8px 0 14px; justify-content:center; width:100%; }
  .search-input {
    width:100%; max-width:980px; padding:14px 16px; border-radius:12px; border:1px solid var(--line);
    background:var(--card); color:var(--text); font-weight:600; font-size:1rem;
    box-shadow:0 10px 28px rgba(9,18,37,0.05);
  }
  .search-input::placeholder{ color: var(--muted); }

  /* loader under input for feedback */
  .search-loader { width:100%; max-width:980px; height:8px; border-radius:6px; overflow:hidden; background:linear-gradient(90deg, rgba(15,111,255,0.06), rgba(11,87,208,0.03)); display:none; }
  .search-loader .bar { position:relative; left:-40%; width:36%; height:100%; background:linear-gradient(90deg,var(--primary),var(--primary-dark)); animation: slide 1100ms linear infinite; }
  @keyframes slide { to { left:140%; } }

  /* tiles - use auto-fit grid so partial bottom rows are centered */
  .grid-wrap { margin-top:8px; padding:14px; border-radius:14px; border:1px solid var(--line); background:linear-gradient(180deg,transparent, rgba(0,0,0,0.01)); width:100%; box-sizing:border-box; }

    .grid {
      display:flex;
      flex-wrap:wrap;
      justify-content:center; /* center incomplete last row */
      gap:12px;
      max-width:760px;
      margin:12px auto 0;
      align-items:stretch;
    }

    @media (min-width:1100px){
      .grid { grid-template-columns: repeat(auto-fit, minmax(200px, 240px)); max-width:1200px; }
    }

    /* keep 2-up layout for medium screens, but make mobile use full width */
    @media (max-width:900px){
      .tile { flex: 0 0 calc(50% - 8px); max-width:360px; }
    }
    @media (max-width:480px){
      .tile { flex: 0 0 100%; max-width:none; }
    }
  .tile {
    /* keep visual style but allow flex sizing */
    background:var(--card);
    border-radius:10px;
    padding:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
    border:1px solid var(--line);
    cursor:pointer;
    transition:transform .12s, box-shadow .12s;
    min-height:60px;
    color:var(--text);

    /* sizing for desktop: three across ideally */
    flex: 0 0 calc(33.333% - 8px); /* 3 columns with gap compensation */
    max-width:260px;
    box-sizing:border-box;
  }
  .tile:active{ transform:translateY(1px); }
  .tile .label { font-size:1rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:0 6px; text-align:center; width:100%; }

  
  /* search results panel */
  #resultsPanel {
    position:absolute; left:50%; transform:translateX(-50%); top:150px; width: min(1200px, calc(100% - 36px)); z-index:220; display:none;
    background:var(--card); border-radius:12px; box-shadow:0 28px 70px rgba(2,6,23,0.16); border:1px solid var(--line); max-height:62vh; overflow:auto;
  }
  .result-row { display:flex; align-items:center; gap:14px; padding:12px 14px; border-bottom:1px solid var(--line); cursor:pointer; color:var(--text); }
  .result-row:last-child{ border-bottom:0; }
  .thumb { border-radius:8px; background:linear-gradient(180deg, rgba(0,0,0,0.03), transparent); display:grid; place-items:center; color:var(--muted); font-weight:700; overflow:hidden; flex:0 0 auto; }
  .thumb img{ display:block; width:100%; height:100%; object-fit:cover; }

  .thumb.rect { width:72px; height:108px; border-radius:8px; }
  .thumb.square { width:56px; height:56px; border-radius:8px; }

  .meta { display:flex; flex-direction:column; gap:6px; min-width:0; margin-right:8px; }
  .title { font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:48ch; color:var(--text); }
  .sub { color:var(--muted); font-size:0.95rem; }

  .result-path { margin-left:auto; font-weight:700; color:var(--muted); font-size:0.95rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:40ch; }

  /* Resume panel - fixed sizing and centered rows; never scroll */
  #resumePanel {
    margin-top:16px;
    max-width:760px;
    margin-left:auto;
    margin-right:auto;
    background:var(--card);
    border-radius:12px;
    border:1px solid var(--line);
    padding:12px;
    box-shadow:0 12px 30px rgba(2,6,23,0.06);
    text-align:center;
    overflow:visible; /* avoid internal scrollbars */
  }
  #resumePanel h3 { margin:0 0 8px; font-size:1rem; color:var(--text); }

  /* layout as two stacked rows (Movies, Shows). Center each row.
     Each row will contain up to 3 fixed-size items to avoid overflow/scroll. */
  .resume-list {
    display:flex;
    flex-direction:column;
    gap:14px;
    align-items:center;
    justify-content:center;
    max-width:720px;
    margin:0 auto;
  }

  .resume-section {
    display:flex;
    gap:12px;
    align-items:center;
    justify-content:center;
    flex-wrap:nowrap; /* fixed number of items, we slice in JS */
  }

  /* Fixed-size resume cards (desktop) */
  .resume-item {
    width:140px;
    height:200px;
    min-width:120px;
    border-radius:8px;
    overflow:hidden;
    position:relative;
    background:linear-gradient(180deg, rgba(0,0,0,0.03), transparent);
    border:1px solid var(--line);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    box-sizing:border-box;
  }
  .resume-thumb { width:100%; height:100%; display:block; position:relative; }
  .resume-thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .fallback-text { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:2; text-align:center; font-weight:700; color:var(--text); padding:8px; background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent); }
  .resume-overlay { position:absolute; left:50%; transform:translateX(-50%); bottom:8px; background:rgba(0,0,0,0.6); color:#fff; padding:6px 10px; border-radius:999px; font-weight:700; font-size:12px; z-index:4; min-width:40px; text-align:center; overflow:hidden; }
  .resume-overlay.small{ font-size:11px; padding:4px 8px; background:rgba(0,0,0,0.55); }
@media (max-width:640px){
  /* header tweaks */
  header { padding:8px 10px; }
  .logo { height:36px; min-width:36px; }
  .logo img{ max-height:28px; }

  /* Hide the textual title on small screens so buttons don't overlap it */
  .brand .title { display:none !important; }

  /* header buttons keep the larger touch size (from prior update) */
  .icon-btn {
    width:88px;        /* ~2x desktop width */
    height:48px;
    border-radius:10px;
    font-size:18px;
    padding:0 10px;
    justify-content:center;
    align-items:center;
    display:inline-flex;
    gap:6px;
  }
  .admin-btn {
    width:76px;
    height:44px;
    border-radius:10px;
    display:inline-flex;
    justify-content:center;
    align-items:center;
    padding:0 8px;
  }
  .header-space { gap:10px; }

  /* Make the tile container use more of the screen and stretch tiles full width */
  .grid { 
    max-width: calc(100% - 28px); /* allow the grid to span the viewport with small side margin */
    margin:12px 14px 0;
    justify-content:stretch;      /* let tiles fill the row */
    gap:12px;
  }

  /* Make tiles full-width on mobile so buttons are big and easy to tap */
  .tile {
    flex: 0 0 100%;
    max-width: none;
    min-height:70px;   /* slightly taller for touch */
    padding:16px;      /* more internal padding for the larger area */
    font-size:1.05rem; /* slightly larger label text */
    box-sizing:border-box;
  }

  /* Results/resume adjustments */
  .welcome-center h1 { font-size:1.06rem; }
  #resultsPanel { top:190px; left: 8px; transform:none; width: calc(100% - 16px); }
  .resume-list { flex-direction:row; gap:8px; align-items:center; justify-content:center; }
  .resume-section { flex-wrap:nowrap; }
  .resume-item { width:48%; height:auto; aspect-ratio:2/3; min-width:0; }
  .resume-overlay { font-size:11px; }
}

  /* marquee helper (used for scrolling episode names) */
  .marquee{display:block;white-space:nowrap;overflow:hidden;position:relative;height:20px; max-width:100%;}
  .m-inner{display:inline-block;white-space:nowrap; will-change:transform}
  .m-inner span{display:inline-block; white-space:nowrap;}
</style>

      <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M12 15.5a3.5 3.5 0 100-7 3.5 3.5 0 000 7z" stroke="currentColor" stroke-width="1.4"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09a1.65 1.65 0 00-1-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09a1.65 1.65 0 001.51-1 1.65 1.65 0 00-.33-1.82L4.31 4.9A2 2 0 017.14 2.07l.06.06c.5.5 1.16.76 1.82.76H9a1.65 1.65 0 001.51-1V1a2 2 0 014 0v.09c.14.6.62 1.09 1.22 1.33l.06.02a2 2 0 012.35-.34l.06.03a2 2 0 01.34 3.14l-.06.06c-.46.46-.66 1.15-.53 1.82h.09a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="1.2"/></svg>

</header>

<main>
  <div class="content-area">

    <div class="search-row" style="position:relative; z-index:210;">

<script src="/assets/zim-bridge.js"></script>
<script>
/* ---------------- CONFIG ---------------- */
const INDEX_DIR = '/.system-index';
const BUCKETS = ['Movies','Shows','Music','Books','Gallery','Files'];
const THEME_KEY = 'nomad_dark_mode';
const RESUME_KEYS = ['nomad:watch:v1', 'nomad_resume', 'nomad_watch_history', 'nomad_resume_history', 'nomad_resume_cache', 'resume', 'watch_resume'];
const RE_VIDEO = /\.(mp4|mkv|avi|mov|ts|webm|m4v)$/i;
const RE_AUDIO = /\.(mp3|flac|wav|m4a|aac|ogg)$/i;
const RE_IMAGE = /\.(jpe?g|png|webp|gif|heic|avif)$/i;
const RE_BOOK  = /\.(pdf|epub|mobi|azw3|txt)$/i;

// minimal debug logger — no visible on-page debug console
const __debugEl = null;
function debugLog(...args){
  try { console.debug('[NOMAD]', ...args); } catch(e){ }
}


function debugLog(...args){
  try {
    console.debug('[NOMAD]', ...args);
    if(__debugEl) {
      __debugEl.style.display = 'block';
      const line = document.createElement('div');
      line.textContent = (new Date()).toISOString().split('T')[1].slice(0,12) + ' ' + args.map(a => (typeof a === 'string' ? a : JSON.stringify(a))).join(' ');
      __debugEl.appendChild(line);
      while(__debugEl.childNodes.length > 200) __debugEl.removeChild(__debugEl.firstChild);
    }
  } catch(e){}
}

/* ---------------- UI refs ---------------- */
const themeBtn = document.getElementById('themeBtn');
const searchInput = document.getElementById('searchInput');
const searchLoader = document.getElementById('searchLoader');
const resultsPanel = document.getElementById('resultsPanel');
const resumePanel = document.getElementById('resumePanel');
const resumeList = document.getElementById('resumeList');
const pageBg = document.querySelector('.page-bg');

/* ---------------- ZIM / javascript-libzim integration ---------------- */
/* libzim files are in /assets/kiwix/www/js/ (from your dist)
   We prefer the wasm loader but add locateFile so Emscripten finds the .wasm.
*/
const LIBZIM_BASE = '/assets/kiwix/www/js/';
const LIBZIM_WASM_SCRIPT = LIBZIM_BASE + 'libzim-wasm.js';
const LIBZIM_ASM_SCRIPT  = LIBZIM_BASE + 'libzim-asm.js'; // optional fallback

let libzimReady = null;        // Promise resolved when Module runtime is ready

function loadLibZimScript(preferWasm = true) {
  if (libzimReady) return libzimReady;
  libzimReady = new Promise((resolve, reject) => {
    window.Module = window.Module || {};
    window.Module.locateFile = function(path) {
      const full = LIBZIM_BASE + path;
      debugLog('libzim locateFile mapped:', path, '->', full);
      return full;
    };
    window.Module.onRuntimeInitialized = function () {
      libzimModule = window.Module;
      debugLog('libzim runtime initialized', !!libzimModule);
      console.info('libzim runtime initialized');
      resolve(libzimModule);
    };

    const scriptUrl = preferWasm ? LIBZIM_WASM_SCRIPT : LIBZIM_ASM_SCRIPT;
    debugLog('loading libzim script:', scriptUrl);
    const script = document.createElement('script');
    script.src = scriptUrl;
    script.async = true;
    script.onerror = async (ev) => {
      debugLog('libzim script load error for', scriptUrl, ev);
      console.warn('libzim wasm loader failed — trying asm fallback if available');
      if (preferWasm && LIBZIM_ASM_SCRIPT) {
        try {
          await loadLibZimScript(false);
          resolve(libzimModule);
        } catch (e) {
          debugLog('libzim fallback also failed', String(e));
          reject(new Error('Failed to load libzim (wasm + asm)'));
        }
      } else {
        reject(new Error('Failed to load libzim script: ' + scriptUrl));
      }
    };
    document.head.appendChild(script);
  });
  return libzimReady;
}


async function loadAndOpenArchive(zimPath) {
  if (!zimPath) throw new Error('zimPath required');
  debugLog('loadAndOpenArchive start', zimPath);
  try {
    await loadLibZimScript();
    if (!libzimModule) throw new Error('libzim module not found after loading script');

    // First, sanity-check that the browser can reach the .zim file and that server supports ranged requests.
    try {
      // Try a HEAD first (fast)
      const head = await fetch(zimPath, { method: 'HEAD', cache: 'no-store' });
      debugLog('HEAD', zimPath, head.status, { ok: head.ok, headers: { 'accept-ranges': head.headers.get('accept-ranges'), 'content-length': head.headers.get('content-length') } });
      if (!head.ok) {
        // Some servers don't allow HEAD — try a small ranged GET
        debugLog('HEAD not OK, trying small GET Range');
        const r = await fetch(zimPath, { method: 'GET', headers: { 'Range': 'bytes=0-1023' }, cache: 'no-store' });
        debugLog('Range GET status:', r.status, 'headers:', { 'content-range': r.headers.get('content-range'), 'accept-ranges': r.headers.get('accept-ranges') });
        if (r.status !== 206 && r.status !== 200) {
          throw new Error('Range GET failed status=' + r.status);
        }
      }
    } catch (reachErr) {
      debugLog('ZIM reachability test failed for', zimPath, String(reachErr));
      // continue — but inform user. Many captive portals or mis-routed requests show here.
    }

    // libzim Module.loadArchive will perform network requests itself, but we log around it.
    try {
      debugLog('calling libzimModule.loadArchive with', zimPath);
      if (typeof libzimModule.loadArchive !== 'function') {
        throw new Error('libzimModule.loadArchive is not a function');
      }
      libzimModule.loadArchive(zimPath);
      activeZimPath = zimPath;
      archiveLoaded = true;
      debugLog('libzim archive loaded (assumed):', zimPath);
      console.info('libzim archive loaded:', zimPath);
    } catch (e) {
      debugLog('libzim.loadArchive failed', String(e));
      console.warn('libzim.loadArchive failed', e);
      archiveLoaded = false;
      throw e;
    }
  } catch (e) {
    debugLog('loadAndOpenArchive failed overall', String(e));
    archiveLoaded = false;
    throw e;
  }
}

/* ---------------- ZIM helper: discover ZIMs and run title suggestions ---------------- */

/*
  Query the backend for a list of available ZIMs.
  The ESP32 endpoint is expected at "/zim-list" and to return JSON array like:
  [ {"name":"wikipedia_en_0.8.zim","path":"/Archive/wikipedia_en_0.8.zim","size":...}, ... ]
*/
async function tryFetchZimList() {
  debugLog('tryFetchZimList: fetching /zim-list');
  try {
    const j = await tryFetchJSON('/zim-list');
    debugLog('/zim-list response (raw):', j);
    if (!j || !Array.isArray(j)) {
      debugLog('/zim-list: unexpected response (not an array)');
      return [];
    }
    // quick sanity: ensure each entry has path
    for(const z of j) {
      if(!z.path) debugLog('zim entry missing path:', z);
    }
    return j;
  } catch (e) {
    console.warn('tryFetchZimList failed', e);
    debugLog('tryFetchZimList failed', String(e));
    return [];
  }
}

/*
  Run a title suggestion/search against the first available ZIM.
  Returns an array of lightweight result objects compatible with renderResults:
  { title, path, bucket:'ZIM', subtype:'zim' }
*/
async function tryZimSuggest(term, maxResults = 20) {
  if (!term || !term.trim()) return [];
  try {
    // ensure lib runtime is loaded
    await loadLibZimScript();

    // ensure there's an opened archive; if not, discover ZIMs and open the first one
    if (!archiveLoaded) {
      const zims = await tryFetchZimList();
      if (!zims || zims.length === 0) {
        console.info('No zim files found on device');
        return [];
      }
      // open first ZIM (you can change logic to pick language or a specific file)
      const first = zims[0];
      await loadAndOpenArchive(first.path);
      if (!archiveLoaded) return [];
    }

    // Use Module.suggest (title-based suggestions). API returns an Emscripten vector
    // Use Module.suggest (title-based suggestions). API returns an Emscripten vector
    if (typeof libzimModule.suggest !== 'function') {
      console.warn('libzim suggest API not available');
      debugLog('libzim suggest API not available on module', libzimModule);
      return [];
    }

    debugLog('calling libzim.suggest with term=', term);
    const vec = libzimModule.suggest(term, maxResults);
    debugLog('libzim.suggest returned vector', typeof vec, vec && vec.size ? vec.size() : 'no-size');
    const out = [];
    for (let i = 0; i < (vec && vec.size ? vec.size() : 0); i++) {
      const entry = vec.get(i);
      let title = '', path = '';
      try { title = entry.getTitle ? entry.getTitle() : ''; } catch(e){ debugLog('entry.getTitle error', String(e)); }
      try { path = entry.getPath ? entry.getPath() : ''; } catch(e){ debugLog('entry.getPath error', String(e)); }
      debugLog('zim-suggest entry', i, title, path);
      out.push({
        title: title || '(untitled)',
        path: `/zimreader.html?zim=${encodeURIComponent(activeZimPath||'')}&entry=${encodeURIComponent(path||'')}`,
        bucket: 'ZIM',
        subtype: 'zim',
        preview: null,
        raw: null
      });
    }
    debugLog('tryZimSuggest: out.length', out.length);
    return out;
  } catch (e) {
    console.warn('tryZimSuggest failed', e);
    return [];
  }
}

/* render a ZIM results section appended under the existing resultsPanel
   keeps ZIM results visually separate from media results (so media shows quickly).
*/
function renderZimResults(zrows, q) {
  if (!zrows || !zrows.length) return;

  // create header
  const hdr = document.createElement('div');
  hdr.style.padding = '10px 14px';
  hdr.style.borderBottom = '1px solid var(--line)';
  hdr.style.fontWeight = '800';
  hdr.style.color = 'var(--muted)';
  hdr.textContent = `ZIM results (${zrows.length}) — ${q}`;

  const frag = document.createDocumentFragment();
  frag.appendChild(hdr);

  // Reuse the same row structure as renderResults
  for (const r of zrows.slice(0, 100)) {
    const row = document.createElement('div'); row.className = 'result-row';
    const thumb = document.createElement('div'); thumb.className = 'thumb square';
    thumb.innerHTML = iconSVG('file');

    const meta = document.createElement('div'); meta.className = 'meta';
    const title = document.createElement('div'); title.className = 'title'; title.textContent = r.title || r.path || '(untitled)';
    const sub = document.createElement('div'); sub.className = 'sub';
    sub.textContent = 'Offline ZIM';
    meta.appendChild(title); meta.appendChild(sub);

    const pathDiv = document.createElement('div'); pathDiv.className = 'result-path'; pathDiv.textContent = shortenPath(r.path || '');
    row.appendChild(thumb); row.appendChild(meta); row.appendChild(pathDiv);

    row.addEventListener('click', ()=> onResultClick(r));
    frag.appendChild(row);
  }

  // append ZIM section to panel (do not clear existing content)
  resultsPanel.appendChild(frag);
  resultsPanel.style.display = 'block';
}

/* ---------------- UTIL ---------------- */
function normalizePath(p){ if(!p) return '/'; if(!p.startsWith('/')) p = '/' + p; while(p.length>1 && p.endsWith('/')) p = p.slice(0,-1); return p; }
function basenameNoExt(n){ return (n||'').replace(/\.[^/.]+$/,''); }
function friendlyDisplayName(n){ return basenameNoExt((n||'').toString()).replace(/[_\.]+/g,' ').trim(); }
function parseNdjson(text){ if(!text) return []; return text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean).map(l=>{ try{ return JSON.parse(l); }catch(e){ return null; } }).filter(Boolean); }
async function tryFetchText(url){ try{ const r = await fetch(url, {cache:'no-store'}); if(!r.ok) return null; return await r.text(); }catch(e){ return null; } }
async function tryFetchJSON(url){ try{ const r = await fetch(url, {cache:'no-store'}); if(!r.ok) return null; return await r.json(); }catch(e){ return null; } }

/* ---------------- CLASSIFY ---------------- */
function classifyEntry(obj, parentBucket){
  const name = (obj.n||obj.name||'').toString();
  let path = (obj.path||obj.p||'') || (parentBucket ? `/${parentBucket}/${name}` : name);
  path = normalizePath(path);
  if(obj._type === 'dir' || obj.t === 'd') return { kind:'dir', name, path, raw: obj };
  if(RE_VIDEO.test(name) || RE_VIDEO.test(path)) return { kind:'file', subtype:'video', name, path, raw: obj };
  if(RE_AUDIO.test(name) || RE_AUDIO.test(path)) return { kind:'file', subtype:'audio', name, path, raw: obj };
  if(RE_IMAGE.test(name) || RE_IMAGE.test(path)) return { kind:'file', subtype:'image', name, path, raw: obj };
  if(RE_BOOK.test(name) || RE_BOOK.test(path)) return { kind:'file', subtype:'book', name, path, raw: obj };
  return { kind:'file', subtype:'other', name, path, raw: obj };
}

/* ---------------- SEARCH INDEX (optimized & preview mapping) ---------------- */
let searchIndexCache = null;
let previewByPath = new Map();
let previewByBaseDir = new Map();

/* Deterministic fallback for preview images (useful when index lacks explicit images) */
function previewPathFromItemPath(itemPath){
  if(!itemPath) return null;
  const p = normalizePath(itemPath);
  const low = p.toLowerCase();

  if(low.startsWith('/movies/')){
    const filename = p.split('/').pop() || '';
    const base = basenameNoExt(filename);
    return `/Movies/${encodeURIComponent(base)}.jpg`;
  }
  if(low.startsWith('/books/')){
    const filename = p.split('/').pop() || '';
    const base = basenameNoExt(filename);
    return `/Books/${encodeURIComponent(base)}.jpg`;
  }
  if(low.startsWith('/shows/')){
    const parts = p.split('/').filter(Boolean);
    if(parts.length >= 2){
      const showName = parts[1];
      return `/Shows/${encodeURIComponent(showName)}.jpg`;
    }
  }
  if(RE_IMAGE.test(p)) return p;
  return null;
}

/* Builds a robust search index and preview maps (concurrent fetches) */
async function buildSearchIndex(){
  if(searchIndexCache && searchIndexCache.entries) return searchIndexCache.entries;
  previewByPath = new Map();
  previewByBaseDir = new Map();
  const byBucket = {};
  for(const b of BUCKETS) byBucket[b] = [];

  const fetchPromises = BUCKETS.map(b => {
    const idxUrl = `${INDEX_DIR}/${b}.index.ndjson`;
    return tryFetchText(idxUrl).then(txt => ({ bucket: b, txt }));
  });
  const settled = await Promise.allSettled(fetchPromises);
  for(const res of settled){
    if(res.status !== 'fulfilled') continue;
    const { bucket, txt } = res.value || {};
    if(!bucket) continue;
    const arr = parseNdjson(txt || '');
    for(const obj of arr){
      if(!obj) continue;
      const c = classifyEntry(obj, bucket);
      if(!c) continue;
      byBucket[bucket].push(c);
    }
  }

  const nestedFetches = [];
  for(const b of ['Shows','Music','Gallery']){
    for(const c of (byBucket[b]||[])){
      if(c.kind === 'dir'){
        const candidate = `${INDEX_DIR}${c.path}.index.ndjson`.replace('//','/');
        nestedFetches.push( tryFetchText(candidate).then(nested => ({ bucket: b, parentDir: c.path, text: nested })) );
        const encoded = c.path.replace(/^\//,'').replace(/\//g,'__');
        nestedFetches.push( tryFetchText(`${INDEX_DIR}/${encoded}.index.ndjson`).then(nested => ({ bucket: b, parentDir: c.path, text: nested })) );
      }
    }
  }
  const nestedSettled = await Promise.allSettled(nestedFetches);
  for(const r of nestedSettled){
    if(r.status !== 'fulfilled') continue;
    const data = r.value;
    if(!data || !data.text) continue;
    const narr = parseNdjson(data.text || '');
    for(const n of narr){
      if(!n) continue;
      const c2 = classifyEntry(n, data.bucket);
      if(!c2) continue;
      c2.parentDir = data.parentDir;
      byBucket[data.bucket].push(c2);
    }
  }

  const entries = [];
  function combineMap(list, bucketName){
    const map = new Map();
    for(const it of list){
      if(it.kind !== 'file') continue;
      const base = basenameNoExt(it.name || it.path.split('/').pop() || '');
      const key = base.toLowerCase();
      if(!map.has(key)) map.set(key, { base, files: [], preview: null, dirs: new Set() });
      map.get(key).files.push(it);
      if(it.path) map.get(key).dirs.add((it.path.replace(/\/[^/]+$/,'') || '').toLowerCase());
      if(it.subtype === 'image' && !map.get(key).preview) map.get(key).preview = it.path;
    }
    for(const [k,v] of map.entries()){
      const video = v.files.find(x => x.subtype === 'video');
      const book  = v.files.find(x => x.subtype === 'book');
      const audio = v.files.find(x => x.subtype === 'audio');
      if(video){
        entries.push({ title: friendlyDisplayName(video.name), bucket: bucketName, subtype:'video', path: video.path, preview: v.preview || null, raw: video.raw });
      } else if(book){
        entries.push({ title: friendlyDisplayName(book.name), bucket: bucketName, subtype:'book', path: book.path, preview: v.preview || null, raw: book.raw });
      } else if(audio && bucketName === 'Music'){
        entries.push({ title: friendlyDisplayName(audio.name), bucket: bucketName, subtype:'audio', path: audio.path, preview:null, raw: audio.raw });
      } else {
        if(bucketName !== 'Movies' && bucketName !== 'Books'){
          const anyFile = v.files[0];
          if(anyFile) entries.push({ title: friendlyDisplayName(anyFile.name || anyFile.path), bucket:bucketName, subtype:anyFile.subtype||'file', path:anyFile.path, preview:v.preview||null, raw:anyFile.raw });
        }
      }
    }
  }

  combineMap(byBucket['Movies'] || [], 'Movies');

  (function(){
    const seriesMap = new Map();
    for(const it of (byBucket['Shows']||[])){
      if(it.kind === 'dir'){
        const key = (it.path || '').toLowerCase();
        if(!seriesMap.has(key)) seriesMap.set(key, { title: it.name || it.path, preview: null, dir: it.path });
      } else if(it.kind === 'file'){
        const parent = (it.parentDir || (it.path.split('/').slice(0,-1).join('/')) || '').toLowerCase();
        const key = parent || basenameNoExt(it.name).toLowerCase();
        if(!seriesMap.has(key)) seriesMap.set(key, { title: it.parentDir || it.name || key, preview: null, dir: it.parentDir || '' });
        if(it.subtype === 'image' && it.parentDir){
          const s = seriesMap.get(key);
          if(s && !s.preview) s.preview = it.path;
        }
      }
    }
    for(const [k,v] of seriesMap.entries()){
      entries.push({ title: friendlyDisplayName(v.title), bucket:'Shows', subtype:'series', path: v.dir, preview: v.preview || null });
    }
  })();

  combineMap(byBucket['Books'] || [], 'Books');

  (function(){
    const seen = new Set();
    for(const g of (byBucket['Gallery']||[])){
      if(g.kind !== 'file') continue;
      const subtype = g.subtype || (RE_VIDEO.test(g.path)?'video':(RE_IMAGE.test(g.path)?'image':'other'));
      const dir = (g.path||'').replace(/\/[^/]+$/,'').toLowerCase();
      const base = basenameNoExt(g.name||g.path).toLowerCase();
      const key = `${base}|${dir}|${subtype}`;
      if(seen.has(key)) continue;
      seen.add(key);
      entries.push({ title: friendlyDisplayName(g.name||g.path), bucket:'Gallery', subtype, path: g.path, preview: subtype==='image'?g.path:null, raw:g.raw });
    }
  })();

  (function(){
    const seen = new Set();
    for(const m of (byBucket['Music']||[])){
      if(m.kind !== 'file' || m.subtype !== 'audio') continue;
      const dir = (m.path||'').replace(/\/[^/]+$/,'').toLowerCase();
      const base = basenameNoExt(m.name).toLowerCase();
      const key = `${base}|${dir}`;
      if(seen.has(key)) continue;
      seen.add(key);
      entries.push({ title: friendlyDisplayName(m.name), bucket:'Music', subtype:'audio', path: m.path, preview:null, raw:m.raw });
    }
  })();

  (function(){
    const seen = new Set();
    for(const f of (byBucket['Files']||[])){
      if(f.kind !== 'file') continue;
      const dir = (f.path||'').replace(/\/[^/]+$/,'').toLowerCase();
      const base = basenameNoExt(f.name).toLowerCase();
      const key = `${base}|${dir}`;
      if(seen.has(key)) continue;
      seen.add(key);
      entries.push({ title: friendlyDisplayName(f.name), bucket:'Files', subtype:'file', path: f.path, preview:null, raw:f.raw });
    }
  })();

  function addMissingFilesFromBucket(bucketName){
    const list = byBucket[bucketName] || [];
    for(const it of list){
      if(it.kind !== 'file') continue;
      if(it.subtype === 'image') continue;
      const norm = normalizePath(it.path || '');
      if(entries.some(e => e.path && normalizePath(e.path) === norm && (e.bucket || '').toLowerCase() === bucketName.toLowerCase())) continue;
      entries.push({
        title: friendlyDisplayName(it.name || it.path || ''),
        bucket: bucketName,
        subtype: it.subtype || 'file',
        path: it.path,
        preview: null,
        raw: it.raw
      });
    }
  }
  addMissingFilesFromBucket('Movies');
  addMissingFilesFromBucket('Books');

  for(const e of entries){
    if(!e.path) continue;
    const p = (e.path || '').toLowerCase();
    if(p.includes('/movies/')) e.bucket = 'Movies';
    else if(p.includes('/shows/')) e.bucket = 'Shows';
    else if(p.includes('/books/')) e.bucket = 'Books';
    else if(p.includes('/gallery/')) e.bucket = 'Gallery';
    else if(p.includes('/music/')) e.bucket = 'Music';
    else if(!e.bucket) e.bucket = 'Files';
  }

  for(const b of ['Movies','Books']){
    for(const it of (byBucket[b]||[])){
      if(it.kind === 'file' && it.subtype === 'image' && it.path){
        const dir = (it.path || '').replace(/\/[^/]+$/,'').toLowerCase();
        const base = basenameNoExt(it.name || it.path).toLowerCase();
        const k = `${base}|${dir}`;
        if(!previewByBaseDir.has(k)) previewByBaseDir.set(k, it.path);
      }
    }
  }

  const finalMap = new Map();
  for(const e of entries){
    if(!e.path) continue;
    const norm = normalizePath(e.path);
    if((e.bucket === 'Movies' || e.bucket === 'Books') && RE_IMAGE.test(norm)) continue;
    if(!finalMap.has(norm)){
      if(!e.preview){
        const dir = (e.path || '').replace(/\/[^/]+$/,'').toLowerCase();
        const base = basenameNoExt(e.title || e.path || '').toLowerCase();
        const k = `${base}|${dir}`;
        if(previewByBaseDir.has(k)) e.preview = previewByBaseDir.get(k);
        else e.preview = previewPathFromItemPath(e.path) || null;
      }
      finalMap.set(norm, e);
    } else {
      const existing = finalMap.get(norm);
      if(!existing.preview && e.preview) existing.preview = e.preview;
      if(!existing.bucket && e.bucket) existing.bucket = e.bucket;
      if((!existing.title || existing.title === '(untitled)') && e.title) existing.title = e.title;
    }
  }

  const finalEntries = Array.from(finalMap.values());

  for(const e of finalEntries){
    if(e.path){
      const norm = normalizePath(e.path);
      const fallback = e.preview || previewPathFromItemPath(e.path) || null;
      previewByPath.set(norm, fallback);
      const dir = (e.path || '').replace(/\/[^/]+$/,'').toLowerCase();
      const base = basenameNoExt(e.title || (e.path||'')).toLowerCase();
      const k = `${base}|${dir}`;
      if(!previewByBaseDir.has(k) && fallback) previewByBaseDir.set(k, fallback);
    }
  }

  searchIndexCache = { entries: finalEntries, ts: Date.now() };
  console.info('Search index built:', finalEntries.length);
  return finalEntries;
}

/* icon helpers */
function iconSVG(kind){

  if(kind === 'file') return '<svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="1.6"/><path d="M14 2v6h6" stroke="currentColor" stroke-width="1.6"/></svg>';

/* marquee helper
   Smooth continuous/back-to-back marquee with configurable gap and slower default speed.
   This creates a unique keyframe per marquee instance so it won't snap or show a big gap.
   Adjusted to ensure the marquee content fits inside the overlay and remains centered.
*/
let __marqueeCounter = 0;
function createScrollingMarquee(text){
  const id = ++__marqueeCounter;
  const wrapper = document.createElement('div');
  wrapper.className = 'marquee';
  wrapper.style.display = 'block';
  wrapper.style.overflow = 'hidden';
  wrapper.style.width = '100%';
  const inner = document.createElement('div'); inner.className = 'm-inner';
  const s1 = document.createElement('span'); s1.textContent = text;
  const s2 = document.createElement('span'); s2.textContent = text;
  inner.appendChild(s1); inner.appendChild(s2);
  wrapper.appendChild(inner);

  requestAnimationFrame(() => {
    try {
      // measure first copy
      const copyWidth = Math.max(12, Math.ceil(s1.getBoundingClientRect().width || (text.length * 8)));
      const gap = 48; // px gap between end-of-copy and start-of-next copy (visible breathing space)
      // padding-right provides the visible space between repeats
      s1.style.paddingRight = `${gap}px`;
      s2.style.paddingRight = '0px';
      // set total width of inner: two copies + gap each
      inner.style.width = `${(copyWidth + gap) * 2}px`;
      // slower duration baseline so the scroll feels smooth on wide displays
      const dur = Math.max(12, Math.min(70, (copyWidth + gap) / 24)); // slower, smoother
      // unique keyframes for this marquee so it scrolls exactly by copyWidth+gap
      const keyName = `__marquee_scroll_${id}`;
      const rule = `@keyframes ${keyName} { from { transform: translateX(0); } to { transform: translateX(-${copyWidth + gap}px); } }`;
      const styleEl = document.createElement('style');
      styleEl.setAttribute('data-marquee', keyName);
      styleEl.textContent = rule;
      document.head.appendChild(styleEl);
      inner.style.animation = `${keyName} ${dur}s linear infinite`;
      inner.style.willChange = 'transform';
      inner.style.transform = 'translateX(0)';
      // constrain each span so it never forces overlay wider than parent
      s1.style.display = 'inline-block';
      s2.style.display = 'inline-block';
      s1.style.maxWidth = `${copyWidth}px`;
      s2.style.maxWidth = `${copyWidth}px`;
      // ensure wrapper hides overflow and centers visually
      wrapper.style.textAlign = 'left';
    } catch(e) {
      inner.style.animation = `none`;
    }
  });

  return wrapper;
}

/* simple time formatter (mm:ss or h:mm:ss) */
function formatTimeSeconds(sec){
  sec = Number(sec) || 0;
  sec = Math.floor(sec);
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  if(h) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

/* ---------------- RESUME discovery & rendering ---------------- */
function tryParseJSONSafe(str){ if(!str) return null; try{ return JSON.parse(str); }catch(e){ return null; } }
function normalizeResumePayload(payload){
  if(!payload) return [];
  if(Array.isArray(payload)) {
    return payload.map(p => {
      if(!p) return null;
      return {
        path: p.path || p.file || p.p || '',
        title: p.title || p.name || (p.rawTitle || ''),
        position: (p.position || p.pos || p.currentTime || 0),
        updated: p.updated || p.ts || Date.now(),
        raw: p
      };
    }).filter(Boolean);
  }
  if(typeof payload === 'object'){
    const keys = Object.keys(payload || {});
    const looksLikeFileKey = keys.length && keys.every(k => typeof k === 'string' && (k.includes('|') || k.startsWith('/')));
    if(looksLikeFileKey){
      const arr = [];
      for(const k of keys){
        const v = payload[k] || {};
        const pathPart = k.split('|')[0] || k;
        arr.push({
          path: pathPart,
          title: v.title || v.name || pathPart.split('/').pop(),
          position: v.position || v.pos || v.currentTime || 0,
          updated: v.updated || v.ts || Date.now(),
          raw: v
        });
      }
      return arr;
    }
    if(payload.path || payload.file || payload.url || payload.position || payload.pos || payload.title) {
      return [{
        path: payload.path || payload.file || payload.url || '',
        title: payload.title || payload.name || '',
        position: payload.position || payload.pos || 0,
        updated: payload.updated || payload.ts || Date.now(),
        raw: payload
      }];
    }
  }
  return [];
}

/* Try to collect a plausible resume list from localStorage and a few common endpoints */
async function collectResumeItems(){
  for(const k of RESUME_KEYS){
    try {
      const raw = localStorage.getItem(k);
      if(!raw) continue;
      let parsed = tryParseJSONSafe(raw);
      if(!parsed && typeof raw === 'string' && raw.indexOf('\n') !== -1){
        const lines = raw.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
        const arr = [];
        for(const ln of lines){
          const p = tryParseJSONSafe(ln);
          if(p) arr.push(p);
        }
        if(arr.length) parsed = arr;
      }
      if(parsed){
        const normalized = normalizeResumePayload(parsed);
        if(normalized && normalized.length) return normalized;
      }
    } catch(e){}
  }

  const tryUrls = ['/resume.json','/.resume.json','/api/resume.json','/.system-resume.json','/resume.ndjson'];
  for(const u of tryUrls){
    try {
      const controller = new AbortController();
      const tid = setTimeout(()=>controller.abort(), 2000);
      const r = await fetch(u, { cache: 'no-store', signal: controller.signal});
      clearTimeout(tid);
      if(!r.ok) continue;
      const text = await r.text();
      if(!text) continue;
      if(text.trim().includes('\n')){
        const arr = [];
        const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
        for(const ln of lines){
          const p = tryParseJSONSafe(ln);
          if(p) arr.push(p);
        }
        if(arr.length){
          const normalized = normalizeResumePayload(arr);
          if(normalized && normalized.length) return normalized;
        }
      } else {
        const j = tryParseJSONSafe(text);
        if(j){
          const normalized = normalizeResumePayload(j);
          if(normalized && normalized.length) return normalized;
        }
      }
    } catch(e){
      // ignore
    }
  }

  return [];
}

function findPreviewForResumeItem(item){
  if(!item || !item.path) return null;
  const norm = normalizePath(item.path);
  if(previewByPath.has(norm)) {
    const p = previewByPath.get(norm);
    if(p) return p;
  }
  const dir = (norm.replace(/\/[^/]+$/,'') || '').toLowerCase();
  const base = basenameNoExt((item.title||norm.split('/').pop()||'')).toLowerCase();
  const key = `${base}|${dir}`;
  if(previewByBaseDir.has(key)) return previewByBaseDir.get(key);
  if(item.preview) return item.preview;
  return previewPathFromItemPath(item.path);
}

/* Render resume area:
   Now arranged horizontally (row) on desktop and centered. Overlays are constrained and centered.
*/
function renderResume(items){
  resumeList.innerHTML = '';
  if(!items || !items.length){ resumePanel.style.display = 'none'; return; }

  const normalized = (items||[]).map(it => ({
    path: it.path || it.p || it.file || it.url || '',
    title: it.title || it.name || (it.raw && (it.raw.title || it.raw.name)) || '',
    position: (typeof it.position !== 'undefined' ? it.position : (it.raw && (it.raw.position || it.raw.pos) ? (it.raw.position || it.raw.pos) : 0)),
    updated: it.updated || (it.raw && (it.raw.updated||it.raw.ts)) || Date.now(),
    raw: it.raw || {},
  })).filter(x => x.path);

  // enrich bucket hint
  normalized.forEach(n => {
    if(!n.bucket){
      const p = (n.path||'').toLowerCase();
      if(p.includes('/movies/')) n.bucket = 'Movies';
      else if(p.includes('/shows/')) n.bucket = 'Shows';
      else if(p.includes('/music/')) n.bucket = 'Music';
      else if(p.includes('/books/')) n.bucket = 'Books';
      else if(p.includes('/gallery/')) n.bucket = 'Gallery';
      else n.bucket = 'Files';
    }
  });

  // pick up to 3 of Movies and 3 of Shows (sorted by updated)
  const movies = normalized.filter(n => n.bucket === 'Movies').sort((a,b)=> (b.updated||0)-(a.updated||0)).slice(0,3);
  const shows  = normalized.filter(n => n.bucket === 'Shows').sort((a,b)=> (b.updated||0)-(a.updated||0)).slice(0,3);

  const isMobile = window.matchMedia && window.matchMedia('(max-width:640px)').matches;

  if(isMobile){
    // Mobile: show the most recent Movie and the most recent Show (max 2, side-by-side)
    const picks = [];
    if(movies.length) picks.push(movies[0]);
    if(shows.length) picks.push(shows[0]);
    // fallback: if none found, show up to two generic items
    if(!picks.length) picks.push(...(normalized.slice(0,2)));

    const sec = document.createElement('div'); sec.className = 'resume-section';
    for(const it of picks) sec.appendChild(makeResumeNode(it, true));
    resumeList.appendChild(sec);
    resumePanel.style.display = 'block';
    return;
  }

  // Desktop: render two centered rows:
  // Row 1: Movies (up to 3)
  // Row 2: Shows  (up to 3)
  // If neither exist, show up to 3 of other items.
  if(movies.length){
    const msec = document.createElement('div'); msec.className = 'resume-section';
    movies.forEach(it => msec.appendChild(makeResumeNode(it, false)));
    resumeList.appendChild(msec);
  }

  if(shows.length){
    const ssec = document.createElement('div'); ssec.className = 'resume-section';
    shows.forEach(it => ssec.appendChild(makeResumeNode(it, false, true)));
    resumeList.appendChild(ssec);
  }

  if(!movies.length && !shows.length){
    const others = normalized.slice(0,3);
    if(others.length){
      const osec = document.createElement('div'); osec.className = 'resume-section';
      others.forEach(it => osec.appendChild(makeResumeNode(it, false)));
      resumeList.appendChild(osec);
    }
  }

  resumePanel.style.display = 'block';
}


/* makeResumeNode: creates item and overlay (shows get the marquee)
   overlay fade/translate transitions to feel smooth when content updates.
   overlay is centered and constrained so marquee doesn't overflow visually.
*/
function makeResumeNode(it, compact=false, showMarqueeForShows=false){
  const node = document.createElement('div'); node.className = 'resume-item'; node.setAttribute('role','button');
  const thumb = document.createElement('div'); thumb.className = 'resume-thumb';
  const fallback = document.createElement('div'); fallback.className = 'fallback-text'; fallback.textContent = it.title || it.path.split('/').pop();
  thumb.appendChild(fallback);

  const preview = findPreviewForResumeItem(it);
  if(preview){
    const img = document.createElement('img'); img.src = preview; img.alt = it.title || '';
    img.onload = ()=> { fallback.style.display = 'none'; };
    img.onerror = ()=> { img.style.display='none'; fallback.style.display='flex'; };
    thumb.appendChild(img);
  } else {
    const ext = (it.path || '').split('.').pop() || '';
    const iconWrap = document.createElement('div'); iconWrap.style.display='grid'; iconWrap.style.placeItems='center'; iconWrap.style.width='100%'; iconWrap.style.height='100%';
    if(RE_AUDIO.test('.'+ext)) iconWrap.innerHTML = iconSVG('audio'); else iconWrap.innerHTML = iconSVG('file');
    thumb.appendChild(iconWrap);
  }

  const overlay = document.createElement('div'); overlay.className = 'resume-overlay small';
  overlay.style.opacity = '0';
  overlay.style.transform = 'translateY(6px)';
  overlay.style.display = 'flex';
  overlay.style.justifyContent = 'center';
  overlay.style.alignItems = 'center';
  overlay.style.left = '50%';
  overlay.style.transform = 'translateX(-50%) translateY(6px)';
  overlay.style.maxWidth = '86%';

  if(showMarqueeForShows && (it.path||'').toLowerCase().includes('/shows/')){
    const epName = it.title || it.path.split('/').pop() || '';
    const timeText = it.position ? formatTimeSeconds(it.position) : '';
    const label = `${epName}${timeText ? ' • ' + timeText : ''}`;
    const marquee = createScrollingMarquee(label);
    const marqueewrap = document.createElement('div');
    marqueewrap.style.display = 'flex';
    marqueewrap.style.alignItems = 'center';
    marqueewrap.style.justifyContent = 'center';
    marqueewrap.style.width = '100%';
    marqueewrap.style.maxWidth = '100%';
    marqueewrap.style.overflow = 'hidden';
    marqueewrap.style.borderRadius = '999px';
    marqueewrap.style.padding = '2px 6px';
    marqueewrap.style.background = 'rgba(0,0,0,0.45)';
    marqueewrap.style.color = '#fff';
    marqueewrap.appendChild(marquee);
    overlay.innerHTML = '';
    overlay.style.padding = '8px 10px';
    overlay.appendChild(marqueewrap);
  } else {
    overlay.textContent = it.position ? formatTimeSeconds(it.position) : '0s';
  }
  thumb.appendChild(overlay);

  // animate overlay in slightly
  requestAnimationFrame(()=> {
    overlay.style.transition = 'opacity .28s cubic-bezier(.2,.9,.2,1), transform .28s cubic-bezier(.2,.9,.2,1)';
    overlay.style.opacity = '1';
    overlay.style.transform = 'translateX(-50%) translateY(0)';
  });

  node.appendChild(thumb);

  node.addEventListener('click', ()=> {
    const p = it.path || '';
    if((p||'').toLowerCase().includes('/movies/')) window.location.href = `/movies#open=${encodeURIComponent(p)}`;
    else if((p||'').toLowerCase().includes('/shows/')) window.location.href = `/shows#open=${encodeURIComponent(p)}`;
    else if((p||'').toLowerCase().includes('/music/')) window.location.href = `/music#play=${encodeURIComponent(p)}`;
    else if((p||'').toLowerCase().includes('/gallery/')) window.location.href = `/gallery#open=${encodeURIComponent(p)}`;
    else if((p||'').toLowerCase().includes('/books/')) {
      const url = p.startsWith('/') ? p : '/' + p;
      window.location.href = url;
    } else window.location.href = (p.startsWith('/') ? p : '/' + p);
  });

  return node;
}

/* ---------------- SEARCH UI & Logic ---------------- */
function escapeHtml(s){ if(!s) return ''; return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function shortenPath(p){ if(!p) return ''; const parts = p.split('/'); if(parts.length <= 3) return p; return '…' + parts.slice(-3).join('/'); }
function debounce(fn, ms=200){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), ms); }; }

function renderResults(rows, q){
  resultsPanel.innerHTML = '';
  if(!rows || rows.length === 0){
    resultsPanel.style.display = 'block';
    resultsPanel.innerHTML = `<div style="padding:12px;color:var(--muted)">No results for <strong>${escapeHtml(q)}</strong></div>`;
    return;
  }
  const frag = document.createDocumentFragment();
  for(const r of rows.slice(0,250)){
    const row = document.createElement('div'); row.className = 'result-row';
    const thumb = document.createElement('div'); thumb.className = 'thumb';
    const bucket = (r.bucket||'').toLowerCase();
    const subtype = r.subtype || '';

    let preview = r.preview || null;
    if(!preview){
      const norm = normalizePath(r.path || '');
      if(previewByPath.has(norm)) preview = previewByPath.get(norm);
    }
    if(!preview){
      const dir = ((r.path||'').replace(/\/[^/]+$/,'') || '').toLowerCase();
      const base = basenameNoExt((r.title||r.path||'')).toLowerCase();
      const k = `${base}|${dir}`;
      if(previewByBaseDir.has(k)) preview = previewByBaseDir.get(k);
    }
    if(!preview) preview = previewPathFromItemPath(r.path || '');

    if(bucket === 'movies' || bucket === 'shows' || bucket === 'books'){
      thumb.classList.add('rect');
      const img = document.createElement('img');
      if(preview){
        img.src = preview;
        img.alt = r.title || '';
        img.loading = 'lazy';
        img.onerror = ()=> { img.style.display='none'; thumb.innerHTML = iconSVG(subtype === 'audio' ? 'audio' : (subtype === 'video' ? 'video' : 'file')); };
        thumb.appendChild(img);
      } else {
        thumb.innerHTML = iconSVG(subtype === 'video' ? 'video' : 'file');
      }
    } else if(bucket === 'gallery'){
      thumb.classList.add('square');
      if(preview){
        const img = document.createElement('img'); img.src = preview; img.alt = r.title || ''; img.loading='lazy';
        img.onerror = ()=> { img.style.display='none'; thumb.innerHTML = iconSVG('file'); };
        thumb.appendChild(img);
      } else {
        thumb.innerHTML = iconSVG('file');
      }
    } else {
      thumb.classList.add('square');
      if(bucket === 'music') thumb.innerHTML = iconSVG('audio');
      else if(bucket === 'files') thumb.innerHTML = iconSVG('file');
      else if(subtype === 'video') thumb.innerHTML = iconSVG('video');
      else thumb.innerHTML = iconSVG('file');
    }

    const meta = document.createElement('div'); meta.className = 'meta';
    const title = document.createElement('div'); title.className = 'title'; title.textContent = friendlyDisplayName(r.title || r.path || '(untitled)');
    const sub = document.createElement('div'); sub.className = 'sub';
    const ext = (r.path || '').split('.').pop() || '';
    let subTxt = (r.bucket || '');
    if(ext && ext.length <= 4) subTxt += ` • .${ext}`;
    sub.textContent = subTxt;
    meta.appendChild(title); meta.appendChild(sub);

    const pathDiv = document.createElement('div'); pathDiv.className = 'result-path'; pathDiv.textContent = shortenPath(r.path);
    row.appendChild(thumb); row.appendChild(meta); row.appendChild(pathDiv);
    row.addEventListener('click', ()=> onResultClick(r));
    frag.appendChild(row);
  }
  resultsPanel.appendChild(frag);
  resultsPanel.style.display = 'block';
}

/* Perform search across the built index (media) + asynchronously query ZIM titles
   Media results show immediately (fast), ZIM results append when ready (non-blocking).
*/
// ---------- performSearch (media-first, ZIM parallel + merge) ----------
let buildPromise = null;
async function performSearch(q){
  const term = (q||'').trim();
  if(!term){ resultsPanel.style.display = 'none'; resultsPanel.innerHTML=''; return []; }

  // Helper: scoring/ranking function to merge media + ZIM results naturally
  function scoreFor(item){
    const title = (item.title||'').toString().toLowerCase();
    const t = term.toLowerCase();
    let s = 0;
    // big boost if title starts with term
    if(title.startsWith(t)) s += 10000;
    // smaller boost for earlier occurrence
    const idx = title.indexOf(t);
    if(idx >= 0) s += Math.max(0, 500 - idx);
    // bucket baseline weights (favor Movies/Shows slightly, but give ZIM decent weight)
    const order = { Movies:800, Shows:700, Music:600, Gallery:450, ZIM:500, Books:400, Files:200 };
    s += (order[item.bucket] || 100);
    // slight preference to shorter title on tie
    s += Math.max(0, 200 - (title.length||0));
    return s;
  }

  // Build media index and search (unchanged UX: show media fast)
  let mediaResults = [];
  try {
    searchLoader.style.display = 'block';
    if(!buildPromise) buildPromise = buildSearchIndex();
    const idx = await buildPromise;
    const t = term.toLowerCase();
    for(const e of idx){
      const hay = `${(e.title||'') + ' ' + (e.path||'') + ' ' + (e.bucket||'')}`.toLowerCase();
      if(hay.includes(t)) mediaResults.push(e);
    }
    // initial sort for immediate render (so UX stays snappy)
    mediaResults.sort((a,b)=>{
      const p = x => ((x.title||'').toLowerCase().startsWith(term.toLowerCase()) ? 0 : 1);
      if(p(a)!==p(b)) return p(a)-p(b);
      const order = { Movies:0, Shows:1, Music:2, Gallery:3, Books:4, Files:5 };
      return (order[a.bucket]||9) - (order[b.bucket]||9);
    });

    // render only the media results immediately
    renderResults(mediaResults, q);
  } catch (e) {
    console.error('media search fail', e);
    resultsPanel.innerHTML = `<div style="padding:12px;color:darkred">Search error</div>`;
    resultsPanel.style.display = 'block';
  } finally {
    searchLoader.style.display = 'none';
  }

  // ----------------- Kick off ZIM suggestions in parallel (non-blocking) -----------------
  try {
    const existingZimSections = resultsPanel.querySelectorAll('[data-zim-section]');
    existingZimSections.forEach(n=>n.remove());

    // Suggest titles from ZIM (fast title-only search)
    const zimMatches = await tryZimSuggest(term, 100);
    //zimLoadingMarker.remove();

    if (zimMatches && zimMatches.length) {
      debugLog('ZIM matches received:', zimMatches.length);

      // Convert ZIM matches to the same object shape as media results so renderResults can handle them
      const zimItems = zimMatches.map(z => ({
        title: z.title || '(untitled)',
        path: z.path || `/zimreader.html?zim=${encodeURIComponent(activeZimPath||'')}&entry=${encodeURIComponent(z.path||'')}`,
        bucket: 'ZIM',
        subtype: 'zim',
        preview: z.preview || null,
        raw: z.raw || z
      }));

      const seen = new Map();
      function keyFor(it){
        const t = (it.title||it.path||'').toString().toLowerCase().trim();
        return t;
      }
      for(const m of mediaResults){
        seen.set(keyFor(m), m);
      }
      for(const z of zimItems){
        const k = keyFor(z);
        if(!seen.has(k)) seen.set(k, z);
      }

      // Create combined array and sort by our score function (descending)
      const combined = Array.from(seen.values());
      combined.sort((a,b) => {
        const sa = scoreFor(a), sb = scoreFor(b);
        if(sa !== sb) return sb - sa; // higher score first
        // fallback: prefer items whose title starts with term
        const ta = (a.title||'').toLowerCase().startsWith(term.toLowerCase()) ? 1 : 0;
        const tb = (b.title||'').toLowerCase().startsWith(term.toLowerCase()) ? 1 : 0;
        if(ta !== tb) return tb - ta;
        // fallback bucket order
        const order = { Movies:0, Shows:1, Music:2, Gallery:3, ZIM:4, Books:5, Files:6 };
        return (order[a.bucket]||9) - (order[b.bucket]||9);
      });

      // Re-render combined results (keeps the same row look as other items)
      renderResults(combined, q);
    } else {
      debugLog('No ZIM matches for', term);
      // nothing to merge — keep media-only results already rendered
    }
  } catch (e) {
    console.warn('ZIM search failed', e);
  }

  // return mediaResults immediately (existing callers may use this)
  return mediaResults;
}


/* Result click navigation
   Books open directly to the file.
*/
function onResultClick(item){
  const p = item.path || '';
  if(item.bucket === 'Files'){
    const url = p.startsWith('/') ? p : '/' + p;
    const a = document.createElement('a'); a.href = url; a.download = item.title || ''; document.body.appendChild(a); a.click(); a.remove();
    return;
  }
  if(item.bucket === 'Books'){
    const url = (p.startsWith('/') ? p : '/' + p);
    window.location.href = url;
    return;
  }
  if(item.bucket === 'Movies'){ window.location.href = `/movies#open=${encodeURIComponent(p)}`; return; }
  if(item.bucket === 'Shows'){ window.location.href = `/shows#open=${encodeURIComponent(p)}`; return; }
  if(item.bucket === 'Music'){ window.location.href = `/music#play=${encodeURIComponent(p)}`; return; }
  if(item.bucket === 'Gallery'){ window.location.href = `/gallery#open=${encodeURIComponent(p)}`; return; }

  // New: ZIM search hits — open the zimreader page with query params
  if(item.bucket === 'ZIM') {
    // item.path has the special URL:
    // /zimreader.html?zim=<zimPath>&entry=<entryPath>
    window.location.href = item.path;
    return;
  }

  window.location.href = `/${(item.bucket||'').toLowerCase()}`;
}

/* Wiring & events */
searchInput.addEventListener('input', debounce((e) => {
  const v = e.target.value || '';
  if(!v.trim()){ resultsPanel.style.display='none'; resultsPanel.innerHTML=''; return; }
  performSearch(v);
}, 200));

document.addEventListener('click', (ev) => {
  if(!resultsPanel.contains(ev.target) && ev.target !== searchInput) { resultsPanel.style.display='none'; }
});

/* warm index and load resume on boot */
(function warm(){ try{ buildPromise = buildSearchIndex(); }catch(e){ console.warn('warm failed', e); } })();

/* Initialize resume (render quickly, then enrich with previews after index completes) */
(async function initResume(){
  try {
    const raw = await collectResumeItems();
    if(!raw || !raw.length) { resumePanel.style.display='none'; return; }

    const normalized = raw.map(r => ({
      path: r.path || r.file || (typeof r === 'string' ? r : ''),
      title: r.title || r.name || '',
      position: (r.position || r.pos || (r.raw && (r.raw.position||r.raw.pos)) || 0),
      updated: r.updated || (r.raw && (r.raw.updated||r.raw.ts)) || Date.now(),
      raw: r.raw || r
    })).filter(x => x.path);

    // Render immediately (fast feedback)
    renderResume(normalized);

    // After index is built, re-render so preview maps can populate thumbnails
    if(!buildPromise) buildPromise = buildSearchIndex();
    buildPromise.then(() => {
      try { renderResume(normalized); } catch(e) { console.warn('post-index resume re-render failed', e); }
    }).catch(()=>{/* ignore */});

  } catch(e){ console.warn('resume load fail', e); }
})();

/* ESC to close results */
document.addEventListener('keydown', (e) => { if(e.key === 'Escape'){ resultsPanel.style.display='none'; } });
</script>

<!DOCTYPE html>

<html lang="en">
<head>
    <link rel="stylesheet" href="/master.css">
    <script>
(function() {
  try {
    const isDark = localStorage.getItem('nomad_dark_mode') === 'true';
    if (isDark) document.documentElement.classList.add('dark');

    const saved = localStorage.getItem('nomad_custom_theme');
    if (saved) {
      const colors = JSON.parse(saved);
      const style = document.createElement('style');
      style.id = 'custom-theme-style';
      style.textContent = `
        :root {
          --primary: ${colors.primary} !important;
          --primary-dark: ${colors.primaryDark} !important;
          --bg: ${colors.bgLight} !important;
          --card: ${colors.cardLight} !important;
          --card-bg: ${colors.cardLight} !important;
          --text: ${colors.textLight} !important;
          --muted: ${colors.mutedLight} !important;
        }
        body.dark {
          --bg: ${colors.bgDark} !important;
          --card: ${colors.cardDark} !important;
          --card-bg: ${colors.cardDark} !important;
          --text: ${colors.textDark} !important;
          --muted: ${colors.mutedDark} !important;
          --primary: ${colors.primaryDarkTheme} !important;
        }
      `;
      document.head.appendChild(style);
    }
  } catch(e) {}
})();
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nomad — File Manager</title>
  <script src="theme-manager.js"></script>
  <style>
    :root {
      --primary: #007bff;
      --primary-dark: #0056b3;
      --success: #28a745;
      --warning: #ffc107;
      --danger: #dc3545;
      --info: #17a2b8;
      --secondary: #6c757d;
      
      /* Light theme */
      --bg: #f8f9fa;
      --text: #212529;
      --muted: #6c757d;
      --card-bg: #ffffff;
      --card-border: #dee2e6;
      --header-text: #ffffff;
      --shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
      --shadow-large: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
      --radius: 0.375rem;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Courier New", monospace;
    }

    /* Dark theme */
    body.dark {
      --bg: #121212;
      --text: #e9ecef;
      --muted: #adb5bd;
      --card-bg: #1e1e1e;
      --card-border: #343a40;
      --header-text: #ffffff;
      --shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.3);
      --shadow-large: 0 0.5rem 1rem rgba(0, 0, 0, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
    }

    /* Main container */
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 250px;
      background: var(--card-bg);
      border-right: 1px solid var(--card-border);
      padding: 1rem;
      overflow-y: auto;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .sidebar h3 {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .shortcut-list {
      list-style: none;
    }

    .shortcut-item {
      padding: 0.5rem 0.75rem;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background-color 0.2s;
      font-size: 0.875rem;
    }

    .shortcut-item:hover {
      background: rgba(0, 123, 255, 0.1);
    }

    .shortcut-item.active {
      background: var(--primary);
      color: var(--header-text);
    }

    /* Content area */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Controls bar */
    .controls-bar {
      background: var(--card-bg);
      border-bottom: 1px solid var(--card-border);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      box-shadow: var(--shadow);
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .controls-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .controls-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Back button styling */
    .back-button {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text);
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }

    .back-button:hover:not(:disabled) {
      background: var(--primary);
      color: var(--header-text);
      border-color: var(--primary);
    }

    .back-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .back-button-icon {
      margin-right: 0.5rem;
      font-size: 1.2rem;
    }

    .path-display {
      font-family: var(--mono);
      font-size: 0.875rem;
      color: var(--muted);
      background: rgba(0, 123, 255, 0.1);
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius);
    }

    .selected-info {
      font-size: 0.875rem;
      color: var(--text);
      font-weight: 500;
    }

    /* File list area */
    .file-area {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 2rem;
    }

    /* Buttons */
    .btn {
      background: var(--card-bg);
      color: var(--text);
      border: 1px solid var(--card-border);
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn:hover:not(:disabled) {
      background: var(--primary);
      color: var(--header-text);
      border-color: var(--primary);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn.primary {
      background: var(--primary);
      color: var(--header-text);
      border-color: var(--primary);
    }

    .btn.primary:hover:not(:disabled) {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
    }

    .btn.danger {
      background: var(--danger);
      color: white;
      border-color: var(--danger);
    }

    .btn.danger:hover:not(:disabled) {
      background: #c82333;
      border-color: #c82333;
    }

    /* File list */
    .file-list {
      list-style: none;
    }

    .file-item {
      display: flex;
      align-items: center;
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background-color 0.2s;
      border: 1px solid transparent;
    }

    .file-item:hover {
      background: rgba(0, 123, 255, 0.05);
    }

    .file-item.selected {
      background: rgba(0, 123, 255, 0.1);
      border-color: var(--primary);
    }

    /* Controls bar (Back button + actions) */
    .controls-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid transparent;
    }

    .controls-left,
    .controls-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.375rem 0.75rem;
      border-radius: var(--radius);
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
      transition: background-color 0.15s, border-color 0.15s, color 0.15s;
      color: inherit;
      font: inherit;
    }

    .back-button:hover:not(:disabled) {
      background: rgba(0, 0, 0, 0.04);
      border-color: rgba(0, 0, 0, 0.06);
    }

    .back-button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .back-button-icon {
      font-weight: 600;
      line-height: 0;
    }

    .path-display {
      font-family: monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 40ch;
    }

    .file-item .meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex: 1;
    }

    .file-name {
      font-weight: 500;
    }

    .file-type {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .file-icon {
      font-size: 1.25rem;
      width: 1.25rem;
      height: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Status and progress */
    .status-line {
      font-size: 0.875rem;
      color: var(--muted);
      padding: 0.5rem 0;
    }

    .upload-progress {
      width: 100%;
      height: 4px;
      background: var(--card-border);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 0.5rem;
      display: none;
    }

    .upload-progress > div {
      height: 100%;
      background: var(--primary);
      transition: width 0.3s;
      width: 0%;
    }

    /* Modal */
    .modal-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .modal-backdrop[style*="display: flex"] {
      display: flex !important;
    }

    .modal {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 2rem;
      max-width: 90vw;
      max-height: 90vh;
      width: 800px;
      box-shadow: var(--shadow-large);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .editor {
      width: 100%;
      min-height: 400px;
      flex: 1;
      font-family: var(--mono);
      font-size: 0.875rem;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 1rem;
      resize: vertical;
    }

    /* Utility classes */
    .small {
      font-size: 0.75rem;
    }

    .muted {
      color: var(--muted);
    }

    .empty {
      text-align: center;
      color: var(--muted);
      font-style: italic;
      padding: 2rem;
    }

   
    @media (max-width: 768px) {
      .main-container {
        flex-direction: column;
      }
      
      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--card-border);
      }
      
      .controls-bar {
        padding: 1rem;
        flex-direction: column;
        align-items: stretch;
      }
      
      .controls-left,
      .controls-right {
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <!-- Hidden upload input -->

      </div>
      <textarea id="editor-area" class="editor" spellcheck="false" aria-label="Editor"></textarea>
    </div>
  </div>

  <script src="assets/jquery.min.js"></script>

  <script>
  (function(){
    'use strict';

    /* Endpoints and config */
    const indexEndpoint = '/api/index';
    const nestedIndexEndpoint = '/api/index-nested';
    const connectorEndpoint = '/connector';
    const uploadEndpoint = '/upload';
    const mkdirEndpoint = '/mkdir';
    const deleteEndpoint = '/delete';
    const renameEndpoint = '/rename';
    const saveEndpoint = '/save';
    const reindexEndpoint = '/api/reindex';

    const CACHE_TTL = 30 * 1000;
    const THEME_KEY = 'nomad_dark_mode';
    const POLL_NEW_ATTEMPTS = 18;
    const POLL_NEW_DELAY = 700;
    const UPLOAD_TIMEOUT = 5 * 60 * 1000;
    const DEFAULT_MAX_UPLOAD_BYTES = 200 * 1024 * 1024;
    const INLINE_INDEX_POLL_MS = 700;
    const INLINE_INDEX_POLL_ATTEMPTS = 20;
    // Navigation history
    const navigationHistory = [];

    function addToHistory(path) {
      // Don't add if it's the same as the current path
      if (navigationHistory.length > 0 && navigationHistory[navigationHistory.length - 1] === path) {
        return;
      }
      navigationHistory.push(path);
      // Limit history to 50 entries
      if (navigationHistory.length > 50) {
        navigationHistory.shift();
      }
      updateBackButton();
    }

    function goBack() {
      if (navigationHistory.length < 2) {
        // If we don't have history, go to root
        navigateToDirectory('/');
        return;
      }

      // Remove current path
      navigationHistory.pop();

      // Get previous path
      const previousPath = navigationHistory[navigationHistory.length - 1] || '/';

      // Navigate to previous path
      navigateToDirectory(previousPath);
    }

    function updateBackButton() {
      const $backButton = $('#back-button');
      // Enable back button if we have history or we're not at root
      $backButton.prop('disabled', navigationHistory.length < 2 && (typeof currentPath === 'undefined' || currentPath === '/'));
    }

    // Attach a handler for a back button (if present in DOM)
    $(document).on('click', '#back-button', function (e) {
      e.preventDefault();
      goBack();
    });

    /* Elements */
    let $rootItems = $('#root-items');
    const $statusLine = $('#status-line');
    const $uploadInput = $('#upload-input');
    const $uploadProgress = $('#upload-progress');
    const $uploadBar = $('#upload-progress > div');
    const $btnUpload = $('#btn-upload');

    const $btnNewFolder = $('#btn-new-folder');
    const $btnRename = $('#btn-rename');
    const $btnDelete = $('#btn-delete');
    const $btnDownload = $('#btn-download');
    const $btnEdit = $('#btn-edit');
    const $currentPath = $('#current-path');
    const $selectedName = $('#selected-name');
    const $editorModal = $('#editor-modal');
    const $editorArea  = $('#editor-area');
    const $editorTitle = $('#editor-title');

    /* State */
    let indexCache = new Map();
    let selectedPath = null;
    let selectedIsDir = false;
    let outstandingOps = 0;
    let currentPath = '/';
    let MAX_UPLOAD_BYTES = DEFAULT_MAX_UPLOAD_BYTES;

    /* Utilities */
    function norm(p){ if(p===undefined || p===null) return '/'; p = String(p); if(!p.startsWith('/')) p='/' + p; p = p.replace(/\/+/g,'/'); while(p.length>1 && p.endsWith('/')) p=p.slice(0,-1); return p === '' ? '/' : p; }
    function joinPath(a,b){ a = norm(a||'/'); if (a === '/') return norm('/' + b); return norm(a + '/' + b); }
    function parentDir(p){ p = norm(p); if (p === '/') return '/'; const i = p.lastIndexOf('/'); return i<=0?'/':p.slice(0,i); }
    function basename(p){ p = norm(p); if (p === '/') return '/'; const i = p.lastIndexOf('/'); return i>=0? p.slice(i+1): p; }
    function isTextFile(n){ return /\.(txt|json|html?|css|js|md|xml|csv|yml|yaml|ini|conf)$/i.test(n); }
    function fileCategory(name){
      if (!name) return 'file';
      const ext = (name.split('.').pop()||'').toLowerCase();
      if (/^(mp4|mkv|avi|mov|webm|mpg|mpeg|ts|m2ts)$/.test(ext)) return 'video';
      if (/^(mp3|flac|wav|m4a|aac|ogg|opus)$/.test(ext)) return 'audio';
      if (/^(epub|pdf|mobi|azw3|fb2)$/.test(ext)) return 'book';
      if (/^(jpg|jpeg|png|gif|webp|bmp|tiff)$/.test(ext)) return 'image';
      if (/^(txt|md|json|xml|csv|html|htm|css|js|ini|conf|yml|yaml)$/i.test(ext)) return 'text';
      return 'file';
    }
    function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

    function setBusy(msg){ 
      outstandingOps++; 
      $statusLine.text(msg || 'Working…'); 
      $('.controls-right .btn').prop('disabled', true); 
      $btnUpload.prop('disabled', true); 
      $btnNewFolder.prop('disabled', true);
    }
    
    function clearBusy(msg){
      outstandingOps = Math.max(0, outstandingOps-1);
      if (outstandingOps === 0) {
        $('.controls-right .btn').prop('disabled', false);
        $btnUpload.prop('disabled', false);
        $btnNewFolder.prop('disabled', false);
        $statusLine.text(msg || 'Ready');
      } else {
        $statusLine.text(msg || ('Working ('+outstandingOps+')…'));
      }
      updateButtons();
    }

    function updateButtons(){
      const has = !!selectedPath;
      $btnRename.prop('disabled', !has);
      $btnDelete.prop('disabled', !has);
      $btnDownload.prop('disabled', !(has && !selectedIsDir));
      $btnEdit.prop('disabled', !(has && !selectedIsDir && isTextFile(basename(selectedPath))));
    }

    /* Simple cache wrapper */
    function cachePut(key, value){
      indexCache.set(key, { ts: Date.now(), data: value });
      try { console.log('cachePut:', { key, hasData: !!value }); } catch (_) {}
    }

    function cacheGet(key){
      const v = indexCache.get(key);
      if (!v) {
        try { console.log('cacheGet: miss', { key }); } catch (_) {}
        return null;
      }
      if ((Date.now() - v.ts) > CACHE_TTL) {
        indexCache.delete(key);
        try { console.log('cacheGet: expired', { key }); } catch (_) {}
        return null;
      }
      try { console.log('cacheGet: hit', { key }); } catch (_) {}
      return v.data;
    }

    function clearCachePrefix(path){
      path = norm(path);
      for (const k of Array.from(indexCache.keys())){
        if (k === path || k.startsWith(path + '/') || path.startsWith(k + '/')) indexCache.delete(k);
      }
    }

    /* Index parsing */
    function parseIndexText(text){
      try {
        const j = JSON.parse(text);
        if (Array.isArray(j)) return { header: null, entries: j };
        if (j && j.entries && Array.isArray(j.entries)) return { header: j.header || null, entries: j.entries };
      } catch(e){}
      // try ndjson lines
      const lines = (text||'').split('\n').filter(Boolean);
      let header = null; const entries = [];
      for (let i=0;i<lines.length;i++){
        try {
          const o = JSON.parse(lines[i]);
          if (i===0 && o && !o.n) { header = o; continue; }
          entries.push(o);
        } catch(e){}
      }
      return { header, entries };
    }

    function connectorHtmlToEntries(html){
      const tmp = document.createElement('div'); tmp.innerHTML = html;
      const li = tmp.querySelectorAll('li');
      const ents = [];
      li.forEach(item => {
        let a = item.querySelector('a');
        let txt = (a && a.textContent) ? a.textContent.trim() : item.textContent.trim();
        let rel = (a && (a.getAttribute('rel') || a.getAttribute('href'))) || txt;
        let isDir = item.classList.contains('directory') || /\/$/.test(rel);
        let full = rel.startsWith('/') ? norm(rel) : norm('/' + rel);
        ents.push({ n: txt, t: isDir ? 'd' : 'f', p: full });
      });
      return { header:null, entries:ents };
    }

    /* AJAX helpers */
    function ajaxPost(url, data, timeout = 30000) {
      return new Promise((resolve, reject) => {
        $.ajax({
          url: url,
          method: 'POST',
          data: data,
          timeout: timeout,
          success: resolve,
          error: (xhr, status, error) => {
            reject(new Error(`${status}: ${error || xhr.responseText || 'Unknown error'}`));
          }
        });
      });
    }

    /* Reindex and polling functions */
    async function triggerReindex(path) {
      try {
        await ajaxPost(reindexEndpoint, { path: path || '/' }, 10000);
      } catch (e) {
        console.warn('Reindex trigger failed:', e);
      }
    }

    async function pollForIndexAndRefresh(path) {
      for (let i = 0; i < INLINE_INDEX_POLL_ATTEMPTS; i++) {
        await sleep(INLINE_INDEX_POLL_MS);
        clearCachePrefix(path);
        try {
          const idx = await fetchIndexDirect(path);
          if (idx && idx.entries && idx.entries.length > 0) {
            return true;
          }
        } catch (e) {
          // continue polling
        }
      }
      return false;
    }

    /* fetchIndexDirect: tries index API, handles 202 (building) by polling, falls back to nested endpoint, static index files, then connector */
    async function fetchIndexDirect(path){
      path = norm(path);
      const cached = cacheGet(path);
      if (cached) return cached;

      // 1) try index endpoint that can build inline
      try {
        const res = await fetch(indexEndpoint + '?path=' + encodeURIComponent(path), { cache: 'no-store' });
        if (res.status === 200) {
          const txt = await res.text();
          const parsed = parseIndexText(txt);
          cachePut(path, parsed);
          return parsed;
        }
        if (res.status === 202) {
          // building, poll for completion
          for (let i = 0; i < INLINE_INDEX_POLL_ATTEMPTS; i++) {
            await sleep(INLINE_INDEX_POLL_MS);
            const res2 = await fetch(indexEndpoint + '?path=' + encodeURIComponent(path), { cache: 'no-store' });
            if (res2.status === 200) {
              const txt = await res2.text();
              const parsed = parseIndexText(txt);
              cachePut(path, parsed);
              return parsed;
            }
          }
        }
      } catch(e){
        console.warn('Index endpoint failed:', e);
      }

      // 2) legacy endpoint
      try {
        const res = await fetch(nestedIndexEndpoint + '?path=' + encodeURIComponent(path), { cache: 'no-store' });
        if (res.ok) {
          const txt = await res.text();
          const parsed = parseIndexText(txt);
          cachePut(path, parsed);
          return parsed;
        }
      } catch(e){}

      // 3) try direct index files (ndjson/json) - including root.index files
      let staticTries;
      if (path === '/') {
        staticTries = [
          '/root.index.ndjson',
          '/.index.ndjson',
          '/index.ndjson',
          '/root.index.json',
          '/.index.json',
          '/index.json',
        ];
      } else {
        staticTries = [
          norm(path + '/.index.ndjson'),
          norm(path + '/index.ndjson'),
          norm(path + '/.index.json'),
          norm(path + '/index.json'),
        ];
      }
      
      for (const url of staticTries){
        try {
          const r = await fetch(url, { cache: 'no-store' });
          if (r.ok) {
            const txt = await r.text();
            const parsed = parseIndexText(txt);
            cachePut(path, parsed);
            return parsed;
          }
        } catch(e){}
      }

      // 4) connector fallback (HTML directory listing)
      try {
        const html = await ajaxPost(connectorEndpoint, { dir: path });
        const parsed = connectorHtmlToEntries(html);
        cachePut(path, parsed);
        return parsed;
      } catch(e){
        console.warn('Connector fallback failed:', e);
      }

      const empty = { header:null, entries:[] };
      cachePut(path, empty);
      return empty;
    }

    /* fetchIndex: attempt direct, and if empty, walk parents */
    async function fetchIndex(path){
      path = norm(path);
      
      // For root directory, always try direct first
      if (path === '/') {
        const direct = await fetchIndexDirect(path);
        if (direct && Array.isArray(direct.entries)) {
          return direct;
        }
        return { header: null, entries: [] };
      }
      
      const direct = await fetchIndexDirect(path);
      if (direct && Array.isArray(direct.entries) && direct.entries.length > 0) return direct;

      // walk up parents
      let p = path;
      while (true){
        const parent = parentDir(p);
        if (parent === p) break;
        p = parent;
        const cand = await fetchIndexDirect(p);
        if (cand && Array.isArray(cand.entries) && cand.entries.length > 0) return cand;
        if (p === '/') break;
      }

      const root = await fetchIndexDirect('/');
      return root || { header:null, entries:[] };
    }

    /* Normalize server entries into the flat listing for a given requestedPath */
    function normalizeIndexEntries(idx, requestedPath){
      requestedPath = norm(requestedPath);
      const raw = (idx && idx.entries) ? idx.entries : [];
      const map = new Map();

      // Debug logging: initial call
      try {
        console.log('normalizeIndexEntries called with:', { requestedPath, raw });
      } catch (err) {
        /* ignore logging errors in constrained environments */
      }

      for (const e of raw){
        let full = e.p || e.path || null;
        if (!full && e.n && String(e.n).startsWith('/')) full = e.n;
        if (!full && e.n) {
          // If e.n looks like an absolute path use it, otherwise join with requestedPath
          full = (String(e.n).startsWith('/') ? e.n : joinPath(requestedPath, e.n));
        }
        if (!full) continue;
        full = norm(full);

        // For root directory, include all top-level items
        if (requestedPath === '/') {
          // Get the first path component
          const pathParts = full.split('/').filter(Boolean);
          if (pathParts.length >= 1) {
            const name = pathParts[0];
            // Check if there are other entries with the same name that indicate children
            const hasChildren = raw.some(other => {
              if (other === e) return false;
              const otherFull = norm(other.p || other.path || (other.n && String(other.n).startsWith('/') ? other.n : joinPath(requestedPath, other.n)) || '');
              if (!otherFull || otherFull === full) return false;
              const otherParts = otherFull.split('/').filter(Boolean);
              return otherParts.length > pathParts.length && otherParts[0] === name;
            });
            // For root items, they are directories if:
            // 1. They have nested content (more than one path component)
            // 2. They are explicitly marked as directories
            // 3. Other entries indicate they have children
            const explicitlyDir = (e.t === 'd' || e.type === 'dir' || e.kind === 'dir') || String(e.n || '').endsWith('/');
            const isDir = explicitlyDir || (pathParts.length > 1) || hasChildren;
            // If we've already seen this top-level name, prefer directory over file
            const existing = map.get(name);
            if (!existing) {
              map.set(name, { n: name, t: isDir ? 'd' : 'f' });
              try { console.log('normalizeIndexEntries added root item:', { name, isDir }); } catch (_) {}
            } else if (isDir) {
              existing.t = 'd';
              try { console.log('normalizeIndexEntries upgraded root item to dir:', { name }); } catch (_) {}
            }
          }
          continue;
        }

        // Debug logging for each entry
        try {
          console.log('normalizeIndexEntries processing entry:', { entry: e, full });
        } catch (err) {
          /* ignore logging errors */
        }

        // Heuristic: check if any other raw entry indicates this path has children.
        // This helps detect directories when the entry itself isn't explicitly marked.
        const hasChildren = (() => {
          try {
            const prefix = full === '/' ? '/' : (full.endsWith('/') ? full : full + '/');
            for (const oe of raw) {
              if (oe === e) continue;
              let ofull = oe.p || oe.path || null;
              if (!ofull && oe.n && String(oe.n).startsWith('/')) ofull = oe.n;
              if (!ofull && oe.n) ofull = joinPath(requestedPath, oe.n);
              if (!ofull) continue;
              ofull = norm(ofull);
              if (ofull === full) {
                if (oe.t === 'd' || oe.type === 'dir' || oe.kind === 'dir' || String(oe.n || '').endsWith('/')) return true;
                continue;
              }
              if (ofull.startsWith(prefix)) return true;
            }
          } catch (_) {}
          return false;
        })();

        // For root directory, include all top-level items
        if (requestedPath === '/' || requestedPath === '') {
          // Normalize the full path and get the first non-empty component
          const parts = String(full || '').split('/').filter(Boolean);
          if (parts.length >= 1) {
            const name = parts[0];
            if (!name) continue;
            const explicitlyDir = (e.t === 'd' || e.type === 'dir' || e.kind === 'dir') || String(e.n || '').endsWith('/');
            const hasNested = parts.length > 1;
            const isDir = explicitlyDir || hasNested || hasChildren;
            // If we've already seen this top-level name, prefer directory over file
            const existing = map.get(name);
            if (!existing) {
              map.set(name, { n: name, t: isDir ? 'd' : 'f' });
              try { console.log('normalizeIndexEntries added root item:', { name, isDir }); } catch (_) {}
            } else if (isDir) {
              existing.t = 'd';
              try { console.log('normalizeIndexEntries upgraded root item to dir:', { name }); } catch (_) {}
            }
          }
          continue;
        }

        // For nested directories, only include items that are direct children
        // Normalize requestedPath (remove trailing slash) to avoid mismatches
        const normalizedRequested = requestedPath.endsWith('/') ? requestedPath.slice(0, -1) : requestedPath;
        const normalizedRequestedLower = normalizedRequested.toLowerCase();
        if (full !== normalizedRequested && !full.toLowerCase().startsWith(normalizedRequestedLower + '/')) continue;
        const rel = full === normalizedRequested ? '' : full.slice(normalizedRequested.length + 1);
        if (rel === '') continue;
        const first = rel.split('/')[0];
        if (!first) continue;
        const explicitlyDir = (e.t === 'd' || e.type === 'dir' || e.kind === 'dir') || String(e.n || '').endsWith('/');
        const isDir = explicitlyDir || (rel.indexOf('/') !== -1) || hasChildren;
        const existing = map.get(first);
        if (!existing) {
          // Mark entries for directories so render/click handlers can
          // optionally deselect items when navigating into directories.
          map.set(first, { n: first, t: isDir ? 'd' : 'f', deselectOnNavigate: !!isDir });
          try { console.log('normalizeIndexEntries added nested item:', { name: first, isDir, deselectOnNavigate: !!isDir }); } catch (_) {}
        } else if (isDir) {
          existing.t = 'd';
          try { console.log('normalizeIndexEntries upgraded nested item to dir:', { name: first }); } catch (_) {}
        }
      }

      const out = Array.from(map.values());
      out.sort((a,b) => {
        if (a.t==='d' && b.t!=='d') return -1;
        if (a.t!=='d' && b.t==='d') return 1;
        return a.n.localeCompare(b.n, undefined, {sensitivity:'base'});
      });
      return out;
    }

    /* Render functions */
    async function renderDirectory(path){
      const showPath = norm(path || '/');
      currentPath = showPath;
      try { console.debug('renderDirectory called', { rawPath: path, normalized: showPath, currentPath }); } catch (_) {}
      try { console.debug('Preparing to update current path display to:', showPath); } catch (_) {}
      $currentPath.text(showPath);
      
      // Update sidebar active state
      $('.shortcut-item').removeClass('active');
      $(`.shortcut-item[data-path="${showPath}"]`).addClass('active');
      
      try {
        const idx = await fetchIndex(showPath);
        const entries = normalizeIndexEntries(idx, showPath);
        const dirs = entries.filter(e => e.t === 'd');
        const files = entries.filter(e => e.t !== 'd');
        const frag = document.createDocumentFragment();

        if (dirs.length === 0 && files.length === 0) {
          const li = document.createElement('li'); 
          li.className = 'empty'; 
          li.textContent = 'No files found';
          frag.appendChild(li);
        } else {
          // Add directories first
          if (dirs.length > 0) {
            for (const d of dirs) {
              const item = createFileItemElement(d.n, joinPath(showPath, d.n), true);
              frag.appendChild(item);
            }
          }
          
          // Add files
          if (files.length > 0) {
            for (const f of files) {
              const item = createFileItemElement(f.n, joinPath(showPath, f.n), false);
              frag.appendChild(item);
            }
          }
        }

        $rootItems.empty().append(frag);
        $statusLine.text(`Loaded ${dirs.length + files.length} items`);
      } catch (err) {
        console.error('renderDirectory error:', err);
        $rootItems.html('<li class="empty">Failed to load directory</li>');
        $statusLine.text('Failed to load directory');
      }
    }

      navigateToDirectory = async function(path) {

      /* Selection and button state */
      function selectItem(rel, isDir, displayName){

      // Event listeners

      // Default to download

    // Replace your existing uploadFiles(...) with this implementation
    async function uploadFiles(files, targetDir) {
      if (!files || files.length === 0) return;
    
      // Normalize / compute target directory
      targetDir = (typeof targetDir === 'string' && targetDir) ? norm(targetDir) : norm(currentPath || '/');
    
      // Prepare two flavors: no-leading-slash (dir) and absolute (path)
      const dirNoLead = (targetDir === '/' ? '' : (targetDir.startsWith('/') ? targetDir.slice(1) : targetDir));
      const dirAbs = targetDir;
    
      setBusy(`Uploading ${files.length} file(s) to ${targetDir}...`);
      $uploadBar.css('width', '0%');
      $uploadProgress.show();
    
      try {
        for (let i = 0; i < files.length; i++) {
          const file = files[i];
    
          // IMPORTANT: append directory/form fields FIRST so the server sees them before the file part
          const formData = new FormData();
          // append the single field your backend requires ('dir') first (no leading slash is fine)
          formData.append('dir', dirNoLead || '/'.replace('/', '')); // if root, send empty or "/"? send empty string yields "/" at server
          // also send absolute path under other field names for compatibility if desired
          formData.append('dir_abs', dirAbs);
          formData.append('path', dirAbs);
          formData.append('destination', dirAbs);
          formData.append('overwrite', '1');
    
          // now append the file LAST — so the server gets form fields before file part
          formData.append('file', file, file.name);
    
          // Create XHR to track progress
          const xhr = new XMLHttpRequest();
          xhr.open('POST', uploadEndpoint, true);
          xhr.timeout = UPLOAD_TIMEOUT;
    
          await new Promise((resolve, reject) => {
            xhr.upload.onprogress = function(e) {
              if (e.lengthComputable) {
                const pct = Math.round(e.loaded / e.total * 100);
                $uploadBar.css('width', pct + '%');
                $statusLine.text(`Uploading ${file.name}: ${pct}%`);
              }
            };
    
            xhr.onload = function() {
              if (xhr.status === 200 || xhr.status === 201 || xhr.status === 204) {
                resolve();
              } else {
                const serverMsg = (xhr.responseText && xhr.responseText.length < 2000) ? ' - ' + xhr.responseText : '';
                reject(new Error(`Upload failed: ${xhr.status} ${xhr.statusText}${serverMsg}`));
              }
            };
    
            xhr.onerror = () => reject(new Error('Upload failed (network)'));
            xhr.ontimeout = () => reject(new Error('Upload timeout'));
            xhr.send(formData);
          });
        }
    
        $uploadProgress.hide();
        $uploadBar.css('width', '0%');
        triggerReindex(targetDir);
        await sleep(800);
        clearBusy('Upload completed');
        renderDirectory(targetDir);
    
      } catch (err) {
        $uploadProgress.hide();
        $uploadBar.css('width', '0%');
        clearBusy('Upload failed');
        console.error('uploadFiles error:', err);
        alert('Upload failed: ' + (err && err.message ? err.message : String(err)));
        $statusLine.text('Upload failed');
      } finally {
        // Reset file input so re-selecting the same file triggers change
        try { $uploadInput.val(''); } catch (_) {}
      }
    }

    // Ensure clean bindings and attach handlers once
    
    // helper: dirname similar to path.dirname
    function dirname(path) {
      if (!path) return '/';
      // remove trailing slash except for root
      path = String(path);
      if (path.length > 1 && path.endsWith('/')) path = path.slice(0, -1);
      const idx = path.lastIndexOf('/');
      if (idx <= 0) return '/';
      return path.slice(0, idx) || '/';
    }
    
    // helper: safe normalize - use existing norm() if present, otherwise simple normalizer
    function safeNormalize(p) {
      if (typeof norm === 'function') return norm(p || '/');
      // fallback normalization: ensure leading slash and no trailing (unless root)
      if (!p) return '/';
      p = String(p).trim();
      if (!p.startsWith('/')) p = '/' + p;
      if (p.length > 1 && p.endsWith('/')) p = p.slice(0, -1);

    function readToolbarSelectedInfo() {

      for (const sel of selectors) {

        let txt = (el.textContent || el.innerText || '').trim();
        if (!txt) continue;
    
        // Some toolbar text might be like "Selected: /Music/Artist/Album" or "Path: /Movies"
        // Try to extract a path-like substring using a regex
        const match = txt.match(/(\/[^\s]*)/); // first slash + non-space chunk
        if (match && match[1]) return safeNormalize(match[1]);
    
        // If the whole text looks like a path, return it
        if (txt.startsWith('/')) return safeNormalize(txt);
    
        // fallback: if it looks like "Music/Artist/..." without leading slash
        if (txt.includes('/') && !txt.includes(' ')) return safeNormalize('/' + txt);
      }
    
      return null;
    }
    
    // Determine the best upload target at the moment of action
    function getUploadTarget() {
      // 1) If a selection exists in the UI and is a file -> use its parent dir
      try {
        if (typeof selectedPath === 'string' && selectedPath) {
          if (selectedIsDir) {
            return safeNormalize(selectedPath);
          } else {
            return safeNormalize(dirname(selectedPath));
          }
        }
      } catch (err) {
        // ignore and continue to toolbar detection
        console.debug('getUploadTarget: selectedPath check failed', err);
      }
    
      // 2) Try toolbar "selected info" indicator
      try {
        const tb = readToolbarSelectedInfo();
        if (tb) return tb;
      } catch (err) {
        console.debug('getUploadTarget: toolbar read failed', err);
      }
    
      // 3) fallback to currentPath if present
      try {
        if (typeof currentPath === 'string' && currentPath) return safeNormalize(currentPath);
      } catch (err) {
        // ignore
      }
    
      // 4) absolute fallback root
      return '/';
    }
    
    // --- Upload button / input wiring (use getUploadTarget) ---
    // When opening the file picker, record the best target at click time
    $btnUpload.off('click').on('click', () => {
      const target = getUploadTarget();
      $uploadInput.data('targetDir', target);
      $uploadInput.click();
    });
    
    // When the file input changes, use the recorded 'targetDir' (fallback to getUploadTarget())
    $uploadInput.off('change').on('change', (e) => {
      const files = e.target && e.target.files ? e.target.files : null;
      let recorded = $uploadInput.data('targetDir');
      if (!recorded || typeof recorded !== 'string') {
        recorded = getUploadTarget();
      }
      uploadFiles(files, recorded);
    });
    
    $btnNewFolder.off('click').on('click', createFolder);
    $btnRename.off('click').on('click', renameItem);
    $btnDelete.off('click').on('click', deleteItem);
    $btnDownload.off('click').on('click', () => {
      if (selectedPath && !selectedIsDir && typeof downloadFile === 'function') downloadFile(selectedPath);
    });
    $btnEdit.off('click').on('click', () => {
      if (selectedPath && !selectedIsDir) openEditor(selectedPath);
    });
    
    $('#editor-cancel').off('click').on('click', () => $editorModal.hide().attr('aria-hidden', 'true'));
    $('#editor-save').off('click').on('click', saveEditor);
    $('#editor-download').off('click').on('click', () => {
      const content = $editorArea.val();
      const blob = new Blob([content], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = basename($editorTitle.text().replace(/^Edit:\s*/, ''));
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });
    
    // keyboard shortcuts and global keys
    $(document).off('keydown.filebrowser').on('keydown.filebrowser', function(e) {
      if (e.key === 'Escape' && $editorModal.is(':visible')) {
        $editorModal.hide().attr('aria-hidden', 'true');
      }
      // support Ctrl/Cmd+S
      if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S') && $editorModal.is(':visible')) {
        e.preventDefault();
        saveEditor();
      }
      if (e.key === 'Delete' && selectedPath && !$(e.target).is('input, textarea')) {
        deleteItem();
      }
      if (e.key === 'F2' && selectedPath && !$(e.target).is('input, textarea')) {
        renameItem();
      }
    });
    
    // Single drag/drop handler (consolidated)
    // Compute upload target at drop time using the same resolution logic
    $(document).off('dragover.filebrowser drop.filebrowser')
      .on('dragover.filebrowser', (e) => { e.preventDefault(); e.stopPropagation(); })
      .on('drop.filebrowser', (e) => {
        e.preventDefault();
        e.stopPropagation();
        const files = e.originalEvent && e.originalEvent.dataTransfer && e.originalEvent.dataTransfer.files;
        if (files && files.length > 0) {
          const dropTarget = getUploadTarget();
          uploadFiles(files, dropTarget);
        }
      });



    /* Theme management */
    function _filebrowser_applyThemeFlag(dark) {
      try {
        document.body.classList.toggle('dark', !!dark);
      } catch (e) {
        console.warn('applyThemeFlag failed', e);
      }
    }

    function initTheme() {
      try {
        const saved = localStorage.getItem(THEME_KEY);
        const isDark = saved === 'true' || (saved === null && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
        _filebrowser_applyThemeFlag(isDark);
      } catch (e) {
        _filebrowser_applyThemeFlag(false);
      }
    }

    /* Initial load */
    $(document).ready(function() {
      initTheme();
      updateButtons();
      renderDirectory('/').then(() => {
        $statusLine.text('Ready');
      }).catch(err => {
        console.error('Initial load failed:', err);
        $statusLine.text('Failed to load');
      });
    });

  })();
  </script>
  </body>
  </html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Nomad • Music</title>
<link rel="stylesheet" href="master.css">
<script>
(function() {
  try {
    const isDark = localStorage.getItem('nomad_dark_mode') === 'true';
    if (isDark) document.documentElement.classList.add('dark');

    const saved = localStorage.getItem('nomad_custom_theme');
    if (saved) {
      const colors = JSON.parse(saved);
      const style = document.createElement('style');
      style.id = 'custom-theme-style';
      style.textContent = `
        :root {
          --primary: ${colors.primary} !important;
          --primary-dark: ${colors.primaryDark} !important;
          --bg: ${colors.bgLight} !important;
          --card: ${colors.cardLight} !important;
          --card-bg: ${colors.cardLight} !important;
          --text: ${colors.textLight} !important;
          --muted: ${colors.mutedLight} !important;
        }
        body.dark {
          --bg: ${colors.bgDark} !important;
          --card: ${colors.cardDark} !important;
          --card-bg: ${colors.cardDark} !important;
          --text: ${colors.textDark} !important;
          --muted: ${colors.mutedDark} !important;
          --primary: ${colors.primaryDarkTheme} !important;
        }
      `;
      document.head.appendChild(style);
    }
  } catch(e) {}
})();
</script>
<script src="theme-manager.js"></script>
<style>
  body{margin:0;padding:0;display:flex;flex-direction:column;height:100vh;background:var(--bg);font-family:Inter,Arial,sans-serif;overflow:hidden;}
  
  header{background:var(--primary);color:var(--color-white);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;z-index:60;box-shadow:var(--shadow);flex-shrink:0;}
  header h1{font-size:1.15rem;margin:0;font-weight:700;}
  .back-btn{background:var(--white-alpha-12);color:var(--color-white);padding:.45rem .7rem;border-radius:8px;text-decoration:none;font-weight:700;}

  .tabs{display:flex;background:var(--card);border-bottom:2px solid var(--black-alpha-6);padding:0 18px;flex-shrink:0;}
  .tab{padding:12px 20px;cursor:pointer;border-bottom:3px solid transparent;font-weight:700;color:var(--muted);transition:all .2s;}
  .tab:hover{color:var(--primary);}
  .tab.active{color:var(--primary);border-bottom-color:var(--primary);}

  .iframe-container{flex:1;position:relative;overflow:hidden;min-height:0;}
  .iframe-container iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;display:none;}
  .iframe-container iframe.active{display:block;}

  /* FORCE PLAYER BAR VISIBLE ON ALL SCREENS */
  .player-bar{
    background:var(--card) !important;
    border-top:1px solid var(--black-alpha-6) !important;
    box-shadow:0 -4px 12px var(--black-alpha-8) !important;
    padding:10px !important;
    flex-shrink:0 !important;
    display:block !important;
    position:relative !important;
    overflow:visible !important;
  }

  .player-content{
    max-width:1200px;
    margin:0 auto;
    display:flex !important;
    flex-direction:column !important;
    gap:8px !important;
  }

  .player-title{font-weight:800;color:var(--primary);text-align:center;font-size:0.95rem;}

  .player-controls{
    display:flex !important;
    align-items:center !important;
    gap:12px !important;
    justify-content:center !important;
  }

  .time-display{color:var(--muted);font-size:0.85rem;min-width:45px;text-align:center;font-weight:700;}
  .progress-bar{flex:1;max-width:600px;height:6px;background:var(--black-alpha-10);border-radius:3px;cursor:pointer;position:relative;min-width:150px;}
  .progress-fill{height:100%;background:var(--primary);border-radius:3px;transition:width 0.1s linear;}

  /* FORCE CONTROLS VISIBLE */
  .controls{
    display:flex !important;
    flex-wrap:wrap !important;
    justify-content:center !important;
    align-items:center !important;
    gap:10px !important;
    padding:10px !important;
  }

  .controls-left,.controls-center,.controls-right{
    display:flex !important;
    gap:8px !important;
  }

  /* FORCE BUTTONS VISIBLE */
  .control-btn{
    width:44px !important;
    height:44px !important;
    min-width:44px !important;
    display:inline-flex !important;
    align-items:center !important;
    justify-content:center !important;
    padding:0 !important;
    border-radius:12px !important;
    border:0 !important;
    background:var(--primary) !important;
    color:var(--color-white) !important;
    font-weight:800 !important;
    cursor:pointer !important;
    font-size:16px !important;
    box-shadow:0 6px 18px var(--black-alpha-6) !important;
  }

  .control-btn:hover{transform:scale(1.05);}
  .control-btn:active{transform:scale(0.95);}

  .control-btn.secondary{
    background:var(--card) !important;
    color:var(--primary) !important;
    border:1px solid var(--black-alpha-10) !important;
  }

  .control-btn.play{
    width:56px !important;
    height:56px !important;
    background:var(--primary) !important;
  }

  .control-btn.edge{
    width:40px !important;
    height:40px !important;
  }
  
  /* MOBILE ADJUSTMENTS */
  @media (max-width:768px){
    .tabs{padding:0 8px;}
    .tab{padding:10px 14px;font-size:0.9rem;}

    .player-bar{
      padding:8px !important;
      max-height:none !important;
      min-height:180px !important;
    }
    .player-content{gap:6px !important;}
    .controls{padding:8px !important;flex-wrap:wrap !important;}
  }

  @media (max-width:600px){
    .player-bar{
      padding:8px !important;
      min-height:190px !important;
    }
    .player-content{gap:6px !important;}
    .player-title{font-size:0.9rem;}

    .player-controls{gap:8px !important;}
    .time-display{font-size:0.8rem;min-width:38px;}
    .progress-bar{min-width:120px;max-width:300px;}

    .controls{
      gap:8px !important;
      padding:8px !important;
      flex-wrap:wrap !important;
    }

    .controls-left,.controls-center,.controls-right{
      gap:6px !important;
    }

    .control-btn{
      width:36px !important;
      height:36px !important;
      min-width:36px !important;
      font-size:14px !important;
      border-radius:10px !important;
    }

    .control-btn.play{
      width:44px !important;
      height:44px !important;
      font-size:16px !important;
    }

    .control-btn.edge{
      width:34px !important;
      height:34px !important;
      font-size:13px !important;
    }

    .tab{padding:8px 10px;font-size:0.85rem;}
  }
</style>
</head>
<body data-page="music">

<header>
  <h1>Music</h1>
  <a class="back-btn" href="/menu">← Back to Menu</a>
</header>

<div class="tabs">
  <div class="tab active" data-tab="songs">Songs</div>
  <div class="tab" data-tab="playlists">Playlists</div>
  <div class="tab" data-tab="queue">Queue</div>
</div>

<div class="iframe-container">
  <iframe id="songsFrame" class="active" src="songs.html"></iframe>
  <iframe id="playlistsFrame" src="playlist.html"></iframe>
  <iframe id="queueFrame" src="queue.html"></iframe>
</div>

<div class="player-bar">
  <div class="player-content">
    <div class="player-title" id="playerTitle">Not playing</div>
    <div class="player-controls">
      <div class="time-display" id="currentTime">0:00</div>
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="time-display" id="totalTime">0:00</div>
    </div>
    <div class="controls">
      <div class="controls-left">
        <button class="control-btn secondary edge loop" id="loopBtn" title="Loop: off">🔁</button>
      </div>
      <div class="controls-center">
        <button class="control-btn secondary prev" id="prevBtn" title="Previous">⏮</button>
        <button class="control-btn play" id="playBtn" title="Play">▶</button>
        <button class="control-btn secondary next" id="nextBtn" title="Next">⏭</button>
      </div>
      <div class="controls-right">
        <button class="control-btn secondary edge download" id="downloadBtn" title="Download">⬇</button>
      </div>
    </div>
  </div>
</div>

<audio id="audio" preload="metadata"></audio>

<script>
const audio = document.getElementById('audio');
const playBtn = document.getElementById('playBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const loopBtn = document.getElementById('loopBtn');
const downloadBtn = document.getElementById('downloadBtn');
const playerTitle = document.getElementById('playerTitle');
const currentTime = document.getElementById('currentTime');
const totalTime = document.getElementById('totalTime');
const progressBar = document.getElementById('progressBar');
const progressFill = document.getElementById('progressFill');
const songsFrame = document.getElementById('songsFrame');
const playlistsFrame = document.getElementById('playlistsFrame');
const queueFrame = document.getElementById('queueFrame');

let currentPlaylist = [];
let currentIndex = -1;
let queue = [];
let queueIndex = 0;
let playbackMode = 'playlist';
let loopMode = 'none';
let currentTrack = null;

function fmtTime(sec){
  if(!sec||!isFinite(sec)) return '0:00';
  sec=Math.floor(sec);
  const m=Math.floor(sec/60), s=sec%60;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function playTrack(track){
  if(!track) return;
  currentTrack = track;
  playerTitle.textContent = track.name || 'Unknown';
  audio.src = `/media?file=${encodeURIComponent(track.path)}`;
  audio.play().catch(e => console.debug('Play failed:', e));
  broadcastPlaybackUpdate();
}

function playAtIndex(index, playlist){
  if(!playlist || index < 0 || index >= playlist.length) return;
  const track = playlist[index];
  playTrack(track);
}

function handleNext(){
  if(loopMode === 'single'){
    audio.currentTime = 0;
    audio.play();
    return;
  }
  
  if(playbackMode === 'queue' && queue.length > 0){
    if(queueIndex < queue.length - 1){
      queueIndex++;
      playAtIndex(queueIndex, queue);
    } else if(loopMode === 'all'){
      queueIndex = 0;
      playAtIndex(queueIndex, queue);
    } else {
      audio.pause();
    }
  } else if(currentPlaylist.length > 0){
    if(currentIndex < currentPlaylist.length - 1){
      currentIndex++;
      playAtIndex(currentIndex, currentPlaylist);
    } else if(loopMode === 'all'){
      currentIndex = 0;
      playAtIndex(currentIndex, currentPlaylist);
    } else {
      audio.pause();
    }
  }
}

function handlePrev(){
  if(audio.currentTime > 3){
    audio.currentTime = 0;
    return;
  }
  
  if(playbackMode === 'queue' && queue.length > 0){
    if(queueIndex > 0){
      queueIndex--;
      playAtIndex(queueIndex, queue);
    }
  } else if(currentPlaylist.length > 0){
    if(currentIndex > 0){
      currentIndex--;
      playAtIndex(currentIndex, currentPlaylist);
    }
  }
}

function broadcastPlaybackUpdate(){
  const message = {
    type: 'PLAYBACK_UPDATE',
    payload: {
      currentTrack: currentTrack,
      playing: !audio.paused,
      mode: playbackMode
    }
  };
  
  try {
    songsFrame.contentWindow?.postMessage(message, '*');
    playlistsFrame.contentWindow?.postMessage(message, '*');
    queueFrame.contentWindow?.postMessage(message, '*');
  } catch(e){}
}

function broadcastQueueUpdate(){
  const message = {
    type: 'QUEUE_UPDATE',
    payload: {
      queue: queue,
      queueIndex: queueIndex,
      mode: playbackMode
    }
  };
  
  try {
    queueFrame.contentWindow?.postMessage(message, '*');
  } catch(e){}
}

function showToast(msg){
  console.log('Toast:', msg);
}

window.addEventListener('message', (event) => {
  const { type, payload } = event.data;
  
  if(type === 'PLAY_TRACK'){
    playbackMode = 'single';
    currentPlaylist = [payload];
    currentIndex = 0;
    playTrack(payload);
  }
  
  else if(type === 'PLAY_PLAYLIST'){
    playbackMode = 'playlist';
    currentPlaylist = payload.tracks || [];
    currentIndex = payload.startIndex || 0;
    if(currentPlaylist.length > 0){
      playAtIndex(currentIndex, currentPlaylist);
    }
  }
  
  else if(type === 'PLAY_QUEUE'){
    playbackMode = 'queue';
    if(queue.length > 0){
      queueIndex = payload.startIndex || 0;
      playAtIndex(queueIndex, queue);
    }
  }
  
  else if(type === 'ADD_TO_QUEUE'){
    queue.push(payload);
    broadcastQueueUpdate();
    showToast('Added to queue');
  }
  
  else if(type === 'REMOVE_FROM_QUEUE'){
    const { index } = payload;
    if(index >= 0 && index < queue.length){
      queue.splice(index, 1);
      if(playbackMode === 'queue' && queueIndex >= index){
        queueIndex = Math.max(0, queueIndex - 1);
      }
      broadcastQueueUpdate();
    }
  }
  
  else if(type === 'CLEAR_QUEUE'){
    queue = [];
    queueIndex = 0;
    if(playbackMode === 'queue'){
      audio.pause();
      playerTitle.textContent = 'Not playing';
      currentTrack = null;
      playbackMode = 'playlist';
    }
    broadcastQueueUpdate();
  }
  
  else if(type === 'REQUEST_QUEUE_UPDATE'){
    broadcastQueueUpdate();
  }
});

audio.addEventListener('timeupdate', () => {
  if(audio.duration){
    currentTime.textContent = fmtTime(audio.currentTime);
    const pct = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = pct + '%';
  }
});

audio.addEventListener('loadedmetadata', () => {
  totalTime.textContent = fmtTime(audio.duration);
});

audio.addEventListener('play', () => {
  playBtn.textContent = '⏸';
  broadcastPlaybackUpdate();
});

audio.addEventListener('pause', () => {
  playBtn.textContent = '▶';
  broadcastPlaybackUpdate();
});

audio.addEventListener('ended', handleNext);

playBtn.addEventListener('click', () => {
  if(audio.paused){
    audio.play();
  } else {
    audio.pause();
  }
});

prevBtn.addEventListener('click', handlePrev);
nextBtn.addEventListener('click', handleNext);

progressBar.addEventListener('click', (e) => {
  if(!audio.duration) return;
  const rect = progressBar.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
});

loopBtn.addEventListener('click', () => {
  if(loopMode === 'none'){
    loopMode = 'all';
    loopBtn.title = 'Loop: all';
    loopBtn.style.opacity = '1';
  } else if(loopMode === 'all'){
    loopMode = 'single';
    loopBtn.title = 'Loop: single';
    loopBtn.style.opacity = '1';
    loopBtn.style.background = 'var(--primary)';
    loopBtn.style.color = '#fff';
  } else {
    loopMode = 'none';
    loopBtn.title = 'Loop: off';
    loopBtn.style.opacity = '0.5';
    loopBtn.style.background = '';
    loopBtn.style.color = '';
  }
});

downloadBtn.addEventListener('click', () => {
  if(!currentTrack) return;
  const a = document.createElement('a');
  a.href = `/media?file=${encodeURIComponent(currentTrack.path)}&download=1`;
  a.download = currentTrack.path.split('/').pop();
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.iframe-container iframe').forEach(f => f.classList.remove('active'));
    tab.classList.add('active');
    const tabName = tab.dataset.tab;
    document.getElementById(tabName + 'Frame').classList.add('active');
  });
});

setTimeout(() => {
  broadcastPlaybackUpdate();
  broadcastQueueUpdate();
}, 500);
setTimeout(() => {
  const playerBar = document.querySelector('.player-bar');
  const controls = document.querySelector('.controls');
  console.log('Player bar:', playerBar);
  console.log('Controls:', controls);
  console.log('Controls display:', window.getComputedStyle(controls).display);
  console.log('Player bar display:', window.getComputedStyle(playerBar).display);
  console.log('Screen width:', window.innerWidth);
}, 1000);
</script>
</body>
</html>

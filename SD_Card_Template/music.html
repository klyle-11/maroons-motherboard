<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Nomad • Music</title>
<link rel="stylesheet" href="master.css">
<script>
(function() {
  try {
    const isDark = localStorage.getItem('nomad_dark_mode') === 'true';
    if (isDark) document.documentElement.classList.add('dark');

    const saved = localStorage.getItem('nomad_custom_theme');
    if (saved) {
      const colors = JSON.parse(saved);
      const style = document.createElement('style');
      style.id = 'custom-theme-style';
      style.textContent = `
        :root {
          --primary: ${colors.primary} !important;
          --primary-dark: ${colors.primaryDark} !important;
          --bg: ${colors.bgLight} !important;
          --card: ${colors.cardLight} !important;
          --card-bg: ${colors.cardLight} !important;
          --text: ${colors.textLight} !important;
          --muted: ${colors.mutedLight} !important;
        }
        body.dark {
          --bg: ${colors.bgDark} !important;
          --card: ${colors.cardDark} !important;
          --card-bg: ${colors.cardDark} !important;
          --text: ${colors.textDark} !important;
          --muted: ${colors.mutedDark} !important;
          --primary: ${colors.primaryDarkTheme} !important;
        }
      `;
      document.head.appendChild(style);
    }
  } catch(e) {}
})();
</script>
<script src="theme-manager.js"></script>
<style>
  body{margin:0;padding:0;display:flex;flex-direction:column;height:100vh;background:var(--bg);font-family:Inter,Arial,sans-serif;overflow:hidden;}
  
  header{background:var(--primary);color:var(--color-white);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;z-index:60;box-shadow:var(--shadow);flex-shrink:0;}

  .tab:hover{color:var(--primary);}

  .tab-controls{display:flex;gap:8px;position:absolute;right:18px;}

  .tab-control-btn:hover{background:var(--primary);color:var(--color-white);transform:translateY(-1px);}
  .tab-control-btn.active{background:var(--primary);color:var(--color-white);}

  .iframe-container{flex:1;position:relative;overflow:hidden;min-height:0;}
  .iframe-container iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;display:none;}
  .iframe-container iframe.active{display:block;}

  /* FORCE PLAYER BAR VISIBLE ON ALL SCREENS */

    background:var(--card) !important;
    border-top:1px solid var(--black-alpha-6) !important;
    box-shadow:0 -4px 12px var(--black-alpha-8) !important;
    padding:10px !important;
    flex-shrink:0 !important;
    display:block !important;
    position:relative !important;
    overflow:visible !important;
  }

  .player-content{
    max-width:1200px;
    margin:0 auto;

    gap:8px !important;
  }

  .player-title{font-weight:800;color:var(--primary);text-align:center;font-size:0.95rem;}

  .player-controls{
    display:flex !important;

  /* FORCE BUTTONS VISIBLE */
  .control-btn{

    display:inline-flex !important;

    justify-content:center !important;
    padding:0 !important;

  .toast{

    left:50%;
    transform:translateX(-50%);

    opacity:1;

  /* MOBILE ADJUSTMENTS */
  @media (max-width:768px){
    .tabs{padding:0 8px;justify-content:flex-start;}
    .tab-group{flex:1 1 auto;}
    .tab{padding:10px 14px;font-size:0.9rem;}
    .tab-controls{position:static;margin-left:auto;gap:4px;}
    .tab-control-btn{padding:6px 10px;font-size:0.85rem;}

    .player-bar{
      padding:8px !important;
      max-height:none !important;
      min-height:180px !important;
    }
    .player-content{gap:6px !important;}
    .controls{padding:8px !important;flex-wrap:wrap !important;}
  }

  @media (max-width:600px){
    .tabs{flex-wrap:wrap;justify-content:flex-start;gap:4px;}
    .tab-group{order:1;flex:0 0 100%;justify-content:flex-start;margin-bottom:4px;}
    .tab-controls{order:2;flex:0 0 auto;margin-left:auto;gap:4px;}
    .tab-control-btn{padding:5px 8px;font-size:0.8rem;}

    .player-bar{
      padding:8px !important;
      min-height:190px !important;
    }
    .player-content{gap:6px !important;}
    .player-title{font-size:0.9rem;}

    .player-controls{gap:8px !important;}
    .time-display{font-size:0.8rem;min-width:38px;}
    .progress-bar{min-width:120px;max-width:300px;}

    .controls{
      gap:8px !important;
      padding:8px !important;
      flex-wrap:wrap !important;
    }

    .controls-left,.controls-center,.controls-right{
      gap:6px !important;
    }

    .control-btn{
      width:36px !important;
      height:36px !important;
      min-width:36px !important;
      font-size:14px !important;
      border-radius:10px !important;
    }

    .control-btn.play{
      width:44px !important;
      height:44px !important;
      font-size:16px !important;
    }

    .control-btn.edge{
      width:34px !important;

  /* TOAST NOTIFICATION */

    padding:12px 20px;
    border-radius:8px;
    font-weight:700;

  @media (max-width:600px){
    #toast{

</style>

<body data-page="music">

<header>
  <h1>Music</h1>
  <a class="back-btn" href="/menu">← Back to Menu</a>
</header>

<div class="tabs">
  <div class="tab-group">
    <div class="tab active" data-tab="songs">Songs</div>
    <div class="tab" data-tab="playlists">Playlists</div>
    <div class="tab" data-tab="queue">Queue</div>
  </div>
  <div class="tab-controls">
    <button class="tab-control-btn" id="shuffleBtn" title="Shuffle"><span>🔀</span></button>
    <button class="tab-control-btn" id="sortBtn" title="Sort A → Z"><span id="sortLabel">A → Z</span></button>
  </div>
</div>

<div class="iframe-container">
  <iframe id="songsFrame" class="active" src="songs.html"></iframe>
  <iframe id="playlistsFrame" src="playlist.html"></iframe>
  <iframe id="queueFrame" src="queue.html"></iframe>
</div>

<div class="player-bar">
  <div class="player-content">
    <div class="player-title" id="playerTitle">Not playing</div>
    <div class="player-controls">
      <div class="time-display" id="currentTime">0:00</div>
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="time-display" id="totalTime">0:00</div>
    </div>
    <div class="controls">
      <div class="controls-center">
        <button class="control-btn secondary edge loop" id="loopBtn" title="Loop: off">🔁</button>
        <button class="control-btn secondary prev" id="prevBtn" title="Previous">⏮</button>
        <button class="control-btn play" id="playBtn" title="Play">▶</button>
        <button class="control-btn secondary next" id="nextBtn" title="Next">⏭</button>
        <button class="control-btn secondary edge download" id="downloadBtn" title="Download">⬇</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<audio id="audio" preload="metadata"></audio>

<div id="toast"></div>

<script>
const audio = document.getElementById('audio');
const playBtn = document.getElementById('playBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const loopBtn = document.getElementById('loopBtn');
const downloadBtn = document.getElementById('downloadBtn');
const playerTitle = document.getElementById('playerTitle');
const currentTime = document.getElementById('currentTime');
const totalTime = document.getElementById('totalTime');
const progressBar = document.getElementById('progressBar');
const progressFill = document.getElementById('progressFill');
const songsFrame = document.getElementById('songsFrame');
const playlistsFrame = document.getElementById('playlistsFrame');
const queueFrame = document.getElementById('queueFrame');
const shuffleBtn = document.getElementById('shuffleBtn');
const sortBtn = document.getElementById('sortBtn');
const sortLabel = document.getElementById('sortLabel');

let currentPlaylist = [];
let currentIndex = -1;
let queue = [];
let queueIndex = 0;
let playbackMode = 'playlist';
let loopMode = 'none';
let currentTrack = null;
let isShuffled = false;
let unshuffledPlaylist = [];
let unshuffledIndex = -1;
let toastTimeout = null;
let sortAsc = true;
let shuffleState = {songs: false, playlists: false, queue: false};
let queueSortMode = 'added';

function fmtTime(sec){
  if(!sec||!isFinite(sec)) return '0:00';
  sec=Math.floor(sec);
  const m=Math.floor(sec/60), s=sec%60;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function saveState(){
  try {
    const state = {
      queue,
      queueIndex,
      currentPlaylist,
      currentIndex,
      playbackMode,
      loopMode,
      currentTrack,
      isShuffled,
      unshuffledPlaylist,
      unshuffledIndex,
      currentTime: audio.currentTime || 0,
      timestamp: Date.now()
    };
    localStorage.setItem('nomad_music_state', JSON.stringify(state));
  } catch(e){
    console.warn('[Music] Failed to save state:', e);
  }
}

function restoreState(){
  try {
    const saved = localStorage.getItem('nomad_music_state');
    if(!saved) return false;

    const state = JSON.parse(saved);
    const age = Date.now() - (state.timestamp || 0);
    if(age > 86400000) return false;

    queue = state.queue || [];
    queueIndex = state.queueIndex || 0;
    currentPlaylist = state.currentPlaylist || [];
    currentIndex = state.currentIndex || -1;
    playbackMode = state.playbackMode || 'playlist';
    loopMode = state.loopMode || 'none';
    currentTrack = state.currentTrack || null;
    isShuffled = state.isShuffled || false;
    unshuffledPlaylist = state.unshuffledPlaylist || [];
    unshuffledIndex = state.unshuffledIndex || -1;

    updateLoopButtonUI();

    if(currentTrack){
      playerTitle.textContent = currentTrack.name || 'Unknown';
      audio.src = `/media?file=${encodeURIComponent(currentTrack.path)}`;
      if(state.currentTime && state.currentTime > 0){
        audio.currentTime = state.currentTime;
      }
    }

    broadcastPlaybackUpdate();
    broadcastQueueUpdate();

    return true;
  } catch(e){
    console.warn('[Music] Failed to restore state:', e);
    return false;
  }
}

function updateLoopButtonUI(){
  if(loopMode === 'none'){
    loopBtn.title = 'Loop: off';
    loopBtn.style.opacity = '0.5';
    loopBtn.style.background = '';
    loopBtn.style.color = '';
    loopBtn.textContent = '🔁';
  } else if(loopMode === 'all'){
    loopBtn.title = 'Loop: all';
    loopBtn.style.opacity = '1';
    loopBtn.style.background = '';
    loopBtn.style.color = '';
    loopBtn.textContent = '🔁';
  } else if(loopMode === 'single'){
    loopBtn.title = 'Loop: single';
    loopBtn.style.opacity = '1';
    loopBtn.style.background = 'var(--primary)';
    loopBtn.style.color = '#fff';
    loopBtn.textContent = '🔂';
  }
}


let _playDebounce = null;
let _playGeneration = 0;
let _lastLoadTime = 0;
let _retryTimer = null;
let _retrying = false;
const _MIN_LOAD_GAP = 300;
const _MAX_RETRIES = 2;

function playTrack(track, _retryCount){
  _retryCount = _retryCount || 0;
  if(!track || !track.path){
    console.warn('[Music] Invalid track:', track);
    return;
  }

  if(_retryCount === 0){
    _playGeneration++;
    clearTimeout(_retryTimer);
    _retrying = false;
  }
  const gen = _playGeneration;

  clearTimeout(_playDebounce);

  audio.pause();
  audio.removeAttribute('src');
  audio.load();

  currentTrack = track;
  if(_retryCount === 0){
    playerTitle.textContent = track.name || 'Unknown';
  }

  const now = Date.now();
  const elapsed = now - _lastLoadTime;
  const delay = _retryCount > 0 ? 2000 * _retryCount : Math.max(200, _MIN_LOAD_GAP - elapsed);

  _playDebounce = setTimeout(() => {
    if(gen !== _playGeneration) return;
    _lastLoadTime = Date.now();
    const url = `/media?file=${encodeURIComponent(track.path)}`;
    fetch(url, { method: 'HEAD' }).then(resp => {
      if(gen !== _playGeneration) return;
      if(resp.status === 404){
        _retrying = false;
        playerTitle.textContent = 'Track not found';
        console.warn('[Music] Track not found on device:', track.path);
        return;
      }
      if(!resp.ok){
        throw new Error('Server error: ' + resp.status);
      }
      audio.src = url;
      audio.load();
      audio.play().catch(e => {
        if(gen !== _playGeneration) return;
        console.warn('[Music] Play failed:', e);
        if(_retryCount < _MAX_RETRIES){
          _retrying = true;
          playerTitle.textContent = (track.name || 'Unknown') + ' (retrying...)';
          _retryTimer = setTimeout(() => {
            if(gen !== _playGeneration) return;
            playTrack(track, _retryCount + 1);
          }, 2000 * (_retryCount + 1));
        } else {
          _retrying = false;
          playerTitle.textContent = 'Error loading track';
        }
      });
    }).catch(e => {
      if(gen !== _playGeneration) return;
      console.warn('[Music] HEAD check failed:', e);
      if(_retryCount < _MAX_RETRIES){
        _retrying = true;
        playerTitle.textContent = (track.name || 'Unknown') + ' (retrying...)';
        _retryTimer = setTimeout(() => {
          if(gen !== _playGeneration) return;
          playTrack(track, _retryCount + 1);
        }, 2000 * (_retryCount + 1));
      } else {
        _retrying = false;
        playerTitle.textContent = 'Error loading track';
      }
    });
    broadcastPlaybackUpdate();
    saveState();
  }, delay);
}

function playAtIndex(index, playlist){
  if(!playlist || index < 0 || index >= playlist.length){
    console.warn('[Music] Invalid index or playlist:', index, playlist?.length);
    return;
  }
  const track = playlist[index];
  if(!track){
    console.warn('[Music] Track not found at index:', index);
    return;
  }
  playTrack(track);
}

function handleNext(){
  if(loopMode === 'single'){
    audio.currentTime = 0;
    audio.play();
    return;
  }

  if(playbackMode === 'queue' && queue.length > 0){
    if(queueIndex < queue.length - 1){
      queueIndex++;
      playAtIndex(queueIndex, queue);
    } else if(loopMode === 'all'){
      queueIndex = 0;
      playAtIndex(queueIndex, queue);
    } else {
      audio.pause();
      playerTitle.textContent = 'End of queue';
      saveState();
    }
  } else if(currentPlaylist.length > 0){
    if(currentIndex < currentPlaylist.length - 1){
      currentIndex++;
      playAtIndex(currentIndex, currentPlaylist);
    } else if(loopMode === 'all'){
      currentIndex = 0;
      playAtIndex(currentIndex, currentPlaylist);
    } else {
      audio.pause();
      playerTitle.textContent = 'End of playlist';
      saveState();
    }
  } else {
    audio.pause();
    playerTitle.textContent = 'Nothing to play';
  }
  saveState();
}

function handlePrev(){
  if(audio.currentTime > 3){
    audio.currentTime = 0;
    return;
  }
  
  if(playbackMode === 'queue' && queue.length > 0){
    if(queueIndex > 0){
      queueIndex--;
      playAtIndex(queueIndex, queue);
    }
  } else if(currentPlaylist.length > 0){
    if(currentIndex > 0){
      currentIndex--;
      playAtIndex(currentIndex, currentPlaylist);
    }
  }
}

function broadcastPlaybackUpdate(){
  const message = {
    type: 'PLAYBACK_UPDATE',
    payload: {
      currentTrack: currentTrack,
      playing: !audio.paused,
      mode: playbackMode
    }
  };
  
  try {
    songsFrame.contentWindow?.postMessage(message, '*');
    playlistsFrame.contentWindow?.postMessage(message, '*');
    queueFrame.contentWindow?.postMessage(message, '*');
  } catch(e){}
}

function broadcastQueueUpdate(){
  const message = {
    type: 'QUEUE_UPDATE',
    payload: {
      queue: queue,
      queueIndex: queueIndex,
      mode: playbackMode
    }
  };

  try {
    songsFrame.contentWindow?.postMessage(message, '*');
    playlistsFrame.contentWindow?.postMessage(message, '*');
    queueFrame.contentWindow?.postMessage(message, '*');
  } catch(e){}
}

function showToast(msg){
  const toast = document.getElementById('toast');
  if(!toast) return;

  toast.textContent = msg;
  toast.classList.add('show');

  if(toastTimeout) clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => {
    toast.classList.remove('show');
  }, 2000);
}

window.addEventListener('message', (event) => {
  const { type, payload } = event.data;

  if(type === 'PLAY_TRACK'){
    playbackMode = 'single';
    currentPlaylist = [payload];
    currentIndex = 0;
    playTrack(payload);
    saveState();
  }

  else if(type === 'PLAY_PLAYLIST'){
    playbackMode = 'playlist';
    currentPlaylist = payload.tracks || [];
    currentIndex = payload.startIndex || 0;
    if(currentPlaylist.length > 0){
      playAtIndex(currentIndex, currentPlaylist);
    } else {
      playerTitle.textContent = 'Empty playlist';
    }
    saveState();
  }

  else if(type === 'PLAY_QUEUE'){
    playbackMode = 'queue';
    if(queue.length > 0){
      queueIndex = payload.startIndex || 0;
      if(queueIndex < 0) queueIndex = 0;
      if(queueIndex >= queue.length) queueIndex = queue.length - 1;
      playAtIndex(queueIndex, queue);
    } else {
      playerTitle.textContent = 'Queue is empty';
    }
    saveState();
  }

  else if(type === 'ADD_TO_QUEUE'){
    if(payload && payload.path){
      queue.push(payload);
      broadcastQueueUpdate();
      showToast('Added to queue');
      saveState();
    }
  }

  else if(type === 'REMOVE_FROM_QUEUE'){
    const { index } = payload;
    if(index >= 0 && index < queue.length){
      const wasPlayingRemoved = (playbackMode === 'queue' && queueIndex === index);

      queue.splice(index, 1);

      if(wasPlayingRemoved){
        if(queue.length === 0){
          audio.pause();
          playerTitle.textContent = 'Queue is empty';
          currentTrack = null;
          queueIndex = 0;
          playbackMode = 'playlist';
        } else {
          if(queueIndex >= queue.length){
            queueIndex = queue.length - 1;
          }
          playAtIndex(queueIndex, queue);
        }
      } else if(playbackMode === 'queue' && queueIndex > index){
        queueIndex--;
      }

      broadcastQueueUpdate();
      saveState();
    }
  }

  else if(type === 'MOVE_QUEUE'){
    const { fromIdx, toIdx } = payload;
    if(fromIdx >= 0 && fromIdx < queue.length && toIdx >= 0 && toIdx < queue.length){
      const item = queue.splice(fromIdx, 1)[0];
      queue.splice(toIdx, 0, item);

      if(playbackMode === 'queue'){
        if(queueIndex === fromIdx){
          queueIndex = toIdx;
        } else if(queueIndex > fromIdx && queueIndex <= toIdx){
          queueIndex--;
        } else if(queueIndex < fromIdx && queueIndex >= toIdx){
          queueIndex++;
        }
      }

      broadcastQueueUpdate();
      saveState();
    }
  }

  else if(type === 'QUEUE_UPDATED'){
    queue = payload.queue || [];
    if(payload.queueIndex !== undefined){
      queueIndex = payload.queueIndex;
    }
    broadcastQueueUpdate();
    saveState();
  }

  else if(type === 'CLEAR_QUEUE'){
    queue = [];
    queueIndex = 0;
    if(playbackMode === 'queue'){
      audio.pause();
      playerTitle.textContent = 'Queue cleared';
      currentTrack = null;
      playbackMode = 'playlist';
    }
    broadcastQueueUpdate();
    saveState();
  }

  else if(type === 'REQUEST_QUEUE_UPDATE'){
    broadcastQueueUpdate();
  }
});

audio.addEventListener('timeupdate', () => {
  if(audio.duration){
    currentTime.textContent = fmtTime(audio.currentTime);
    const pct = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = pct + '%';
  }
});

audio.addEventListener('loadedmetadata', () => {
  totalTime.textContent = fmtTime(audio.duration);
});

audio.addEventListener('play', () => {
  playBtn.textContent = '⏸';
  broadcastPlaybackUpdate();
  saveState();
});

audio.addEventListener('pause', () => {
  playBtn.textContent = '▶';
  broadcastPlaybackUpdate();
  saveState();
});

audio.addEventListener('ended', handleNext);

audio.addEventListener('error', (e) => {
  if(!audio.src || audio.src === '' || audio.src === location.href) return;
  if(_retrying) return;
  console.error('[Music] Audio error:', e);
  _retrying = false;
  playerTitle.textContent = 'Error loading track';
});

playBtn.addEventListener('click', () => {
  if(audio.paused){
    audio.play();
  } else {
    audio.pause();
  }
});

prevBtn.addEventListener('click', handlePrev);
nextBtn.addEventListener('click', handleNext);

loopBtn.addEventListener('click', () => {
  if(loopMode === 'none'){
    loopMode = 'all';
    showToast('Loop: all tracks');
  } else if(loopMode === 'all'){
    loopMode = 'single';
    showToast('Loop: single track');
  } else {
    loopMode = 'none';
    showToast('Loop: off');
  }
  updateLoopButtonUI();
  saveState();
});

progressBar.addEventListener('click', (e) => {
  if(!audio.duration) return;
  const rect = progressBar.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
});

downloadBtn.addEventListener('click', () => {
  if(!currentTrack) return;
  const a = document.createElement('a');
  a.href = `/media?file=${encodeURIComponent(currentTrack.path)}&download=1`;
  a.download = currentTrack.path.split('/').pop();
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
});

shuffleBtn.addEventListener('click', () => {
  const activeFrame = document.querySelector('.iframe-container iframe.active');
  const activeTab = document.querySelector('.tab.active');
  const tabName = activeTab ? activeTab.dataset.tab : 'songs';

  if(activeFrame){
    shuffleState[tabName] = !shuffleState[tabName];

    if(shuffleState[tabName]){
      shuffleBtn.style.opacity = '1';
      shuffleBtn.style.background = 'var(--primary)';
      shuffleBtn.style.color = '#fff';
      shuffleBtn.title = 'Shuffle: on';
    } else {
      shuffleBtn.style.opacity = '';
      shuffleBtn.style.background = '';
      shuffleBtn.style.color = '';
      shuffleBtn.title = 'Shuffle: off';
    }

    activeFrame.contentWindow.postMessage({
      type: 'SHUFFLE',
      payload: {}
    }, '*');
  }
});

sortBtn.addEventListener('click', () => {
  const activeTab = document.querySelector('.tab.active');
  const tabName = activeTab ? activeTab.dataset.tab : 'songs';
  const activeFrame = document.querySelector('.iframe-container iframe.active');

  if(tabName === 'queue'){
    // Cycle through: added → asc → desc → added
    if(queueSortMode === 'added'){
      queueSortMode = 'asc';
      sortLabel.textContent = 'A → Z';
      sortBtn.title = 'Sort: A → Z';
    } else if(queueSortMode === 'asc'){
      queueSortMode = 'desc';
      sortLabel.textContent = 'Z → A';
      sortBtn.title = 'Sort: Z → A';
    } else if(queueSortMode === 'desc' || queueSortMode === 'shuffled'){
      queueSortMode = 'added';
      sortLabel.textContent = 'Added';
      sortBtn.title = 'Sort: Added order';
    }

    if(activeFrame){
      if(queueSortMode === 'added'){
        activeFrame.contentWindow.postMessage({type: 'SORT', payload: {mode: 'added'}}, '*');
      } else {
        activeFrame.contentWindow.postMessage({
          type: 'SORT',
          payload: { ascending: queueSortMode === 'asc' }
        }, '*');
      }
    }
  } else {
    // For songs and playlists, just toggle A→Z / Z→A
    sortAsc = !sortAsc;
    sortLabel.textContent = sortAsc ? 'A → Z' : 'Z → A';
    sortBtn.title = sortAsc ? 'Sort A → Z' : 'Sort Z → A';
    if(activeFrame){
      activeFrame.contentWindow.postMessage({
        type: 'SORT',
        payload: { ascending: sortAsc }
      }, '*');
    }
  }
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.iframe-container iframe').forEach(f => f.classList.remove('active'));
    tab.classList.add('active');
    const tabName = tab.dataset.tab;
    document.getElementById(tabName + 'Frame').classList.add('active');

    // Update shuffle button state when switching tabs
    if(shuffleState[tabName]){
      shuffleBtn.style.opacity = '1';
      shuffleBtn.style.background = 'var(--primary)';
      shuffleBtn.style.color = '#fff';
      shuffleBtn.title = 'Shuffle: on';
    } else {
      shuffleBtn.style.opacity = '';
      shuffleBtn.style.background = '';
      shuffleBtn.style.color = '';
      shuffleBtn.title = 'Shuffle: off';
    }

    // Update sort button label when switching tabs
    if(tabName === 'queue'){
      if(queueSortMode === 'added'){
        sortLabel.textContent = 'Added';
        sortBtn.title = 'Sort: Added order';
      } else if(queueSortMode === 'asc'){
        sortLabel.textContent = 'A → Z';
        sortBtn.title = 'Sort: A → Z';
      } else if(queueSortMode === 'desc'){
        sortLabel.textContent = 'Z → A';
        sortBtn.title = 'Sort: Z → A';
      }
    } else {
      sortLabel.textContent = sortAsc ? 'A → Z' : 'Z → A';
      sortBtn.title = sortAsc ? 'Sort A → Z' : 'Sort Z → A';
    }
  });
});

setInterval(() => {
  if(!audio.paused && audio.currentTime > 0){
    saveState();
  }
}, 5000);

setTimeout(() => {
  restoreState();
  broadcastPlaybackUpdate();
  broadcastQueueUpdate();
}, 500);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Nomad • Movies</title>

<style>
  :root{
    --primary:#007bff; --primary-dark:#0056b3; --bg:#f4f4f9; --text:#333; --radius:8px; --shadow:0 4px 12px rgba(0,0,0,0.08);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100vh}
  header{background:var(--primary);color:#fff;padding:20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:60;box-shadow:var(--shadow)}
  header h1{font-size:clamp(1.25rem,4vw,1.75rem);margin:0}
  .back-btn{text-decoration:none;color:#fff;background:var(--primary-dark);padding:.5rem .75rem;border-radius:var(--radius);font-size:0.95rem}

  .toolbar{background:var(--bg);padding:.75rem 1rem;display:flex;flex-wrap:wrap;gap:.75rem;align-items:center;border-bottom:1px solid #ddd;position:sticky;top:80px;z-index:55;}
  .toolbar input[type="search"]{flex:1 1 200px;padding:.5rem .75rem;border:1px solid #ccc;border-radius:var(--radius);font-size:0.95rem;}
  .toolbar select, .toolbar .view-btn{padding:.5rem .75rem;border:1px solid #ccc;background:#fff;border-radius:var(--radius);font-size:0.9rem;cursor:pointer;}
  .view-btn.active{background:var(--primary);color:#fff;border-color:var(--primary-dark);}

  main{flex:1;display:flex;flex-direction:column;max-width:1200px;width:100%;margin:0 auto;padding:1rem}
  .grid-wrapper{flex:1;overflow-y:auto}
  .media-grid{display:grid;gap:1rem;}
  /* original grid behavior: min size with auto-fit */
  .media-grid.small  {grid-template-columns:repeat(auto-fit,minmax(120px,1fr));}
  .media-grid.medium {grid-template-columns:repeat(auto-fit,minmax(160px,1fr));}
  .media-grid.large  {grid-template-columns:repeat(auto-fit,minmax(220px,1fr));}

  @media (max-width:600px){
    header{flex-direction:column;gap:.5rem;}
    .back-btn{width:100%;text-align:center;}
    .toolbar{top:112px;}
    .media-grid.small  {grid-template-columns:repeat(2,1fr);}
    .media-grid.medium {grid-template-columns:repeat(3,1fr);}
    .media-grid.large  {grid-template-columns:repeat(4,1fr);}
  }

  /* card sizing similar to original */
  .media-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;transition:transform .25s ease;cursor:pointer;width:100%;max-width:220px;margin:0 auto;}
  .media-grid.small  .media-card{max-width:120px;}
  .media-grid.medium .media-card{max-width:160px;}
  .media-grid.large  .media-card{max-width:220px;}
  .media-card:hover{transform:translateY(-3px);}

  .thumb-wrapper{position:relative;display:flex;align-items:center;justify-content:center;background:#eee;color:#555;font-size:0.9rem;text-align:center;width:100%;aspect-ratio:2/3;}
  .fallback-text{padding:.5rem;position:absolute;z-index:2;text-align:center;font-weight:700;color:#06306f}
  .media-thumb{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;z-index:1;opacity:0;transition:opacity .3s ease;}
  .badge-resume{position:absolute;left:8px;bottom:8px;background:rgba(0,0,0,0.6);color:#fff;padding:6px 8px;border-radius:6px;font-weight:700;font-size:12px;z-index:4}

  .meta{padding:8px;text-align:center}
  .meta .title{font-weight:700;color:#08306f;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .meta .dir{font-size:12px;color:#666;overflow:hidden;white-space:nowrap;text-overflow:ellipsis; display:none /* hidden per request */}

  .modal,.video-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;z-index:1000;}
  .modal-content,.video-modal-content{background:#fff;padding:20px;border-radius:10px;text-align:center;width:90%;max-width:540px;box-shadow:0 6px 20px rgba(0,0,0,0.1);}
  .modal button,.video-modal button{padding:12px;font-size:1em;margin:10px 0;background:var(--primary);color:#fff;border:none;border-radius:5px;cursor:pointer;width:100%;transition:background-color .3s ease;}
  .modal button.secondary{background:#f6f9ff;color:var(--primary);border:1px solid rgba(0,123,255,0.08)}
  .modal button.cancel{background:#fff;color:#333;border:1px solid #eee}
  .modal button:hover{background:var(--primary-dark);color:#fff;}
  .video-container{display:flex;flex-direction:column;align-items:center;gap:1rem;}
  video{width:100%;max-width:800px;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,0.2);}

  footer{padding:10px;text-align:center;color:#666}
</style>
</head>
<body>
  <header>
    <h1>Movies</h1>
    <a class="back-btn" href="http://192.168.4.1/menu">← Back to Menu</a>
  </header>

  <div class="toolbar">
    <input id="searchInput" type="search" placeholder="Search movies…" aria-label="Search movies">
    <select id="sortSelect" aria-label="Sort movies">
      <option value="nameAsc">A → Z</option>
      <option value="nameDesc">Z → A</option>
    </select>
    <button class="view-btn" data-size="small" title="Compact view">🔳</button>
    <button class="view-btn active" data-size="medium" title="Comfort view">🔲</button>
    <button class="view-btn" data-size="large" title="Gallery view">⬜</button>
  </div>

  <main>
    <div class="grid-wrapper">
      <div id="grid" class="media-grid medium" aria-live="polite"></div>
    </div>
  </main>

  <div id="modal" class="modal" onclick="if(event.target===this) closeModal();">
    <div class="modal-content" onclick="event.stopPropagation()">
      <h2 id="modalTitle">What would you like to do?</h2>
      <div id="modalSub" style="margin-bottom:8px;color:#444"></div>
      <button id="playButton">Play (from start)</button>
      <button id="resumeButton" class="secondary" style="display:none">Resume</button>
      <button id="downloadButton" class="cancel">Download</button>
      <div style="margin-top:8px"><button onclick="closeModal()" class="cancel">Cancel</button></div>
    </div>
  </div>

  <div id="videoModal" class="video-modal" onclick="if(event.target===this) closeVideo();">
    <div class="video-modal-content" onclick="event.stopPropagation();">
      <div class="video-container">
        <video id="videoPlayer" controls playsinline></video>
        <button onclick="closeVideo()" class="cancel">Close</button>
      </div>
    </div>
  </div>

  <footer>© <span id="year"></span> Jcorp Nomad</footer>

<script>
/* Config */
const ROOT_PATH = '/Movies';
const INDEX_ENDPOINT = '/api/index';
const MEDIA_ENDPOINT = '/media';
const RESUME_KEY = 'nomad:watch:v1';
const VIDEO_EXTS = ['.mp4','.mkv','.avi','.mov','.webm','.m4v'];
const IMAGE_EXTS = ['.jpg','.jpeg','.png','.webp','.avif'];
const SUB_EXTS = ['.srt','.vtt','.ass','.ssa','.sub'];

/* State */
let movies = [];      // list of {name, rawName, cover, path, dir, sz, mt, subtitles}
let filtered = [];
let currentSize = localStorage.getItem('nomadMoviesSize') || 'medium';
let currentMovie = null;
let autosaveTimer = null;
let rootSig = null;

/* Helpers */
function normalizePath(p){ if(!p) return '/'; if(!p.startsWith('/')) p='/' + p; while(p.length>1 && p.endsWith('/')) p=p.slice(0,-1); return p; }
function ext(name){ const i=name.lastIndexOf('.'); return i>=0? name.slice(i).toLowerCase() : ''; }
function isVideoName(n){ return VIDEO_EXTS.includes(ext(n)); }
function isImageName(n){ return IMAGE_EXTS.includes(ext(n)); }
function isSubtitleName(n){ return SUB_EXTS.includes(ext(n)); }
function fileUrl(path){ return `${MEDIA_ENDPOINT}?file=${encodeURIComponent(path)}`; }
function readResume(){ try{ return JSON.parse(localStorage.getItem(RESUME_KEY)||'{}'); }catch(e){return{};} }
function writeResume(v){ localStorage.setItem(RESUME_KEY, JSON.stringify(v)); }
function fileKey(path, sz=0, mt=0){ return `${normalizePath(path)}|${sz||0}|${mt||0}`; }
function formatTime(sec){ if(!sec||!isFinite(sec)) return '0:00'; sec=Math.floor(sec); const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60; if(h) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; return `${m}:${String(s).padStart(2,'0')}`; }

/* Resume match: try exact key, path-only, basename fallback */
function findResume(movie){
  const store = readResume();
  const norm = normalizePath(movie.path);
  const exact = fileKey(movie.path, movie.sz||0, movie.mt||0);
  if(store[exact]) return { key: exact, entry: store[exact] };

  // path-only
  for(const k of Object.keys(store)){
    const p = (k.split('|')[0] || '');
    if(normalizePath(p) === norm) return { key:k, entry:store[k] };
  }
  // also try without leading slash
  for(const k of Object.keys(store)){
    const p = (k.split('|')[0] || '').replace(/^\//,'');
    if(p === norm.replace(/^\//,'')) return { key:k, entry:store[k] };
  }
  // basename fallback
  const base = norm.split('/').pop().toLowerCase();
  for(const k of Object.keys(store)){
    const p = (k.split('|')[0] || '').toLowerCase();
    if(p.split('/').pop() === base) return { key:k, entry:store[k] };
  }
  return null;
}
function clearResumeFor(path){
  const store = readResume();
  const norm = normalizePath(path);
  let changed=false;
  for(const k of Object.keys(store)){
    const p = (k.split('|')[0] || '');
    if(normalizePath(p) === norm || p.replace(/^\//,'') === norm.replace(/^\//,'')){
      delete store[k];
      changed = true;
    }
  }
  if(changed) writeResume(store);
}

/* Fetch NDJSON index for a path */
async function fetchIndex(path){
  const url = `${INDEX_ENDPOINT}?path=${encodeURIComponent(normalizePath(path))}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error('index fetch failed '+res.status);
  const text = await res.text();
  const lines = text.split('\n').filter(Boolean);
  const header = lines.length ? JSON.parse(lines[0]) : null;
  const entries = [];
  for(let i=1;i<lines.length;i++){
    try{ entries.push(JSON.parse(lines[i])); }catch(e){}
  }
  return { header, entries };
}

/* Build movies from NDJSON indexes:
   - fetch root index, collect files at root
   - fetch immediate child dir indexes and collect their files
   - pair by basename (no name stitching) and pick media+image+subs
*/
async function buildFromIndexes(root){
  const map = new Map(); // key=dir::basename -> files[]
  // fetch root index
  const rootResp = await fetchIndex(root);
  if(rootResp.header && rootResp.header.sig) rootSig = rootResp.header.sig;

  // process root entries
  for(const e of rootResp.entries){
    const dir = normalizePath(root);
    const full = dir === '/' ? `/${e.n}` : `${dir}/${e.n}`;
    const base = e.n.replace(/\.[^/.]+$/,'').toLowerCase();
    const key = `${dir}::${base}`;
    if(!map.has(key)) map.set(key, { dir, base, files: [] });
    map.get(key).files.push({ name: e.n, t: e.t, sz: e.sz||0, mt: e.mt||0, full: normalizePath(full) });
  }

  // fetch child dir indexes (sequential to keep simple)
  for(const e of rootResp.entries){
    if(e.t === 'd'){
      const dirPath = (root === '/' ? '' : root) + '/' + e.n;
      try {
        const resp = await fetchIndex(dirPath);
        for(const f of resp.entries){
          const dir = normalizePath(dirPath);
          const full = dir === '/' ? `/${f.n}` : `${dir}/${f.n}`;
          const base = f.n.replace(/\.[^/.]+$/,'').toLowerCase();
          const key = `${dir}::${base}`;
          if(!map.has(key)) map.set(key, { dir, base, files: [] });
          map.get(key).files.push({ name: f.n, t: f.t, sz: f.sz||0, mt: f.mt||0, full: normalizePath(full) });
        }
      } catch(err){
        // if a child dir has no index, skip (we will fallback to media.json if everything fails)
        console.warn('child index missing', dirPath, err);
      }
    }
  }

  // build movies list: for each map entry pick video (media), image (cover), subs
  const out = [];
  for(const [k,v] of map.entries()){
    const media = v.files.find(x => isVideoName(x.name));
    if(!media) continue;
    const image = v.files.find(x => isImageName(x.name));
    const subs = v.files.filter(x => isSubtitleName(x.name));
    const dir = v.dir;
    const path = normalizePath((dir === '/' ? '' : dir) + '/' + media.name);
    out.push({
      name: prettify(media.name),
      rawName: media.name,
      cover: image ? normalizePath((dir === '/' ? '' : dir) + '/' + image.name) : null, // no placeholder
      path,
      dir,
      sz: media.sz || 0,
      mt: media.mt || 0,
      subtitles: subs.map(s => ({ path: normalizePath((dir === '/' ? '' : dir) + '/' + s.name), ext: ext(s.name) }))
    });
  }
  out.sort((a,b) => a.name.localeCompare(b.name));
  return out;
}
function prettify(filename){
  const n = filename.replace(/\.[^/.]+$/,'');
  let t = n.replace(/[_\.]+/g,' ').trim();
  t = t.replace(/\s*\(?\d{4}\)?\s*$/,'').trim();
  return t || filename;
}

/* fallback load media.json */
async function loadFromMediaJson(){
  const res = await fetch('/media.json');
  if(!res.ok) throw new Error('media.json missing');
  const json = await res.json();
  const raw = json.movies || json.Movies || [];
  const out = raw.filter(m => isVideoName(m.file || m.path || '')).map(m => ({
    name: prettify(m.name || m.title || (m.file||m.path||'')),
    rawName: m.file || m.path || '',
    cover: m.cover || m.thumbnail || m.poster || null,
    path: m.file || m.path || '',
    dir: '/',
    sz: m.sz || 0,
    mt: m.mt || 0,
    subtitles: []
  }));
  return out;
}

/* Render grid */
const gridEl = document.getElementById('grid');

function renderGrid(){
  gridEl.className = `media-grid ${currentSize}`;
  const frag = document.createDocumentFragment();
  const store = readResume();

  for(const item of filtered){
    const card = document.createElement('div');
    card.className = 'media-card';

    const saved = findResume(item);
    const resumeHTML = (saved && saved.entry && saved.entry.position > 1) ? `<div class="badge-resume">Resume ${formatTime(saved.entry.position)}</div>` : '';

    const imgHTML = item.cover ? `<img class="media-thumb" loading="lazy" src="${item.cover}" alt="">` : '';

    card.innerHTML = `
      <div class="thumb-wrapper">
        <span class="fallback-text">${item.name}</span>
        ${resumeHTML}
        ${imgHTML}
      </div>
      <div class="meta">
        <div class="title" title="${item.name}"></div>
        <div class="dir" title="${item.path}"></div>
      </div>
    `;

    const img = card.querySelector('img');
    const fallback = card.querySelector('.fallback-text');

    if(img){
      img.onload = () => { img.style.opacity = '1'; if(fallback) fallback.style.display = 'none'; };
      img.onerror = () => { img.style.display = 'none'; if(fallback) fallback.style.display = 'block'; };
    } else {
      if(fallback) fallback.style.display = 'block';
    }

    card.addEventListener('click', () => showMovieOptions(item));
    frag.appendChild(card);
  }

  gridEl.innerHTML = '';
  gridEl.appendChild(frag);
}

/* Modal controls */
const modal = document.getElementById('modal');
const modalSub = document.getElementById('modalSub');
const playButton = document.getElementById('playButton');
const resumeButton = document.getElementById('resumeButton');
const downloadButton = document.getElementById('downloadButton');
const videoModal = document.getElementById('videoModal');
const videoPlayer = document.getElementById('videoPlayer');

function showMovieOptions(movie){
  currentMovie = movie;
  modalSub.textContent = movie.name || movie.rawName || movie.path || '';
  // show resume if available
  const saved = findResume(movie);
  if(saved && saved.entry && saved.entry.position > 1){
    resumeButton.style.display = 'block';
    resumeButton.textContent = `Resume ${formatTime(saved.entry.position)}`;
  } else {
    resumeButton.style.display = 'none';
  }

  playButton.onclick = () => {
    clearResumeFor(movie.path);
    modal.style.display = 'none';
    openVideo(fileUrl(movie.path), false);
    renderGrid();
  };
  resumeButton.onclick = () => {
    modal.style.display = 'none';
    openVideo(fileUrl(movie.path), true);
  };
  downloadButton.onclick = () => {
    modal.style.display = 'none';
    startDownload(movie);
  };

  modal.style.display = 'flex';
}
function closeModal(){ modal.style.display = 'none'; }

function startDownload(movie){
  if(!confirm(`Download "${movie.name}"?`)) return;
  const a = document.createElement('a');
  a.href = movie.path.startsWith('/') ? movie.path : ('/' + movie.path);
  a.download = movie.name;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

/* Playback with resume */
let stallTimer = null, stallRetries = 0;

function startStallWatcher(player, src){
  clearTimeout(stallTimer);
  stallRetries = 0;
  function schedule(){
    clearTimeout(stallTimer);
    stallTimer = setTimeout(()=>{
      if(!player.paused && player.readyState < 3 && stallRetries < 2){
        stallRetries++;
        player.src = `${src}${src.includes('?') ? '&' : '?'}_=${Date.now()}`;
        player.load();
        try{ player.currentTime = player.currentTime; }catch(e){}
        player.play().catch(()=>{});
        schedule();
      }
    }, 8000);
  }
  player.addEventListener('playing', function once(){ player.removeEventListener('playing', once); schedule(); });
  player.addEventListener('pause', ()=> clearTimeout(stallTimer));
  player.addEventListener('ended', ()=> clearTimeout(stallTimer));
}

function openVideo(src, useResume=false){
  clearTimeout(stallTimer);
  stallRetries = 0;
  videoPlayer.pause();
  videoPlayer.removeAttribute('src');
  videoPlayer.load();
  videoModal.style.display = 'flex';
  videoPlayer.src = src;

  const saved = findResume(currentMovie);

  // when metadata is ready, seek if using resume
  function onMeta(){
    videoPlayer.removeEventListener('loadedmetadata', onMeta);
    if(useResume && saved && saved.entry && saved.entry.position > 1){
      try { videoPlayer.currentTime = saved.entry.position; } catch(e){ console.warn('seek failed', e); }
    }
    startAutosave();
  }
  videoPlayer.addEventListener('loadedmetadata', onMeta);

  videoPlayer.addEventListener('pause', saveNow);
  videoPlayer.addEventListener('seeked', saveNow);
  videoPlayer.addEventListener('ended', () => {
    clearResumeFor(currentMovie.path);
    stopAutosave();
    renderGrid();
  });

  startStallWatcher(videoPlayer, src);
  videoPlayer.play().catch(()=>{});
}

function closeVideo(){
  try{ saveNow(); }catch(e){}
  videoPlayer.pause();
  videoPlayer.removeAttribute('src');
  videoPlayer.load();
  videoModal.style.display = 'none';
  stopAutosave();
}

/* autosave every 4s */
function startAutosave(){ stopAutosave(); autosaveTimer = setInterval(saveNow, 4000); }
function stopAutosave(){ if(autosaveTimer){ clearInterval(autosaveTimer); autosaveTimer = null; } }
function saveNow(){
  try {
    if(!currentMovie) return;
    const cur = Math.floor(videoPlayer.currentTime || 0);
    const dur = Math.floor(videoPlayer.duration || 0);
    if(!isFinite(cur)) return;
    if(cur > 0 && dur > 0){
      const store = readResume();
      const key = fileKey(currentMovie.path, currentMovie.sz || 0, currentMovie.mt || 0);
      store[key] = { position: cur, duration: dur, updated: Date.now() };
      writeResume(store);
      renderGrid();
    }
  } catch(e){ console.warn('saveNow failed', e); }
}

/* Fetch & build logic: try indexes then fallback to media.json */
async function loadLibrary(){
  try {
    // attempt to build via NDJSON indexes
    const list = await buildFromIndexes(ROOT_PATH);
    if(list && list.length){
      movies = list;
      filtered = movies.slice();
      renderGrid();
      return;
    }
  } catch(e){
    console.warn('index build failed, falling back', e);
  }

  // fallback
  try {
    movies = await loadFromMediaJson();
    filtered = movies.slice();
    renderGrid();
  } catch(e){
    console.error('media.json fallback failed', e);
    gridEl.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--primary-dark);">Unable to load content.</p>';
  }
}

/* helpers used above but not defined earlier (they call fetchIndex/buildFromIndexes) */
async function buildFromIndexes(root){
  // wrapper that tries to call fetchIndex and gather immediate child dir indexes
  try {
    const rootData = await fetchIndex(root);
    if(rootData.header && rootData.header.sig) rootSig = rootData.header.sig;

    // map basename groups
    const map = new Map();
    // root files
    for(const e of rootData.entries){
      const dir = normalizePath(root);
      const full = (dir === '/' ? '' : dir) + '/' + e.n;
      const base = e.n.replace(/\.[^/.]+$/,'').toLowerCase();
      const key = `${dir}::${base}`;
      if(!map.has(key)) map.set(key, { dir, base, files: [] });
      map.get(key).files.push({ name: e.n, t: e.t, sz: e.sz||0, mt: e.mt||0, full: normalizePath(full) });
    }
    // child dirs
    for(const e of rootData.entries){
      if(e.t === 'd'){
        const childPath = (root === '/' ? '' : root) + '/' + e.n;
        try {
          const child = await fetchIndex(childPath);
          for(const f of child.entries){
            const dir = normalizePath(childPath);
            const full = (dir === '/' ? '' : dir) + '/' + f.n;
            const base = f.n.replace(/\.[^/.]+$/,'').toLowerCase();
            const key = `${dir}::${base}`;
            if(!map.has(key)) map.set(key, { dir, base, files: [] });
            map.get(key).files.push({ name: f.n, t: f.t, sz: f.sz||0, mt: f.mt||0, full: normalizePath(full) });
          }
        } catch(err){
          // missing child index: ignore, continue
          console.warn('child index missing', childPath);
        }
      }
    }

    // assemble movies
    const out = [];
    for(const [k, group] of map.entries()){
      const media = group.files.find(x => isVideoName(x.name));
      if(!media) continue;
      const image = group.files.find(x => isImageName(x.name));
      const subs = group.files.filter(x => isSubtitleName(x.name));
      const dir = group.dir;
      const path = normalizePath((dir === '/' ? '' : dir) + '/' + media.name);
      out.push({
        name: prettify(media.name),
        rawName: media.name,
        cover: image ? normalizePath((dir === '/' ? '' : dir) + '/' + image.name) : null,
        path,
        dir,
        sz: media.sz || 0,
        mt: media.mt || 0,
        subtitles: subs.map(s => ({ path: normalizePath((dir === '/' ? '' : dir) + '/' + s.name), ext: ext(s.name) }))
      });
    }
    out.sort((a,b)=> a.name.localeCompare(b.name));
    return out;
  } catch(err){
    throw err;
  }
}

/* UI: search, sort, size buttons */
const searchInput = document.getElementById('searchInput');
const sortSelect = document.getElementById('sortSelect');
const viewButtons = document.querySelectorAll('.view-btn');

function applyFilter(term=''){
  const lower = (term||'').trim().toLowerCase();
  filtered = !lower ? movies.slice() : movies.filter(m => (m.name || '').toLowerCase().includes(lower));
  applySort(sortSelect.value || 'nameAsc');
}
function applySort(mode){
  filtered.sort((a,b) => mode === 'nameDesc' ? b.name.localeCompare(a.name) : a.name.localeCompare(b.name));
  renderGrid();
}
function setViewSize(size){
  currentSize = size;
  viewButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.size === size));
  gridEl.className = `media-grid ${size}`;
  localStorage.setItem('nomadMoviesSize', size);
}

/* index poll (cheap) */
async function checkIndex(){
  try {
    const res = await fetch(`${INDEX_ENDPOINT}?path=${encodeURIComponent(ROOT_PATH)}`);
    if(!res.ok) return;
    const text = await res.text();
    const headerLine = text.split('\n')[0];
    if(headerLine){
      const header = JSON.parse(headerLine);
      if(header && header.sig && rootSig && rootSig !== header.sig){
        // index changed
        await loadLibrary();
      } else if(header && header.sig && !rootSig){
        rootSig = header.sig;
      }
    }
  } catch(e){}
}

/* bootstrap */
document.getElementById('year').textContent = new Date().getFullYear();
setViewSize(currentSize);
viewButtons.forEach(btn => btn.addEventListener('click', () => setViewSize(btn.dataset.size)));
searchInput.addEventListener('input', (e)=> { clearTimeout(window.__debounce); window.__debounce = setTimeout(()=> applyFilter(e.target.value), 150); });
sortSelect.addEventListener('change', ()=> applySort(sortSelect.value));
videoPlayer.addEventListener('ended', closeVideo);

// load library
(async function init(){
  try {
    await loadLibrary();
  } catch(e){
    console.error('init error', e);
  }
  setInterval(checkIndex, 30000);
})();

</script>

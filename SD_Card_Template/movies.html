<script>
(function() {
  try {
    const isDark = localStorage.getItem('nomad_dark_mode') === 'true';
    if (isDark) document.documentElement.classList.add('dark');

    const saved = localStorage.getItem('nomad_custom_theme');
    if (saved) {
      const colors = JSON.parse(saved);
      const style = document.createElement('style');
      style.id = 'custom-theme-style';
      style.textContent = `
        :root {
          --primary: ${colors.primary} !important;
          --primary-dark: ${colors.primaryDark} !important;
          --bg: ${colors.bgLight} !important;
          --card: ${colors.cardLight} !important;
          --card-bg: ${colors.cardLight} !important;
          --text: ${colors.textLight} !important;
          --muted: ${colors.mutedLight} !important;
        }
        body.dark {
          --bg: ${colors.bgDark} !important;
          --card: ${colors.cardDark} !important;
          --card-bg: ${colors.cardDark} !important;
          --text: ${colors.textDark} !important;
          --muted: ${colors.mutedDark} !important;
          --primary: ${colors.primaryDarkTheme} !important;
        }
      `;
      document.head.appendChild(style);
    }
  } catch(e) {}
})();
</script>

<script>
/* Config */
const ROOT_PATH = '/Movies';
const INDEX_ENDPOINT = '/api/index';
const MEDIA_ENDPOINT = '/media';
const RESUME_KEY = 'nomad:watch:v1';
const ANIM_KEY_BASE = 'nomad:movies:anim:v1';
const VIDEO_EXTS = ['.mp4','.mkv','.avi','.mov','.webm','.m4v'];
const IMAGE_EXTS = ['.jpg','.jpeg','.png','.webp','.avif'];
const SUB_EXTS = ['.srt','.vtt','.ass','.ssa','.sub'];

/* NEW: THEME KEY + THEME BOOT & SYNC */
const THEME_KEY = 'nomad_dark_mode';
function applyThemeFlag(dark){
  if(dark) document.body.classList.add('dark');
  else document.body.classList.remove('dark');

  // Keep search readable: enforce white bg + black text (menu wants this behavior)
  const search = document.querySelector('.search-input');
  if(search){
    try {
      search.style.background = '#fff';
      search.style.color = '#000';
    } catch(e){ /* ignore style errors */ }
  }

  // Resume badges - same style for both themes
  document.querySelectorAll('.badge-resume').forEach(b => {
    b.style.background = 'rgba(0,0,0,0.6)';
    b.style.color = '#fff';
  });
}
(function initThemeFromStorage(){
  try {
    const saved = localStorage.getItem(THEME_KEY);
    const isDark = (saved === 'true');
    applyThemeFlag(isDark);
  } catch(e){ applyThemeFlag(false); }
})();

// Keep pages/tabs in sync when menu toggles the key
window.addEventListener('storage', (ev) => {
  if(ev.key === THEME_KEY){
    const dark = ev.newValue === 'true';
    applyThemeFlag(dark);
  }
});
// optional helper for local toggles
function toggleThemeLocal(){
  const isDark = document.body.classList.toggle('dark');
  try { localStorage.setItem(THEME_KEY, isDark ? 'true' : 'false'); }catch(e){}
}

/* State */
let movies = [];      // list of {name, rawName, cover, path, dir, sz, mt, subtitles}
let filtered = [];
let currentSize = localStorage.getItem('nomadMoviesSize') || 'medium';
let currentMovie = null;
let autosaveTimer = null;
let rootSig = null;

/* ---------- Screen wake lock / NoSleep fallback ---------- */
/* Place this right after your "State" declarations */
let wakeLock = null;
let noSleep = null; // used if NoSleep.js is loaded

async function requestWakeLock(){
  try {
    // Preferred: Screen Wake Lock API (modern browsers)
    if('wakeLock' in navigator){
      if(!wakeLock){
        wakeLock = await navigator.wakeLock.request('screen');
        // clear reference if UA releases the lock
        wakeLock.addEventListener && wakeLock.addEventListener('release', () => { wakeLock = null; });
      }
      return true;
    }

    // Fallback: NoSleep.js (if included via script tag)
    if(window.NoSleep){
      if(!noSleep) noSleep = new NoSleep();
      try { noSleep.enable(); } catch(e){ console.warn('NoSleep.enable() failed', e); }
      return true;
    }

    // Nothing available
    console.warn('No Wake Lock API or NoSleep available — screen may still sleep.');
    return false;
  } catch(e){
    console.warn('requestWakeLock error', e);
    // last-ditch NoSleep attempt
    if(window.NoSleep){
      try { if(!noSleep) noSleep = new NoSleep(); noSleep.enable(); return true; } catch(e2){}
    }
    return false;
  }
}

async function releaseWakeLock(){
  try {
    if(wakeLock){
      try { await wakeLock.release(); } catch(e){}
      wakeLock = null;
    }
    if(noSleep){
      try { noSleep.disable(); } catch(e){}
    }
  } catch(e){
    console.warn('releaseWakeLock error', e);
  }
}


/* Helpers */
function normalizePath(p){ if(!p) return '/'; if(!p.startsWith('/')) p='/' + p; while(p.length>1 && p.endsWith('/')) p=p.slice(0,-1); return p; }
function ext(name){ const i=name.lastIndexOf('.'); return i>=0? name.slice(i).toLowerCase() : ''; }
function isVideoName(n){ return VIDEO_EXTS.includes(ext(n)); }
function isImageName(n){ return IMAGE_EXTS.includes(ext(n)); }
function isSubtitleName(n){ return SUB_EXTS.includes(ext(n)); }
function fileUrl(path){ return `${MEDIA_ENDPOINT}?file=${encodeURIComponent(path)}`; }
function readResume(){ try{ return JSON.parse(localStorage.getItem(RESUME_KEY)||'{}'); }catch(e){return{};} }
function writeResume(v){ localStorage.setItem(RESUME_KEY, JSON.stringify(v)); }
function fileKey(path, sz=0, mt=0){ return `${normalizePath(path)}|${sz||0}|${mt||0}`; }
function formatTime(sec){ if(!sec||!isFinite(sec)) return '0:00'; sec=Math.floor(sec); const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60; if(h) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; return `${m}:${String(s).padStart(2,'0')}`; }

/* NEW: getHashParam() — parse location.hash into {action, path} safely */
function getHashParam(){
  const h = (location.hash || '').replace(/^#/,'');

  if(!h) return { action:null, path:null };
  const [k, ...rest] = h.split('=');
  const v = rest.length ? rest.join('=') : '';
  try {
    return { action: k || null, path: v ? decodeURIComponent(v) : null };
  } catch(e){
    // fallback to raw
    return { action: k || null, path: v || null };
  }
}
/* Better Resume Badge Handling */
function updateResumeBadge(movie, position){
  if(!movie || !movie.path) return;
  const cards = Array.from(gridEl.querySelectorAll('.media-card'));
  for(const card of cards){
    if(card.dataset.path === movie.path){
      const badge = card.querySelector('.badge-resume');
      if(position > 1){
        if(badge){
          badge.textContent = formatTime(position);
          badge.style.background = 'rgba(0,0,0,0.6)';
          badge.style.color = '#fff';
        } else {
          const wrapper = card.querySelector('.thumb-wrapper');
          if(wrapper){
            const div = document.createElement('div');
            div.className = 'badge-resume';
            div.textContent = formatTime(position);
            div.style.background = 'rgba(0,0,0,0.6)';
            div.style.color = '#fff';
            wrapper.appendChild(div);
          }
        }
      } else {
        if(badge) badge.remove();
      }
      break;
    }
  }
}

/* Resume matching */
function findResume(movie){
  const store = readResume();
  const norm = normalizePath(movie.path);
  const exact = fileKey(movie.path, movie.sz||0, movie.mt||0);
  if(store[exact]) return { key: exact, entry: store[exact] };

  for(const k of Object.keys(store)){
    const p = (k.split('|')[0] || '');
    if(normalizePath(p) === norm) return { key:k, entry:store[k] };
  }
  for(const k of Object.keys(store)){
    const p = (k.split('|')[0] || '').replace(/^\//,'');
    if(p === norm.replace(/^\//,'')) return { key:k, entry:store[k] };
  }
  const base = norm.split('/').pop().toLowerCase();
  for(const k of Object.keys(store)){
    const p = (k.split('|')[0] || '').toLowerCase();
    if(p.split('/').pop() === base) return { key:k, entry:store[k] };
  }
  return null;
}
function clearResumeFor(path){
  const store = readResume();
  const norm = normalizePath(path);
  let changed=false;
  for(const k of Object.keys(store)){
    const p = (k.split('|')[0] || '');
    if(normalizePath(p) === norm || p.replace(/^\//,'') === norm.replace(/^\//,'')){
      delete store[k];
      changed = true;
    }
  }
  if(changed) writeResume(store);
}

/* Fetch NDJSON index for a path — cache-busted to avoid stale results */
async function fetchIndex(path){
  const url = `${INDEX_ENDPOINT}?path=${encodeURIComponent(normalizePath(path))}&_=${Date.now()}`;
  const res = await fetch(url, { cache: 'no-store' });

  if(res.status === 202) {
    // Server is building index - throw a specific error that can be caught
    throw new Error('INDEX_BUILDING');
  }

  if(!res.ok) throw new Error('index fetch failed '+res.status);
  const text = await res.text();
  const lines = text.split('\n').filter(Boolean);
  const header = lines.length ? JSON.parse(lines[0]) : null;
  const entries = [];
  for(let i=1;i<lines.length;i++){
    try{ entries.push(JSON.parse(lines[i])); }catch(e){}
  }
  return { header, entries };
}


/* Build movies from NDJSON indexes (kept original behavior) */
async function buildFromIndexes(root){
  // Attempt to set rootSig using the root index header
  const rootResp = await fetchIndex(root);
  if(rootResp.header && rootResp.header.sig) rootSig = rootResp.header.sig;

  const map = new Map();
  // gather root entries
  for(const e of rootResp.entries){
    const dir = normalizePath(root);
    const full = dir === '/' ? `/${e.n}` : `${dir}/${e.n}`;
    const base = e.n.replace(/\.[^/.]+$/,'').toLowerCase();
    const key = `${dir}::${base}`;
    if(!map.has(key)) map.set(key, { dir, base, files: [] });
    map.get(key).files.push({ name: e.n, t: e.t, sz: e.sz||0, mt: e.mt||0, full: normalizePath(full) });
  }

  // fetch child dir indexes
  for(const e of rootResp.entries){
    if(e.t === 'd'){
      const dirPath = (root === '/' ? '' : root) + '/' + e.n;
      try {
        const resp = await fetchIndex(dirPath);
        for(const f of resp.entries){
          const dir = normalizePath(dirPath);
          const full = dir === '/' ? `/${f.n}` : `${dir}/${f.n}`;
          const base = f.n.replace(/\.[^/.]+$/,'').toLowerCase();
          const key = `${dir}::${base}`;
          if(!map.has(key)) map.set(key, { dir, base, files: [] });
          map.get(key).files.push({ name: f.n, t: f.t, sz: f.sz||0, mt: f.mt||0, full: normalizePath(full) });
        }
      } catch(err){
        console.warn('child index missing', dirPath, err);
      }
    }
  }

  const out = [];
  for(const [k,v] of map.entries()){
    const media = v.files.find(x => isVideoName(x.name));
    if(!media) continue;
    const image = v.files.find(x => isImageName(x.name));
    const subs = v.files.filter(x => isSubtitleName(x.name));
    const dir = v.dir;
    const path = normalizePath((dir === '/' ? '' : dir) + '/' + media.name);
    out.push({
    name: prettify(media.name),
    rawName: media.name,
    cover: image ? (normalizePath((dir === '/' ? '' : dir) + '/' + image.name) + `?_=${image.mt || image.sz || media.mt || rootSig || Date.now()}`) : null,
    path,
    dir,
    sz: media.sz || 0,
    mt: media.mt || 0,
    subtitles: subs.map(s => ({ path: normalizePath((dir === '/' ? '' : dir) + '/' + s.name), ext: ext(s.name) }))
    });
  }
  out.sort((a,b) => a.name.localeCompare(b.name));
  return out;
}
function prettify(filename){
  const n = filename.replace(/\.[^/.]+$/,'');

  let t = n.replace(/[_\.]+/g,' ').trim();
  t = t.replace(/\s*\(?\d{4}\)?\s*$/,'').trim();
  return t || filename;
}

/* fallback load media.json */
async function loadFromMediaJson(){
  const res = await fetch('/media.json');
  if(!res.ok) throw new Error('media.json missing');
  const json = await res.json();
  const raw = json.movies || json.Movies || [];
  const out = raw.filter(m => isVideoName(m.file || m.path || '')).map(m => ({
    name: prettify(m.name || m.title || (m.file||m.path||'')),
    rawName: m.file || m.path || '',
    cover: m.cover || m.thumbnail || m.poster || null,
    path: m.file || m.path || '',
    dir: '/',
    sz: m.sz || 0,
    mt: m.mt || 0,
    subtitles: []
  }));
  return out;
}

/* Render grid with optional staggered animation on first load */
const gridEl = document.getElementById('grid');

function renderGrid(){
  gridEl.className = `media-grid ${currentSize}`;
  const frag = document.createDocumentFragment();

  for(const item of filtered){
    const card = document.createElement('div');
    card.className = 'media-card';
    // helpful hook to update badge for a specific movie without re-rendering whole grid:
    card.dataset.path = item.path || '';

    const saved = findResume(item);
    const resumeHTML = (saved && saved.entry && saved.entry.position > 1) ? `<div class="badge-resume" style="background:rgba(0,0,0,0.6);color:#fff;">${formatTime(saved.entry.position)}</div>` : '';
    const imgHTML = item.cover ? `<img class="media-thumb" loading="lazy" src="${item.cover}" alt="${escapeHtml(item.name)}">` : '';
    card.innerHTML = `
      <div class="thumb-wrapper">
        <span class="fallback-text">${escapeHtml(item.name)}</span>
        ${resumeHTML}
        ${imgHTML}
      </div>
    `;
    const img = card.querySelector('img');
    const fallback = card.querySelector('.fallback-text');
    if(img){
      img.onload = () => { img.style.opacity = '1'; if(fallback) fallback.style.display = 'none'; };
      img.onerror = () => { img.style.display = 'none'; if(fallback) fallback.style.display = 'block'; };
    } else {
      if(fallback) fallback.style.display = 'block';
    }
    card.addEventListener('click', () => showMovieOptions(item));
    frag.appendChild(card);
  }

  // Clear + append
  gridEl.innerHTML = '';
  gridEl.appendChild(frag);

  // Decide if we should animate now:
  const animKey = rootSig ? `${ANIM_KEY_BASE}:${rootSig}` : ANIM_KEY_BASE;
  const already = localStorage.getItem(animKey);
  if(!already && filtered.length > 0){
    runStaggeredAnimation(animKey);
  }
}

/* Escape helper for injection safety when inserting titles */
function escapeHtml(str){
  if(!str) return '';
  return String(str).replace(/[&<>"']/g, function(m){
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]);
  });
}

/* Animation logic: compute grid columns and set animationDelay for each card row-by-row left->right */
function runStaggeredAnimation(storeKey){
  const cards = Array.from(gridEl.querySelectorAll('.media-card'));
  if(!cards.length) { localStorage.setItem(storeKey, Date.now()); return; }

  // allow layout to stabilize
  requestAnimationFrame(() => {
    const gridStyles = getComputedStyle(gridEl);
    const gapPx = parseFloat(gridStyles.gap) || 16;
    const gridWidth = Math.max(1, gridEl.clientWidth);
    const firstCardRect = cards[0].getBoundingClientRect();
    const cardWidth = Math.max(1, firstCardRect.width);

    // compute columns (fallback to 1)
    const columns = Math.max(1, Math.floor((gridWidth + gapPx) / (cardWidth + gapPx)));

    const stagger = 45; // ms per step (keeps animation quick)
    cards.forEach((card, i) => {
      const row = Math.floor(i / columns);
      const col = i % columns;
      // Row-by-row left->right: delay increases with (row*columns + col)
      const delay = (row * columns + col) * stagger;
      card.style.animationDelay = `${delay}ms`;
      // apply class to start the animation
      card.classList.add('play-anim');
    });

    // mark as animated so it won't run again until signature changes
    try { localStorage.setItem(storeKey, Date.now()); } catch(e){ /* ignore */ }

    // cleanup inline animationDelay after animation end to keep DOM cleaner
    const maxDelay = (Math.ceil(cards.length / columns) * columns) * stagger + 500;
    setTimeout(() => {
      cards.forEach(c => { c.style.animationDelay = ''; c.classList.remove('play-anim'); /* cards still visible without class */ });
    }, maxDelay);
  });
}

  } else {
    resumeButton.style.display = 'none';

  playButton.onclick = () => {

    openVideo(fileUrl(movie.path), false);

  resumeButton.onclick = () => {
    closeModal();

  modal.style.display = 'flex';

function openMovieFromHash(hashObj){
  if(!hashObj || !hashObj.path) return;
  const wantRaw = hashObj.path || '';
  const want = normalizePath(decodeURIComponent(wantRaw));

  // Try to find the movie by exact normalized path, rawName, or basename fallback
  let found = movies.find(m => normalizePath(m.path) === want)
           || movies.find(m => normalizePath('/' + (m.rawName||'')) === want)
           || movies.find(m => normalizePath('/' + (m.rawName||'')).endsWith(want.split('/').pop()))
           || movies.find(m => normalizePath(m.path).endsWith(want.split('/').pop()));

  // If not found, try a quick reload of library once (in case hash arrived before library loaded fully)
  if(!found){
    try {
      // loadLibrary is defined elsewhere; we try to refresh the list then search again
      // (useful when hash handling runs early)
      // NOTE: this is non-blocking if loadLibrary already ran
      // but we await to give the library a chance to populate
      // only do this when movies[] is empty to avoid unnecessary reloads
      if(!movies || movies.length === 0){
        // eslint-disable-next-line no-undef
        // await loadLibrary(); // if you prefer to await here, uncomment and ensure this function is marked async
      }
      found = movies.find(m => normalizePath(m.path) === want) ||
              movies.find(m => normalizePath('/' + (m.rawName||'')) === want) ||
              movies.find(m => normalizePath(m.path).endsWith(want.split('/').pop()));
    } catch(e){
      console.warn('hash reload attempt failed', e);
    }
  }

  if(!found){
    console.warn('movie not found for hash', want);
    return;
  }

  // Set currentMovie used by openVideo / resume logic
  currentMovie = found;

  // Detect if user came from the Menu (only auto-play in that case)
  const ref = (document.referrer || '').toLowerCase();
  const fromMenu = ref && (ref.includes('/menu') || ref.includes('/menu.html') || ref.includes('/menu/'));

  if(fromMenu){
    // Auto-play and use resume (openVideo's useResume param handles seeking)
    openVideo(fileUrl(found.path), true);

    // Clear the hash so reloads / back button don't auto-play again unexpectedly
    try { history.replaceState(null, '', location.pathname + location.search); } catch(e){ /* ignore */ }
  } else {
    // Normal behavior: show modal/options so we don't interrupt a regular visitor
    showMovieOptions(found);
    // leave the hash intact for user context
  }
}

function handleHashNavigation(hashObj){
  if(!hashObj) return;
  // Accept 'open' or 'play' keys
  if(hashObj.action === 'open' || hashObj.action === 'play' || (!hashObj.action && hashObj.path)){
    openMovieFromHash(hashObj);
  }
}

/* Download helper */
function startDownload(movie){
  if(!confirm(`Download "${movie.name}"?`)) return;
  const a = document.createElement('a');
  a.href = movie.path.startsWith('/') ? movie.path : ('/' + movie.path);
  a.download = movie.name;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

let stallTimer = null, stallRetries = 0;

function startStallWatcher(player, src){
  clearTimeout(stallTimer);
  stallRetries = 0;

  async function probeRange(url){
    try {
      const resp = await fetch(url, {
        method: 'GET',
        headers: { 'Range': 'bytes=0-1023' },
        cache: 'no-store'
      });
      return (resp && (resp.status === 206 || resp.status === 200));
    } catch(e){
      return false;
    }
  }

  async function scheduleCheck(delay = 8000){
    clearTimeout(stallTimer);
    stallTimer = setTimeout(async () => {
      if(player.paused || player.readyState >= 3 || stallRetries >= 2) return;

      const ok = await probeRange(src);
      if(ok){
        scheduleCheck();
        return;
      }

      stallRetries++;
      console.warn('stallWatcher: probe failed, retry attempt', stallRetries);

      const newSrc = `${src}${src.includes('?') ? '&' : '?'}_=${Date.now()}`;
      try {
        player.pause();
        player.src = newSrc;
        try { player.load(); } catch(e){}
        try { player.currentTime = player.currentTime; } catch(e){}
        player.play().catch(()=>{});
      } catch(e){
        console.warn('stallWatcher retry failed', e);
      }

      scheduleCheck(9000);
    }, delay);
  }

  let hasStartedPlaying = false;
  function onFirstPlay(){
    if(hasStartedPlaying) return;
    hasStartedPlaying = true;
    player.removeEventListener('playing', onFirstPlay);
    scheduleCheck();
  }
  player.addEventListener('playing', onFirstPlay);
  player.addEventListener('pause', () => clearTimeout(stallTimer));
  player.addEventListener('ended', () => clearTimeout(stallTimer));
}


function openVideo(src, useResume=false){
  clearTimeout(stallTimer);
  stallRetries = 0;

  const saved = findResume(currentMovie || { path: '' });
  let startTime = 0;
  if(useResume && saved && saved.entry && saved.entry.position > 1){
    startTime = saved.entry.position;
  }

  videoPlayer.pause();
  videoPlayer.innerHTML = '';

  const source = document.createElement('source');
  source.src = src;
  source.type = 'video/mp4';
  videoPlayer.appendChild(source);

  if(currentMovie && currentMovie.subtitles && currentMovie.subtitles.length > 0){
    const subtitleUrl = fileUrl(currentMovie.subtitles[0].path);
    const track = document.createElement('track');
    track.kind = 'subtitles';
    track.label = 'English';
    track.srclang = 'en';
    track.src = subtitleUrl;
    track.default = true;
    videoPlayer.appendChild(track);
  }

  if (!window.plyrInstance) {
    window.plyrInstance = new Plyr(videoPlayer, {
      iconUrl: 'assets/plyr.svg',
      controls: [
        'play-large',
        'play',
        'progress',
        'current-time',
        'duration',
        'mute',
        'volume',
        'captions',
        'settings',
        'pip',
        'airplay',
        'fullscreen'
      ],
      settings: ['captions', 'speed'],
      fullscreen: { enabled: true, fallback: true, iosNative: false },
      clickToPlay: false,
      hideControls: true,
      resetOnEnd: false,
      keyboard: { focused: true, global: true },
      tooltips: { controls: true, seek: true }
    });

    try {
      const allImages = document.querySelectorAll('img[loading="lazy"]');
      allImages.forEach(img => {
        if (img.src && !img.complete) {
          img.dataset.originalSrc = img.src;
          img.removeAttribute('src');
        }
      });
      console.log('Paused lazy image loading for video playback');
    } catch(e) {
      console.warn('Could not pause image loading', e);
    }

    window.plyrInstance.on('pause', () => {
      saveNow();
      releaseWakeLock().catch(()=>{});
    });
    window.plyrInstance.on('play', () => {
      requestWakeLock().catch(()=>{});
    });
    window.plyrInstance.on('ended', () => {
      clearResumeFor(currentMovie.path);
      stopAutosave();
      releaseWakeLock().catch(()=>{});
      renderGrid();
    });
    window.plyrInstance.on('seeked', () => {
      saveNow();
    });

    window.plyrInstance.on('loadedmetadata', () => {
      console.log('Video metadata loaded:', videoPlayer.videoWidth, 'x', videoPlayer.videoHeight);

      if (document.querySelector('.plyr--fullscreen')) {
        requestAnimationFrame(() => {
          const plyrContainer = document.querySelector('.plyr--fullscreen');
          const wrapper = document.querySelector('.plyr--fullscreen .plyr__video-wrapper');
          const video = videoPlayer;

          if (plyrContainer) {
            plyrContainer.style.width = '100vw';
            plyrContainer.style.height = '100vh';
            plyrContainer.style.display = 'flex';
            plyrContainer.style.alignItems = 'center';
            plyrContainer.style.justifyContent = 'center';
          }

          if (wrapper) {
            wrapper.style.width = '100%';
            wrapper.style.height = '100%';
            wrapper.style.display = 'flex';
            wrapper.style.alignItems = 'center';
            wrapper.style.justifyContent = 'center';
          }

          if (video) {
            video.style.width = '100%';
            video.style.height = '100%';
            video.style.maxWidth = '100vw';
            video.style.maxHeight = '100vh';
            video.style.objectFit = 'contain';
          }

          console.log('Reapplied fullscreen sizing after metadata load');
        });
      }
    });

    window.plyrInstance.on('enterfullscreen', async () => {
      console.log('Entered fullscreen');

      const enforceFullscreenSizing = () => {
        const plyrContainer = document.querySelector('.plyr--fullscreen');
        const wrapper = document.querySelector('.plyr--fullscreen .plyr__video-wrapper');
        const video = videoPlayer;

        if (plyrContainer) {
          plyrContainer.style.cssText = 'width: 100vw !important; height: 100vh !important; display: flex !important; align-items: center !important; justify-content: center !important; background: #000 !important; padding: 0 !important;';
        }

        if (wrapper) {
          wrapper.style.cssText = 'width: 100% !important; height: 100% !important; display: flex !important; align-items: center !important; justify-content: center !important; position: relative !important; padding-bottom: 0 !important; padding: 0 !important;';
        }

        if (video) {
          video.style.cssText = 'width: 100% !important; height: 100% !important; max-width: 100vw !important; max-height: 100vh !important; object-fit: contain !important; position: relative !important;';
        }
      };

      // Apply immediately and aggressively
      enforceFullscreenSizing();
      setTimeout(enforceFullscreenSizing, 50);
      setTimeout(enforceFullscreenSizing, 100);
      setTimeout(enforceFullscreenSizing, 200);

      // Keep enforcing every 100ms while in fullscreen
      const enforcerInterval = setInterval(() => {
        if (!document.querySelector('.plyr--fullscreen')) {
          clearInterval(enforcerInterval);
        } else {
          enforceFullscreenSizing();
        }
      }, 100);

      try {
        if (screen.orientation && screen.orientation.lock) {
          await screen.orientation.lock('landscape').catch(e => console.log('Orientation lock not supported:', e));
        }
      } catch(e) {
        console.log('Could not lock orientation:', e);
      }
    });

    window.plyrInstance.on('exitfullscreen', () => {
      try {
        if (screen.orientation && screen.orientation.unlock) {
          screen.orientation.unlock();
        }
      } catch(e) {
        console.log('Could not unlock orientation:', e);
      }
    });

    setTimeout(() => {
      const plyrWrapper = document.querySelector('.plyr__video-wrapper');
      if (plyrWrapper) {
        let lastTap = 0;
        let tapTimeout = null;

        plyrWrapper.addEventListener('touchend', (e) => {
          const currentTime = Date.now();
          const tapLength = currentTime - lastTap;

          if (tapLength < 300 && tapLength > 0) {
            clearTimeout(tapTimeout);
            e.preventDefault();
            e.stopPropagation();

            const rect = plyrWrapper.getBoundingClientRect();
            const touchX = e.changedTouches[0].clientX - rect.left;
            const width = rect.width;

            if (touchX < width / 3) {
              window.plyrInstance.rewind(10);
              console.log('Rewind 10s');
            } else if (touchX > (2 * width) / 3) {
              window.plyrInstance.forward(10);
              console.log('Forward 10s');
            }
            lastTap = 0;
          } else {
            lastTap = currentTime;
            tapTimeout = setTimeout(() => {
              lastTap = 0;
              if (window.plyrInstance && document.querySelector('.plyr--hide-controls') === null) {
                const controlsDiv = document.querySelector('.plyr__controls');
                if (controlsDiv && getComputedStyle(controlsDiv).opacity !== '0') {
                  const video = document.querySelector('.plyr video');
                  if (video) video.click();
                }
              }
            }, 300);
          }
        });
      }
    }, 500);
  } else {
    const subtitles = [];
    if(currentMovie && currentMovie.subtitles && currentMovie.subtitles.length > 0){
      const subtitleUrl = fileUrl(currentMovie.subtitles[0].path);
      subtitles.push({ kind: 'captions', label: 'English', srclang: 'en', src: subtitleUrl, default: true });
    }
    window.plyrInstance.source = {
      type: 'video',
      sources: [{ src: src, type: 'video/mp4' }],
      tracks: subtitles
    };
  }

  videoModal.style.display = 'flex';
  videoTitle.textContent = currentMovie ? currentMovie.name : '';

  videoPlayer.addEventListener('loadedmetadata', function onMetadata() {
    console.log('Video metadata loaded:', videoPlayer.videoWidth, 'x', videoPlayer.videoHeight);
    videoPlayer.removeEventListener('loadedmetadata', onMetadata);
  }, { once: true });

  if (startTime > 0) {
    window.plyrInstance.once('canplay', () => {
      window.plyrInstance.currentTime = startTime;
      console.log('Resume position set to:', startTime);
    });
  }

  startAutosave();
  window.plyrInstance.play().catch(e => console.warn('Play failed:', e));
}
function closeVideo(){
  try{ saveNow(); }catch(e){}
  if (window.plyrInstance) {
    window.plyrInstance.pause();
  }
  videoModal.style.display = 'none';
  stopAutosave();
  releaseWakeLock().catch(()=>{});

  try {
    const allImages = document.querySelectorAll('img[loading="lazy"]');
    allImages.forEach(img => {
      if (img.dataset.originalSrc) {
        img.src = img.dataset.originalSrc;
        delete img.dataset.originalSrc;
      }
    });
    console.log('Resumed lazy image loading');
  } catch(e) {
    console.warn('Could not resume image loading', e);
  }
}

/* autosave every 4s */
function startAutosave(){ stopAutosave(); autosaveTimer = setInterval(saveNow, 4000); }
function stopAutosave(){ if(autosaveTimer){ clearInterval(autosaveTimer); autosaveTimer = null; } }
function saveNow(){
  try {
    if(!currentMovie) return;
    if(!window.plyrInstance) return;
    const cur = Math.floor(window.plyrInstance.currentTime || 0);
    const dur = Math.floor(window.plyrInstance.duration || 0);
    if(!isFinite(cur)) return;
    if(cur > 0 && dur > 0){
      const store = readResume();
      const key = fileKey(currentMovie.path, currentMovie.sz || 0, currentMovie.mt || 0);
      store[key] = { position: cur, duration: dur, updated: Date.now() };
      writeResume(store);
      try { updateResumeBadge(currentMovie, cur); } catch(e){ /* noop */ }
    }
  } catch(e){ console.warn('saveNow failed', e); }
}

/* Fetch & build logic: try indexes then fallback to media.json */
async function loadLibrary(){
  try {
    const list = await buildFromIndexes(ROOT_PATH);
    if(list && list.length){
      movies = list;
      filtered = movies.slice();
      renderGrid();
      return;
    }
  } catch(e){
    if(e && e.message === 'INDEX_BUILDING') {
      // Show loading message and retry after delay
      gridEl.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--primary-dark);">Building movie index, please wait...</p>';
      setTimeout(() => loadLibrary(), 3000); // Retry in 3 seconds
      return;
    }
    console.warn('index build failed, falling back', e);
  }

  try {
    movies = await loadFromMediaJson();
    filtered = movies.slice();
    renderGrid();
  } catch(e){
    console.error('media.json fallback failed', e);
    gridEl.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--primary-dark);">Unable to load content.</p>';
  }
}

/* UI: search, sort, size buttons */
const searchInput = document.getElementById('searchInput');
const sortSelect = document.getElementById('sortSelect');
const viewButtons = document.querySelectorAll('.view-btn');

function applyFilter(term=''){
  const lower = (term||'').trim().toLowerCase();
  filtered = !lower ? movies.slice() : movies.filter(m => (m.name || '').toLowerCase().includes(lower));
  applySort(sortSelect.value || 'nameAsc');
}
function applySort(mode){
  filtered.sort((a,b) => mode === 'nameDesc' ? b.name.localeCompare(a.name) : a.name.localeCompare(b.name));
  renderGrid();
}
function setViewSize(size){
  currentSize = size;
  viewButtons.forEach(btn => {
    btn.classList.toggle('active', btn.dataset.size === size);
    btn.setAttribute('aria-pressed', btn.dataset.size === size ? 'true' : 'false');
  });
  gridEl.className = `media-grid ${size}`;
  localStorage.setItem('nomadMoviesSize', size);
}

/* index poll (cheap) to refresh if index sig changes */
async function checkIndex(){
  try {
    const url = `${INDEX_ENDPOINT}?path=${encodeURIComponent(ROOT_PATH)}&_=${Date.now()}`;
    const res = await fetch(url, { cache: 'no-store' });
    if(!res.ok) return;
    const text = await res.text();
    const headerLine = text.split('\n')[0];
    if(headerLine){
      const header = JSON.parse(headerLine);
      if(header && header.sig){
        if(!rootSig){
          rootSig = header.sig;
        } else if(rootSig !== header.sig){
          // new signature -> reload library
          rootSig = header.sig;
          await loadLibrary();
        }
      }
    }
  } catch(e){}
}

    if(document.getElementById('videoModal').style.display === 'flex') closeVideo();

  }
});

sortSelect.addEventListener('change', ()=> applySort(sortSelect.value));

  try {
    await loadLibrary();

    // NEW: ensure toolbar sits below the header on all screen sizes
    function updateToolbarTop(){
      try {
        const headerEl = document.querySelector('header');
        const toolbarEl = document.querySelector('.toolbar');
        if(!headerEl || !toolbarEl) return;
        const h = Math.ceil(headerEl.getBoundingClientRect().height);

        // Also update CSS var (keeps the stylesheet fallback in sync)
        document.documentElement.style.setProperty('--header-height', h + 'px');
      } catch(e){ /* ignore measurement errors */ }
    }
    window.addEventListener('resize', updateToolbarTop);
    window.addEventListener('load', updateToolbarTop);
    updateToolbarTop(); // initial set

    // NEW: handle any hash present once movies[] is available
    try { handleHashNavigation(getHashParam()); } catch(e){ console.warn('hash handling failed', e); }

  } catch(e){
    console.error('init error', e);
  }
  setInterval(checkIndex, 30000);
})();

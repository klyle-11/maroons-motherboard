<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Nomad • Movies</title>

<style>
  :root{
    --primary:#007bff;
    --primary-dark:#0056b3;
    --bg:#f4f4f9;
    --text:#333;
    --radius:10px;
    --shadow:0 6px 18px rgba(0,0,0,0.08);
    --card-gap:1rem; /* used in JS for calculations */
    --header-height:68px; /* fallback used by CSS; JS will set exact top */
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100vh}
  /* Optional dark class hook - you can extend these rules later if desired */
  body.dark{ background:#101217; color:#e6eef8; }
  body.dark header{ background:#07142a; }
  body.dark .toolbar{ background: #0d1722; border-bottom-color: rgba(255,255,255,0.04); }

  /* ── HEADER / TOOLBAR FIXES ── */
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:16px 20px;
    position:sticky;
    top:0;
    z-index:60;
    box-shadow:var(--shadow);
    background:var(--primary);
    color:#fff;
    -webkit-box-align:center;
  }

  header h1{
    margin:0;
    font-size:clamp(1.15rem,4vw,1.5rem);
    font-weight:700;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    flex:1 1 auto;
    text-align:left;
  }

  .back-btn{
    text-decoration:none;
    color:#fff;
    background:var(--primary-dark);
    padding:.45rem .7rem;
    border-radius:8px;
    font-size:0.95rem;
    display:inline-flex;
    align-items:center;
    gap:8px;
    border:1px solid rgba(0,0,0,0.08);
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  }

  .toolbar{background:var(--bg);padding:.65rem 1rem;display:flex;flex-wrap:wrap;gap:.6rem;align-items:center;border-bottom:1px solid #e6e9ef;position:sticky;top:var(--header-height);z-index:55;}
  .toolbar input[type="search"]{flex:1 1 220px;padding:.5rem .75rem;border:1px solid #d6d9e6;border-radius:8px;font-size:0.95rem;background:#fff}
  .toolbar select, .toolbar .view-btn{padding:.48rem .7rem;border:1px solid #d6d9e6;background:#fff;border-radius:8px;font-size:0.9rem;cursor:pointer}
  .view-btn.active{background:var(--primary);color:#fff;border-color:var(--primary-dark);}

  main{flex:1;display:flex;flex-direction:column;max-width:1200px;width:100%;margin:0 auto;padding:1rem}
  .grid-wrapper{flex:1;overflow-y:auto;padding-bottom:12px}
  .media-grid{display:grid;gap:var(--card-gap);}

  .media-grid.small  {grid-template-columns:repeat(auto-fit,minmax(120px,1fr));}
  .media-grid.medium {grid-template-columns:repeat(auto-fit,minmax(160px,1fr));}
  .media-grid.large  {grid-template-columns:repeat(auto-fit,minmax(220px,1fr));}

  @media (max-width:600px){
    header{flex-direction:column;gap:.5rem;align-items:stretch;}
    .back-btn{width:100%;text-align:center;}
    .toolbar{top:112px;}
    .media-grid.small  {grid-template-columns:repeat(2,1fr);}
    .media-grid.medium {grid-template-columns:repeat(3,1fr);}
    .media-grid.large  {grid-template-columns:repeat(4,1fr);}
  }

  /* card */
  .media-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;transition:transform .22s ease, box-shadow .22s ease;cursor:pointer;width:100%;max-width:220px;margin:0 auto;will-change:transform,opacity;}
  .media-grid.small  .media-card{max-width:120px;}
  .media-grid.medium .media-card{max-width:160px;}
  .media-grid.large  .media-card{max-width:220px;}
  .media-card:hover{transform:translateY(-4px);box-shadow:0 10px 26px rgba(0,0,0,0.10);}

  .thumb-wrapper{position:relative;display:flex;align-items:center;justify-content:center;background:#efeff5;color:#555;font-size:0.9rem;text-align:center;width:100%;aspect-ratio:2/3;}
  .fallback-text{padding:.5rem;position:absolute;z-index:2;text-align:center;font-weight:700;color:#06306f;left:8px;right:8px}
  .media-thumb{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;z-index:1;opacity:0;transition:opacity .35s ease;}
  .badge-resume{position:absolute;left:8px;bottom:8px;background:rgba(0,0,0,0.6);color:#fff;padding:6px 8px;border-radius:8px;font-weight:700;font-size:12px;z-index:4}

  .meta{padding:10px 8px;text-align:center}
  .meta .title{font-weight:700;color:#08306f;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-size:0.95rem}
  .meta .dir{font-size:12px;color:#666;overflow:hidden;white-space:nowrap;text-overflow:ellipsis; display:none}

  /* modal basics */
  .modal,.video-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);justify-content:center;align-items:center;z-index:1000;padding:20px;}
  .modal-content {
      background:#fff;
      padding:20px;
      border-radius:12px;
      text-align:center;
      width:94%;
      max-width:480px;
      box-shadow:0 10px 36px rgba(0,0,0,0.12);
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .modal-content h2 {margin:0;font-size:1.15rem;font-weight:700;color:#222}
    #modalSub {font-size:0.9rem;color:#555}

    .modal button {
      padding:10px 14px;
      font-size:0.95rem;
      border:none;
      border-radius:8px;
      cursor:pointer;
      transition:background-color .18s ease, color .18s ease;
    }
    .modal button:not(.cancel):not(.secondary) {
      background:var(--primary);
      color:#fff;
    }
    .modal button.secondary { background:#f6f9ff; color:var(--primary); border:1px solid rgba(0,123,255,0.12); }
    .modal button.cancel { background:#fff; color:#444; border:1px solid #e6e9ef; }

    /* video modal styled white with blue close button */
    .video-modal-content {
      background:#fff;
      padding:14px;
      border-radius:12px;
      width:100%;
      max-width:980px;
      box-shadow:0 12px 44px rgba(0,0,0,0.18);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
    }
    .video-modal-content h2 { color:#08306f; font-size:1.05rem; margin:0; text-align:center; font-weight:700 }
    .video-container { width:100%; display:flex;flex-direction:column;align-items:center;gap:8px; }
    .video-container video {
      width:100%;
      max-height:75vh;
      border-radius:10px;
      background:#000;
      box-shadow:0 8px 26px rgba(0,0,0,0.12);
      outline:1px solid rgba(0,0,0,0.04);
    }
    .video-modal-content .close-btn {
      padding:10px 14px;
      font-size:0.95rem;
      border:none;
      border-radius:8px;
      cursor:pointer;
      background:var(--primary);
      color:#fff;
      transition:filter .18s ease;
    }
    .video-modal-content .close-btn:hover { filter:brightness(0.96); }

  footer{padding:10px;text-align:center;color:#666;font-size:0.95rem}

  /* --- entrance animation for cards --- */
  .media-card.play-anim { animation-name:cardIn; animation-duration:360ms; animation-timing-function:cubic-bezier(.2,.9,.2,1); animation-fill-mode:both; will-change:transform,opacity; }
  @keyframes cardIn {
    from { opacity:0; transform:translateX(-18px) scale(.994); }
    to   { opacity:1; transform:translateX(0) scale(1); }
  }

  /* ── DARK-THEME: MODAL + PLAYER SPECIFIC RULES ──
     Only change the popup/menu and video player appearance when dark mode is active.
     Keep the rest of the UI unchanged so behavior is preserved.
  */
  body.dark .modal { background: rgba(2,6,10,0.78); }
  body.dark .modal-content {
    background: #0b1116;
    color: #e6eef8;
    box-shadow: 0 18px 46px rgba(0,0,0,0.7);
    border: 1px solid rgba(255,255,255,0.03);
  }
  body.dark .modal-content h2 { color: #eaf4ff; }
  body.dark #modalSub { color: rgba(230,238,248,0.85); }

  /* buttons inside modal in dark mode */
  body.dark .modal button { color: #e6eef8; }
  body.dark .modal button:not(.cancel):not(.secondary) { background:var(--primary); color:#fff; }
  body.dark .modal button.secondary { background: rgba(255,255,255,0.02); color: #d9eefc; border:1px solid rgba(255,255,255,0.04); }
  body.dark .modal button.cancel { background: rgba(255,255,255,0.02); color:#d9eefc; border:1px solid rgba(255,255,255,0.04); }

  /* badge contrast tweak for dark theme */
  body.dark .badge-resume { background: rgba(255,255,255,0.06); color: #e6eef8; box-shadow: none; }

  /* video modal dark variant */
  body.dark .video-modal { background: rgba(0,0,0,0.88); }
  body.dark .video-modal-content {
    background: #071018;
    color: #e6eef8;
    box-shadow: 0 20px 64px rgba(0,0,0,0.75);
    border: 1px solid rgba(255,255,255,0.03);
  }
  body.dark .video-modal-content h2 { color: #eaf4ff; }
  body.dark .video-container video {
    background: #000;
    outline: 1px solid rgba(255,255,255,0.03);
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  }
  body.dark .video-modal-content .close-btn { background: var(--primary-dark); color: #fff; border: none; }

  /* ensure toolbar inputs keep readable behavior but don't interfere with modal colors */
  /* Note: the JS intentionally forces the search box to white for readability; leaving that behavior intact. */
</style>
</head>
<body>
  <header>
    <h1>Movies</h1>
    <a class="back-btn" href="http://192.168.4.1/menu">← Back to Menu</a>
  </header>

  <div class="toolbar" role="region" aria-label="toolbar">
    <input id="searchInput" type="search" placeholder="Search movies…" aria-label="Search movies" class="search-input">
    <select id="sortSelect" aria-label="Sort movies">
      <option value="nameAsc">A → Z</option>
      <option value="nameDesc">Z → A</option>
    </select>
    <button class="view-btn" data-size="small" title="Compact view" aria-pressed="false">🔳</button>
    <button class="view-btn active" data-size="medium" title="Comfort view" aria-pressed="true">🔲</button>
    <button class="view-btn" data-size="large" title="Gallery view" aria-pressed="false">⬜</button>
  </div>

  <main>
    <div class="grid-wrapper">
      <div id="grid" class="media-grid medium" aria-live="polite" aria-label="Movie list"></div>
    </div>
  </main>

  <div id="modal" class="modal" onclick="if(event.target===this) closeModal();">
    <div class="modal-content" onclick="event.stopPropagation()">
      <h2 id="modalTitle">What would you like to do?</h2>
      <div id="modalSub"></div>

      <button id="playButton">Play from Start</button>
      <button id="resumeButton" class="secondary" style="display:none">Resume</button>
      <button id="downloadButton" class="cancel">Download</button>
      <button onclick="closeModal()" class="cancel">Cancel</button>
    </div>
  </div>

  <div id="videoModal" class="video-modal" onclick="if(event.target===this) closeVideo();">
    <div class="video-modal-content" onclick="event.stopPropagation();">
      <h2 id="videoTitle"></h2>
      <div class="video-container">
        <video id="videoPlayer" controls playsinline aria-label="Video player"></video>
      </div>
      <button id="videoCloseBtn" class="close-btn" onclick="closeVideo()" aria-label="Close video">✕ Close</button>
    </div>
  </div>

  <footer>© <span id="year"></span> Jcorp Nomad</footer>

<script>
/* Config */
const ROOT_PATH = '/Movies';
const INDEX_ENDPOINT = '/api/index';
const MEDIA_ENDPOINT = '/media';
const RESUME_KEY = 'nomad:watch:v1';
const ANIM_KEY_BASE = 'nomad:movies:anim:v1';
const VIDEO_EXTS = ['.mp4','.mkv','.avi','.mov','.webm','.m4v'];
const IMAGE_EXTS = ['.jpg','.jpeg','.png','.webp','.avif'];
const SUB_EXTS = ['.srt','.vtt','.ass','.ssa','.sub'];

/* NEW: THEME KEY + THEME BOOT & SYNC */
const THEME_KEY = 'nomad_dark_mode';
function applyThemeFlag(dark){
  if(dark) document.body.classList.add('dark');
  else document.body.classList.remove('dark');

  // Keep search readable: enforce white bg + black text (menu wants this behavior)
  const search = document.querySelector('.search-input');
  if(search){
    try {
      search.style.background = '#fff';
      search.style.color = '#000';
    } catch(e){ /* ignore style errors */ }
  }
}
(function initThemeFromStorage(){
  try {
    const saved = localStorage.getItem(THEME_KEY);
    const isDark = (saved === 'true');
    applyThemeFlag(isDark);
  } catch(e){ applyThemeFlag(false); }
})();

// Keep pages/tabs in sync when menu toggles the key
window.addEventListener('storage', (ev) => {
  if(ev.key === THEME_KEY){
    const dark = ev.newValue === 'true';
    applyThemeFlag(dark);
  }
});
// optional helper for local toggles
function toggleThemeLocal(){
  const isDark = document.body.classList.toggle('dark');
  try { localStorage.setItem(THEME_KEY, isDark ? 'true' : 'false'); }catch(e){}
}

/* State */
let movies = [];      // list of {name, rawName, cover, path, dir, sz, mt, subtitles}
let filtered = [];
let currentSize = localStorage.getItem('nomadMoviesSize') || 'medium';
let currentMovie = null;
let autosaveTimer = null;
let rootSig = null;

/* ---------- Screen wake lock / NoSleep fallback ---------- */
/* Place this right after your "State" declarations */
let wakeLock = null;
let noSleep = null; // used if NoSleep.js is loaded

async function requestWakeLock(){
  try {
    // Preferred: Screen Wake Lock API (modern browsers)
    if('wakeLock' in navigator){
      if(!wakeLock){
        wakeLock = await navigator.wakeLock.request('screen');
        // clear reference if UA releases the lock
        wakeLock.addEventListener && wakeLock.addEventListener('release', () => { wakeLock = null; });
      }
      return true;
    }

    // Fallback: NoSleep.js (if included via script tag)
    if(window.NoSleep){
      if(!noSleep) noSleep = new NoSleep();
      try { noSleep.enable(); } catch(e){ console.warn('NoSleep.enable() failed', e); }
      return true;
    }

    // Nothing available
    console.warn('No Wake Lock API or NoSleep available — screen may still sleep.');
    return false;
  } catch(e){
    console.warn('requestWakeLock error', e);
    // last-ditch NoSleep attempt
    if(window.NoSleep){
      try { if(!noSleep) noSleep = new NoSleep(); noSleep.enable(); return true; } catch(e2){}
    }
    return false;
  }
}

async function releaseWakeLock(){
  try {
    if(wakeLock){
      try { await wakeLock.release(); } catch(e){}
      wakeLock = null;
    }
    if(noSleep){
      try { noSleep.disable(); } catch(e){}
    }
  } catch(e){
    console.warn('releaseWakeLock error', e);
  }
}


/* Helpers */
function normalizePath(p){ if(!p) return '/'; if(!p.startsWith('/')) p='/' + p; while(p.length>1 && p.endsWith('/')) p=p.slice(0,-1); return p; }
function ext(name){ const i=name.lastIndexOf('.'); return i>=0? name.slice(i).toLowerCase() : ''; }
function isVideoName(n){ return VIDEO_EXTS.includes(ext(n)); }
function isImageName(n){ return IMAGE_EXTS.includes(ext(n)); }
function isSubtitleName(n){ return SUB_EXTS.includes(ext(n)); }
function fileUrl(path){ return `${MEDIA_ENDPOINT}?file=${encodeURIComponent(path)}`; }
function readResume(){ try{ return JSON.parse(localStorage.getItem(RESUME_KEY)||'{}'); }catch(e){return{};} }
function writeResume(v){ localStorage.setItem(RESUME_KEY, JSON.stringify(v)); }
function fileKey(path, sz=0, mt=0){ return `${normalizePath(path)}|${sz||0}|${mt||0}`; }
function formatTime(sec){ if(!sec||!isFinite(sec)) return '0:00'; sec=Math.floor(sec); const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60; if(h) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; return `${m}:${String(s).padStart(2,'0')}`; }

/* NEW: getHashParam() — parse location.hash into {action, path} safely */
function getHashParam(){
  const h = (location.hash || '').replace(/^#/,'');

  if(!h) return { action:null, path:null };
  const [k, ...rest] = h.split('=');
  const v = rest.length ? rest.join('=') : '';
  try {
    return { action: k || null, path: v ? decodeURIComponent(v) : null };
  } catch(e){
    // fallback to raw
    return { action: k || null, path: v || null };
  }
}
/* Better Resume Badge Handling */
function updateResumeBadge(movie, position){
  if(!movie || !movie.path) return;
  // find a card with matching dataset.path and update or insert the badge
  const cards = Array.from(gridEl.querySelectorAll('.media-card'));
  for(const card of cards){
    if(card.dataset.path === movie.path){
      const badge = card.querySelector('.badge-resume');
      if(position > 1){
        if(badge){
          badge.textContent = `Resume ${formatTime(position)}`;
        } else {
          const wrapper = card.querySelector('.thumb-wrapper');
          if(wrapper){
            const div = document.createElement('div');
            div.className = 'badge-resume';
            div.textContent = `Resume ${formatTime(position)}`;
            wrapper.appendChild(div);
          }
        }
      } else {
        if(badge) badge.remove();
      }
      break;
    }
  }
}

/* Resume matching */
function findResume(movie){
  const store = readResume();
  const norm = normalizePath(movie.path);
  const exact = fileKey(movie.path, movie.sz||0, movie.mt||0);
  if(store[exact]) return { key: exact, entry: store[exact] };

  for(const k of Object.keys(store)){
    const p = (k.split('|')[0] || '');
    if(normalizePath(p) === norm) return { key:k, entry:store[k] };
  }
  for(const k of Object.keys(store)){
    const p = (k.split('|')[0] || '').replace(/^\//,'');
    if(p === norm.replace(/^\//,'')) return { key:k, entry:store[k] };
  }
  const base = norm.split('/').pop().toLowerCase();
  for(const k of Object.keys(store)){
    const p = (k.split('|')[0] || '').toLowerCase();
    if(p.split('/').pop() === base) return { key:k, entry:store[k] };
  }
  return null;
}
function clearResumeFor(path){
  const store = readResume();
  const norm = normalizePath(path);
  let changed=false;
  for(const k of Object.keys(store)){
    const p = (k.split('|')[0] || '');
    if(normalizePath(p) === norm || p.replace(/^\//,'') === norm.replace(/^\//,'')){
      delete store[k];
      changed = true;
    }
  }
  if(changed) writeResume(store);
}

/* Fetch NDJSON index for a path — cache-busted to avoid stale results */
async function fetchIndex(path){
  const url = `${INDEX_ENDPOINT}?path=${encodeURIComponent(normalizePath(path))}&_=${Date.now()}`;
  const res = await fetch(url, { cache: 'no-store' });
  if(!res.ok) throw new Error('index fetch failed '+res.status);
  const text = await res.text();
  const lines = text.split('\n').filter(Boolean);
  const header = lines.length ? JSON.parse(lines[0]) : null;
  const entries = [];
  for(let i=1;i<lines.length;i++){
    try{ entries.push(JSON.parse(lines[i])); }catch(e){}
  }
  return { header, entries };
}


/* Build movies from NDJSON indexes (kept original behavior) */
async function buildFromIndexes(root){
  // Attempt to set rootSig using the root index header
  const rootResp = await fetchIndex(root);
  if(rootResp.header && rootResp.header.sig) rootSig = rootResp.header.sig;

  const map = new Map();
  // gather root entries
  for(const e of rootResp.entries){
    const dir = normalizePath(root);
    const full = dir === '/' ? `/${e.n}` : `${dir}/${e.n}`;
    const base = e.n.replace(/\.[^/.]+$/,'').toLowerCase();
    const key = `${dir}::${base}`;
    if(!map.has(key)) map.set(key, { dir, base, files: [] });
    map.get(key).files.push({ name: e.n, t: e.t, sz: e.sz||0, mt: e.mt||0, full: normalizePath(full) });
  }

  // fetch child dir indexes
  for(const e of rootResp.entries){
    if(e.t === 'd'){
      const dirPath = (root === '/' ? '' : root) + '/' + e.n;
      try {
        const resp = await fetchIndex(dirPath);
        for(const f of resp.entries){
          const dir = normalizePath(dirPath);
          const full = dir === '/' ? `/${f.n}` : `${dir}/${f.n}`;
          const base = f.n.replace(/\.[^/.]+$/,'').toLowerCase();
          const key = `${dir}::${base}`;
          if(!map.has(key)) map.set(key, { dir, base, files: [] });
          map.get(key).files.push({ name: f.n, t: f.t, sz: f.sz||0, mt: f.mt||0, full: normalizePath(full) });
        }
      } catch(err){
        console.warn('child index missing', dirPath, err);
      }
    }
  }

  const out = [];
  for(const [k,v] of map.entries()){
    const media = v.files.find(x => isVideoName(x.name));
    if(!media) continue;
    const image = v.files.find(x => isImageName(x.name));
    const subs = v.files.filter(x => isSubtitleName(x.name));
    const dir = v.dir;
    const path = normalizePath((dir === '/' ? '' : dir) + '/' + media.name);
    out.push({
    name: prettify(media.name),
    rawName: media.name,
    cover: image ? (normalizePath((dir === '/' ? '' : dir) + '/' + image.name) + `?_=${image.mt || image.sz || media.mt || rootSig || Date.now()}`) : null,
    path,
    dir,
    sz: media.sz || 0,
    mt: media.mt || 0,
    subtitles: subs.map(s => ({ path: normalizePath((dir === '/' ? '' : dir) + '/' + s.name), ext: ext(s.name) }))
    });
  }
  out.sort((a,b) => a.name.localeCompare(b.name));
  return out;
}
function prettify(filename){
  const n = filename.replace(/\.[^/.]+$/,'');

  let t = n.replace(/[_\.]+/g,' ').trim();
  t = t.replace(/\s*\(?\d{4}\)?\s*$/,'').trim();
  return t || filename;
}

/* fallback load media.json */
async function loadFromMediaJson(){
  const res = await fetch('/media.json');
  if(!res.ok) throw new Error('media.json missing');
  const json = await res.json();
  const raw = json.movies || json.Movies || [];
  const out = raw.filter(m => isVideoName(m.file || m.path || '')).map(m => ({
    name: prettify(m.name || m.title || (m.file||m.path||'')),
    rawName: m.file || m.path || '',
    cover: m.cover || m.thumbnail || m.poster || null,
    path: m.file || m.path || '',
    dir: '/',
    sz: m.sz || 0,
    mt: m.mt || 0,
    subtitles: []
  }));
  return out;
}

/* Render grid with optional staggered animation on first load */
const gridEl = document.getElementById('grid');

function renderGrid(){
  gridEl.className = `media-grid ${currentSize}`;
  const frag = document.createDocumentFragment();

  for(const item of filtered){
    const card = document.createElement('div');
    card.className = 'media-card';
    // helpful hook to update badge for a specific movie without re-rendering whole grid:
    card.dataset.path = item.path || '';

    const saved = findResume(item);
    const resumeHTML = (saved && saved.entry && saved.entry.position > 1) ? `<div class="badge-resume">Resume ${formatTime(saved.entry.position)}</div>` : '';
    const imgHTML = item.cover ? `<img class="media-thumb" loading="lazy" src="${item.cover}" alt="${escapeHtml(item.name)}">` : '';
    card.innerHTML = `
      <div class="thumb-wrapper">
        <span class="fallback-text">${escapeHtml(item.name)}</span>
        ${resumeHTML}
        ${imgHTML}
      </div>
    `;
    const img = card.querySelector('img');
    const fallback = card.querySelector('.fallback-text');
    if(img){
      img.onload = () => { img.style.opacity = '1'; if(fallback) fallback.style.display = 'none'; };
      img.onerror = () => { img.style.display = 'none'; if(fallback) fallback.style.display = 'block'; };
    } else {
      if(fallback) fallback.style.display = 'block';
    }
    card.addEventListener('click', () => showMovieOptions(item));
    frag.appendChild(card);
  }

  // Clear + append
  gridEl.innerHTML = '';
  gridEl.appendChild(frag);

  // Decide if we should animate now:
  const animKey = rootSig ? `${ANIM_KEY_BASE}:${rootSig}` : ANIM_KEY_BASE;
  const already = localStorage.getItem(animKey);
  if(!already && filtered.length > 0){
    runStaggeredAnimation(animKey);
  }
}

/* Escape helper for injection safety when inserting titles */
function escapeHtml(str){
  if(!str) return '';
  return String(str).replace(/[&<>"']/g, function(m){
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]);
  });
}

/* Animation logic: compute grid columns and set animationDelay for each card row-by-row left->right */
function runStaggeredAnimation(storeKey){
  const cards = Array.from(gridEl.querySelectorAll('.media-card'));
  if(!cards.length) { localStorage.setItem(storeKey, Date.now()); return; }

  // allow layout to stabilize
  requestAnimationFrame(() => {
    const gridStyles = getComputedStyle(gridEl);
    const gapPx = parseFloat(gridStyles.gap) || 16;
    const gridWidth = Math.max(1, gridEl.clientWidth);
    const firstCardRect = cards[0].getBoundingClientRect();
    const cardWidth = Math.max(1, firstCardRect.width);

    // compute columns (fallback to 1)
    const columns = Math.max(1, Math.floor((gridWidth + gapPx) / (cardWidth + gapPx)));

    const stagger = 45; // ms per step (keeps animation quick)
    cards.forEach((card, i) => {
      const row = Math.floor(i / columns);
      const col = i % columns;
      // Row-by-row left->right: delay increases with (row*columns + col)
      const delay = (row * columns + col) * stagger;
      card.style.animationDelay = `${delay}ms`;
      // apply class to start the animation
      card.classList.add('play-anim');
    });

    // mark as animated so it won't run again until signature changes
    try { localStorage.setItem(storeKey, Date.now()); } catch(e){ /* ignore */ }

    // cleanup inline animationDelay after animation end to keep DOM cleaner
    const maxDelay = (Math.ceil(cards.length / columns) * columns) * stagger + 500;
    setTimeout(() => {
      cards.forEach(c => { c.style.animationDelay = ''; c.classList.remove('play-anim'); /* cards still visible without class */ });
    }, maxDelay);
  });
}

/* Modal controls */

const modalSub = document.getElementById('modalSub');

/* ---------- keep device awake while playing ---------- */
/* Attach listeners so we request a wake lock on play and release on pause/ended */
videoPlayer.addEventListener('playing', () => {

});

});

/* Continue with existing functions */
function showMovieOptions(movie){
  currentMovie = movie;
  modalSub.textContent = movie.name || movie.rawName || movie.path || '';
  const saved = findResume(movie);
  if(saved && saved.entry && saved.entry.position > 1){
    resumeButton.style.display = 'block';
    resumeButton.textContent = `Resume ${formatTime(saved.entry.position)}`;
  } else {
    resumeButton.style.display = 'none';
  }

  playButton.onclick = () => {
    clearResumeFor(movie.path);
    closeModal();
    openVideo(fileUrl(movie.path), false);
  };
  resumeButton.onclick = () => {
    closeModal();
    openVideo(fileUrl(movie.path), true);
  };
  downloadButton.onclick = () => {
    closeModal();
    startDownload(movie);
  };

  modal.style.display = 'flex';
}
function closeModal(){ modal.style.display = 'none'; }

function openMovieFromHash(hashObj){
  if(!hashObj || !hashObj.path) return;
  const wantRaw = hashObj.path || '';
  const want = normalizePath(decodeURIComponent(wantRaw));

  // Try to find the movie by exact normalized path, rawName, or basename fallback
  let found = movies.find(m => normalizePath(m.path) === want)
           || movies.find(m => normalizePath('/' + (m.rawName||'')) === want)
           || movies.find(m => normalizePath('/' + (m.rawName||'')).endsWith(want.split('/').pop()))
           || movies.find(m => normalizePath(m.path).endsWith(want.split('/').pop()));

  // If not found, try a quick reload of library once (in case hash arrived before library loaded fully)
  if(!found){
    try {
      // loadLibrary is defined elsewhere; we try to refresh the list then search again
      // (useful when hash handling runs early)
      // NOTE: this is non-blocking if loadLibrary already ran
      // but we await to give the library a chance to populate
      // only do this when movies[] is empty to avoid unnecessary reloads
      if(!movies || movies.length === 0){
        // eslint-disable-next-line no-undef
        // await loadLibrary(); // if you prefer to await here, uncomment and ensure this function is marked async
      }
      found = movies.find(m => normalizePath(m.path) === want) ||
              movies.find(m => normalizePath('/' + (m.rawName||'')) === want) ||
              movies.find(m => normalizePath(m.path).endsWith(want.split('/').pop()));
    } catch(e){
      console.warn('hash reload attempt failed', e);
    }
  }

  if(!found){
    console.warn('movie not found for hash', want);
    return;
  }

  // Set currentMovie used by openVideo / resume logic
  currentMovie = found;

  // Detect if user came from the Menu (only auto-play in that case)
  const ref = (document.referrer || '').toLowerCase();
  const fromMenu = ref && (ref.includes('/menu') || ref.includes('/menu.html') || ref.includes('/menu/'));

  if(fromMenu){
    // Auto-play and use resume (openVideo's useResume param handles seeking)
    openVideo(fileUrl(found.path), true);

    // Clear the hash so reloads / back button don't auto-play again unexpectedly
    try { history.replaceState(null, '', location.pathname + location.search); } catch(e){ /* ignore */ }
  } else {
    // Normal behavior: show modal/options so we don't interrupt a regular visitor
    showMovieOptions(found);
    // leave the hash intact for user context
  }
}

function handleHashNavigation(hashObj){
  if(!hashObj) return;
  // Accept 'open' or 'play' keys
  if(hashObj.action === 'open' || hashObj.action === 'play' || (!hashObj.action && hashObj.path)){
    openMovieFromHash(hashObj);
  }
}

/* Download helper */
function startDownload(movie){
  if(!confirm(`Download "${movie.name}"?`)) return;
  const a = document.createElement('a');
  a.href = movie.path.startsWith('/') ? movie.path : ('/' + movie.path);
  a.download = movie.name;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

let stallTimer = null, stallRetries = 0;

function startStallWatcher(player, src){
  clearTimeout(stallTimer);
  stallRetries = 0;

  // probe server with a small range request to verify ranges still work
  async function probeRange(url){
    try {
      const resp = await fetch(url, {
        method: 'GET',
        headers: { 'Range': 'bytes=0-1023' },
        cache: 'no-store'
      });
      // 206 is ideal; 200 can also mean server returned whole file (not ideal for streaming)
      return (resp && (resp.status === 206 || resp.status === 200));
    } catch(e){
      return false;
    }
  }

  async function scheduleCheck(delay = 8000){
    clearTimeout(stallTimer);
    stallTimer = setTimeout(async () => {
      // do nothing if user paused or video is already sufficiently buffered
      if(player.paused || player.readyState >= 3 || stallRetries >= 2) return;

      const ok = await probeRange(src);
      if(ok){
        // Server responded; schedule next check
        scheduleCheck();
        return;
      }

      // probe failed -> attempt a single, controlled retry with cache-bust
      stallRetries++;
      console.warn('stallWatcher: probe failed, retry attempt', stallRetries);

      // last-resort reassign: append one cache-bust param and try to resume
      const newSrc = `${src}${src.includes('?') ? '&' : '?'}_=${Date.now()}`;
      try {
        // pause briefly so reassign doesn't race
        player.pause();
        // assign new src and load once (this will interrupt, but only done if probe failed)
        player.src = newSrc;
        try { player.load(); } catch(e){}
        try { player.currentTime = player.currentTime; } catch(e){}
        player.play().catch(()=>{});
      } catch(e){
        console.warn('stallWatcher retry failed', e);
      }

      // schedule another check to avoid continuous rewrites
      scheduleCheck(9000);
    }, delay);
  }

  function onPlaying(){
    player.removeEventListener('playing', onPlaying);
    scheduleCheck();
  }
  player.addEventListener('playing', onPlaying);
  player.addEventListener('pause', () => clearTimeout(stallTimer));
  player.addEventListener('ended', () => clearTimeout(stallTimer));
}


function openVideo(src, useResume=false){
  clearTimeout(stallTimer);
  stallRetries = 0;
  videoPlayer.pause();
  videoPlayer.removeAttribute('src');
  videoPlayer.load();
  videoModal.style.display = 'flex';
  videoPlayer.src = src;
  videoTitle.textContent = currentMovie ? currentMovie.name : '';

  const saved = findResume(currentMovie || { path: '' });

  function onMeta(){
    videoPlayer.removeEventListener('loadedmetadata', onMeta);
    if(useResume && saved && saved.entry && saved.entry.position > 1){
      try { videoPlayer.currentTime = saved.entry.position; } catch(e){ console.warn('seek failed', e); }
    }
    startAutosave();
  }
  videoPlayer.addEventListener('loadedmetadata', onMeta);

  videoPlayer.addEventListener('pause', saveNow);
  videoPlayer.addEventListener('seeked', saveNow);
  videoPlayer.addEventListener('ended', () => {
    clearResumeFor(currentMovie.path);
    stopAutosave();
    renderGrid();
  });

  startStallWatcher(videoPlayer, src);
  videoPlayer.play().catch(()=>{});
}

function closeVideo(){
  try{ saveNow(); }catch(e){}
  videoPlayer.pause();
  videoPlayer.removeAttribute('src');
  videoPlayer.load();
  videoModal.style.display = 'none';
  stopAutosave();
  // ensure wake lock released when closing the player
  releaseWakeLock().catch(()=>{});
}

/* autosave every 4s */
function startAutosave(){ stopAutosave(); autosaveTimer = setInterval(saveNow, 4000); }
function stopAutosave(){ if(autosaveTimer){ clearInterval(autosaveTimer); autosaveTimer = null; } }
function saveNow(){
  try {
    if(!currentMovie) return;
    const cur = Math.floor(videoPlayer.currentTime || 0);
    const dur = Math.floor(videoPlayer.duration || 0);
    if(!isFinite(cur)) return;
    if(cur > 0 && dur > 0){
      const store = readResume();
      const key = fileKey(currentMovie.path, currentMovie.sz || 0, currentMovie.mt || 0);
      store[key] = { position: cur, duration: dur, updated: Date.now() };
      writeResume(store);
      // only update the badge for the current movie to avoid re-rendering the whole grid (stops flashing)
      try { updateResumeBadge(currentMovie, cur); } catch(e){ /* noop */ }
    }
  } catch(e){ console.warn('saveNow failed', e); }
}

/* Fetch & build logic: try indexes then fallback to media.json */
async function loadLibrary(){
  try {
    const list = await buildFromIndexes(ROOT_PATH);
    if(list && list.length){
      movies = list;
      filtered = movies.slice();
      renderGrid();
      return;
    }
  } catch(e){
    console.warn('index build failed, falling back', e);
  }

  try {
    movies = await loadFromMediaJson();
    filtered = movies.slice();
    renderGrid();
  } catch(e){
    console.error('media.json fallback failed', e);
    gridEl.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--primary-dark);">Unable to load content.</p>';
  }
}

/* UI: search, sort, size buttons */
const searchInput = document.getElementById('searchInput');
const sortSelect = document.getElementById('sortSelect');
const viewButtons = document.querySelectorAll('.view-btn');

function applyFilter(term=''){
  const lower = (term||'').trim().toLowerCase();
  filtered = !lower ? movies.slice() : movies.filter(m => (m.name || '').toLowerCase().includes(lower));
  applySort(sortSelect.value || 'nameAsc');
}
function applySort(mode){
  filtered.sort((a,b) => mode === 'nameDesc' ? b.name.localeCompare(a.name) : a.name.localeCompare(b.name));
  renderGrid();
}
function setViewSize(size){
  currentSize = size;
  viewButtons.forEach(btn => {
    btn.classList.toggle('active', btn.dataset.size === size);
    btn.setAttribute('aria-pressed', btn.dataset.size === size ? 'true' : 'false');
  });
  gridEl.className = `media-grid ${size}`;
  localStorage.setItem('nomadMoviesSize', size);
}

/* index poll (cheap) to refresh if index sig changes */
async function checkIndex(){
  try {
    const url = `${INDEX_ENDPOINT}?path=${encodeURIComponent(ROOT_PATH)}&_=${Date.now()}`;
    const res = await fetch(url, { cache: 'no-store' });
    if(!res.ok) return;
    const text = await res.text();
    const headerLine = text.split('\n')[0];
    if(headerLine){
      const header = JSON.parse(headerLine);
      if(header && header.sig){
        if(!rootSig){
          rootSig = header.sig;
        } else if(rootSig !== header.sig){
          // new signature -> reload library
          rootSig = header.sig;
          await loadLibrary();
        }
      }
    }
  } catch(e){}
}

/* keyboard: allow ESC to close modal/video */
document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape'){
    if(document.getElementById('videoModal').style.display === 'flex') closeVideo();
    if(document.getElementById('modal').style.display === 'flex') closeModal();
  }
});

document.getElementById('year').textContent = new Date().getFullYear();
setViewSize(currentSize);
viewButtons.forEach(btn => btn.addEventListener('click', () => setViewSize(btn.dataset.size)));
searchInput.addEventListener('input', (e)=> { clearTimeout(window.__debounce); window.__debounce = setTimeout(()=> applyFilter(e.target.value), 150); });
sortSelect.addEventListener('change', ()=> applySort(sortSelect.value));
videoPlayer.addEventListener('ended', closeVideo);

/* NEW: listen for hash changes and route them */
window.addEventListener('hashchange', ()=> handleHashNavigation(getHashParam()));

/* Init sequence */
(async function init(){
  try {
    await loadLibrary();

    // NEW: ensure toolbar sits below the header on all screen sizes
    function updateToolbarTop(){
      try {
        const headerEl = document.querySelector('header');
        const toolbarEl = document.querySelector('.toolbar');
        if(!headerEl || !toolbarEl) return;
        const h = Math.ceil(headerEl.getBoundingClientRect().height);
        toolbarEl.style.top = h + 'px';
        // Also update CSS var (keeps the stylesheet fallback in sync)
        document.documentElement.style.setProperty('--header-height', h + 'px');
      } catch(e){ /* ignore measurement errors */ }
    }
    window.addEventListener('resize', updateToolbarTop);
    window.addEventListener('load', updateToolbarTop);
    updateToolbarTop(); // initial set

    // NEW: handle any hash present once movies[] is available
    try { handleHashNavigation(getHashParam()); } catch(e){ console.warn('hash handling failed', e); }

  } catch(e){
    console.error('init error', e);
  }
  setInterval(checkIndex, 30000);
})();

<!DOCTYPE html>
<!-- Nomad Gallery — NDJSON /Gallery support (viewport-throttled thumbnails, cached) -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Nomad • Gallery</title>
  <meta name="description" content="Jcorp Nomad Media Server – Images & Video" />
  <style>
    :root{--primary:#007bff;--primary-dark:#0056b3;--bg:#f4f4f9;--text:#333;--radius:8px;--shadow:0 4px 12px rgba(0,0,0,.08)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100vh;padding:0 .5rem;overflow-x:hidden}
    /* simple dark-mode adjustments (menu toggles .dark on <body>) */
    body.dark{ background:#0b0f14; color:#e6eef8; }
    body.dark .toolbar, body.dark .grid-wrapper, body.dark .media-card { background:#07101a; }
    body.dark header{ background:#051226; }
    header{background:var(--primary);color:#fff;padding:1.25rem 1rem;margin-left:-.5rem;margin-right:-.5rem;padding-left:calc(1rem + .5rem);padding-right:calc(1rem + .5rem);display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);position:sticky;top:0;z-index:60;flex-wrap:wrap;gap:.5rem}
    header h1{font-size:clamp(1.25rem,5vw,1.75rem);font-weight:600;white-space:nowrap;flex:1 1 auto;min-width:150px}
    .back-btn{color:#fff;text-decoration:none;background:var(--primary-dark);padding:.5rem .75rem;border-radius:var(--radius)}
    .toolbar{background:var(--bg);padding:.75rem 1rem;display:flex;gap:.75rem;align-items:center;border-bottom:1px solid #ddd;position:sticky;top:64px;z-index:55;justify-content:flex-end;flex-wrap:wrap}
    .toolbar-left{margin-right:auto;display:flex;gap:.5rem;align-items:center}
    .toolbar select,.toolbar input[type='number'],.toolbar .view-btn,.toolbar .btn{padding:.45rem .65rem;border-radius:var(--radius);border:1px solid #ccc;background:#fff;cursor:pointer;font-size:.9rem}
    .btn.primary{background:var(--primary);color:#fff;border-color:var(--primary-dark)}
    .view-btn.active{background:var(--primary);color:#fff;border-color:var(--primary-dark)}
    main{flex:1;display:flex;flex-direction:column;max-width:1200px;width:100%;margin:0 auto;overflow-x:hidden}
    .grid-wrapper{flex:1;overflow-y:auto;padding:1rem}
    .media-grid{display:grid;gap:1rem;justify-content:center;width:100%;box-sizing:border-box}
    .media-grid.small{grid-template-columns:repeat(auto-fill,minmax(90px,1fr))}
    .media-grid.medium{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
    .media-grid.large{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
    .media-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;display:flex;align-items:center;justify-content:center;transition:transform .25s ease;cursor:pointer;position:relative;width:100%;aspect-ratio:1/1;max-width:100%;box-sizing:border-box}
    .media-card:hover{transform:translateY(-3px)}
    .media-thumb{width:100%;height:100%;object-fit:cover;display:block;user-select:none;pointer-events:none}
    .play-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;opacity:.9;font-size:3rem;color:#fff;text-shadow:0 0 10px black;z-index:2;background:rgba(0,0,0,.28);border-radius:50%;padding:.3em .4em}
    .spinner{position:absolute;right:8px;top:8px;width:28px;height:28px;border-radius:999px;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.08);z-index:6}
    .spinner .dot{width:8px;height:8px;border-radius:50%;background:#cbd5e1;animation:spin 1s linear infinite}
    @keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);justify-content:center;align-items:center;z-index:1000}
    .modal-content{position:relative;border-radius:var(--radius);overflow:hidden;width:90vw;height:90vh;padding:1rem;background:#000;color:#fff;display:flex;flex-direction:column}
    #modalMedia{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden}
    #modalMedia img,#modalMedia video{width:100%;height:100%;object-fit:contain}
    .modal-info{flex:0 0 auto;padding:1rem 0 0;overflow-y:auto;max-height:25vh;color:#ddd;font-size:.95rem}
    .modal-close{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.5);color:#fff;border:none;font-size:1.5rem;padding:.2rem .5rem;border-radius:50%;cursor:pointer}
    .pager{display:flex;justify-content:center;align-items:center;padding:1rem;gap:1rem;flex-wrap:wrap}
    footer{padding:1rem;text-align:center;font-size:.9rem;color:#666}
    @media(max-width:600px){
      header{flex-direction:column}
      .back-btn{width:100%;text-align:center}
      .toolbar{top:112px;justify-content:center}
      .media-grid.small{grid-template-columns:repeat(3,1fr)}
      .media-grid.medium{grid-template-columns:repeat(2,1fr)}
      .media-grid.large{grid-template-columns:repeat(1,1fr)}
    }
  </style>
</head>
<body>
  <header>
    <h1>Gallery</h1>
    <a class="back-btn" href="/menu">← Back to Menu</a>
  </header>

  <div class="toolbar" role="toolbar" aria-label="Gallery toolbar">
    <div class="toolbar-left">
      <button id="uploadBtn" class="btn" title="Upload files">⬆ Upload</button>
    </div>

    <label>
      Sort:
      <select id="sortSelect" aria-label="Sort gallery">
        <option value="nameAsc">Name A→Z</option>
        <option value="nameDesc">Name Z→A</option>
        <option value="typeAsc">Type ↑</option>
        <option value="typeDesc">Type ↓</option>
        <option value="sizeAsc">Size ↑</option>
        <option value="sizeDesc">Size ↓</option>
      </select>
    </label>

    <label>
      Per page:
      <!-- default 20, max 100 -->
      <input id="pageSizeInput" type="number" min="1" max="100" value="20" aria-label="Items per page" style="width:4.5rem" />
    </label>

    <button class="view-btn" data-size="small" title="Small view" aria-label="Small view">🔳</button>
    <button class="view-btn" data-size="medium" title="Medium view" aria-label="Medium view">🔲</button>
    <button class="view-btn active" data-size="large" title="Large view" aria-label="Large view">⬜</button>
  </div>

  <main>
    <div class="grid-wrapper">
      <div id="grid" class="media-grid medium" aria-live="polite"></div>
    </div>

    <div class="pager">
      <button id="prevBtn">Prev</button>
      <span id="pageInfo"></span>
      <button id="nextBtn">Next</button>
    </div>
  </main>

  <div id="modal" class="modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal(event)">&times;</button>
      <div id="modalMedia"></div>
      <div id="modalInfo" class="modal-info"></div>
    </div>
  </div>

  <footer>© <span id="year"></span> Jcorp Nomad</footer>

  <input id="uploadInput" type="file" multiple style="display:none" />

<script>
/* ---------- CONFIG ---------- */
const THEME_KEY = 'nomad_dark_mode';
const ROOT = '/Gallery';
const INDEX_ENDPOINT = '/api/index';
const UPLOAD_ENDPOINT = '/upload';
const FALLBACK_INDEX_FILES = ['Gallery.index.ndjson','Gallery.nested.ndjson','index.ndjson','Gallery.index.ndjson.meta'];
const IMAGE_EXTS = ['.jpg','.jpeg','.png','.webp','.avif','.gif'];
const VIDEO_EXTS = ['.mp4','.webm','.ogg','.mov'];
const CACHE_NAME = 'nomad-gallery-thumbs-v1';
const WHITE_SVG = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='1' height='1'><rect width='100%' height='100%' fill='%23ffffff'/></svg>";

/* ---------- UI refs ---------- */
const grid = document.getElementById('grid');
const uploadBtn = document.getElementById('uploadBtn');
const uploadInput = document.getElementById('uploadInput');
const viewButtons = document.querySelectorAll('.view-btn');
const sortSelect = document.getElementById('sortSelect');
const pageSizeInput = document.getElementById('pageSizeInput');
const modal = document.getElementById('modal');
const modalMedia = document.getElementById('modalMedia');
const modalInfo = document.getElementById('modalInfo');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const pageInfo = document.getElementById('pageInfo');
document.getElementById('year').textContent = new Date().getFullYear();

/* ---------- THEME BOOT & SYNC ---------- */
function applyThemeFlag(dark){
  document.body.classList.toggle('dark', !!dark);
  // keep any toolbar search readable in light background
  const search = document.querySelector('.toolbar input[type="search"]');
  if(search){ search.style.background = '#fff'; search.style.color = '#000'; }
}
// apply on load
(function initThemeFromStorage(){
  try{ const saved = localStorage.getItem(THEME_KEY); applyThemeFlag(saved === 'true'); } catch(e){ applyThemeFlag(false); }
})();
// listen for theme changes in other tabs/pages (keeps pages in sync)
window.addEventListener('storage', (ev) => {
  if(ev.key === THEME_KEY){
    const dark = ev.newValue === 'true';
    applyThemeFlag(dark);
  }
});

/* ---------- STATE ---------- */
let items = [];
let filtered = [];
let currentSize = localStorage.getItem('nomadGallery.viewSize') || 'medium';

// clamp page size between 1 and 100, default 20
function clampPageSize(v){ const n = parseInt(v||0,10)||20; return Math.min(100, Math.max(1, n)); }
let pageSize = clampPageSize(localStorage.getItem('nomadGallery.pageSize') || pageSizeInput.value || 20);
let currentPage = 1;
let sortMode = localStorage.getItem('nomadGallery.sort') || sortSelect.value;

/* ---------- THUMBNAIL QUEUE & DEDUPE ---------- */
const thumbQueue = [];           // { item, imgEl, spinner }
const thumbPending = new Set();  // dedupe by path
let thumbWorkerRunning = false;

/* ---------- IntersectionObserver: only queue thumbs when card visible ---------- */
const observerOptions = { root: null, rootMargin: '400px 0px', threshold: 0.05 };
const cardObserver = new IntersectionObserver((entries) => {
  for(const e of entries){
    if(e.isIntersecting){
      const card = e.target;
      const jobData = card._thumbJob; // set in createCard for video cards
      if(jobData){
        enqueueThumbJob(jobData.item, jobData.imgEl, jobData.spinner);
        // after queued, stop observing
        cardObserver.unobserve(card);
      }
    }
  }
}, observerOptions);

/* ---------- Cache helpers ---------- */
function thumbCacheKey(item){
  const v = item.mt || item.sz || item.size || 0;
  return `${location.origin}/__thumbcache__/${encodeURIComponent(item.path)}?v=${encodeURIComponent(v)}`;
}
async function getCachedThumb(item){
  try{
    const cache = await caches.open(CACHE_NAME);
    const match = await cache.match(new Request(thumbCacheKey(item)));
    if(match){
      const blob = await match.blob();
      const url = URL.createObjectURL(blob);
      return { blob, url };
    }
  }catch(e){}
  return null;
}
async function storeThumbToCache(item, blob, mime='image/jpeg'){
  try{
    const cache = await caches.open(CACHE_NAME);
    const key = new Request(thumbCacheKey(item));
    const resp = new Response(blob, { headers: { 'Content-Type': mime }});
    await cache.put(key, resp);
    return true;
  }catch(e){
    return false;
  }
}

/* ---------- Queue processor (sequential) ---------- */
function enqueueThumbJob(item, imgEl, spinner){
  if(thumbPending.has(item.path)) return;
  thumbPending.add(item.path);
  thumbQueue.push({ item, imgEl, spinner });
  processThumbQueue().catch(()=>{/* ignore */});
}

async function processThumbQueue(){
  if(thumbWorkerRunning) return;
  thumbWorkerRunning = true;
  while(thumbQueue.length){
    const job = thumbQueue.shift();
    const { item, imgEl, spinner } = job;
    if(!document.body.contains(imgEl)){ thumbPending.delete(item.path); continue; }
    spinner.style.display = 'flex';

    try{
      // cached?
      const cached = await getCachedThumb(item);
      if(cached){
        setImageFromBlobUrl(imgEl, cached.url);
        spinner.style.display = 'none';
        thumbPending.delete(item.path);
        await new Promise(r => setTimeout(r, 60));
        continue;
      }

      // range-first strategy: try to fetch a partial chunk and extract a frame from ~3s into the video
      const videoUrl = mediaStreamUrlWithVersion(item.path, item);
      const dataUrl = await rangeFetchAndExtract(videoUrl, 3.0, 450000).catch(()=>null);

      if(dataUrl){
        const blob = dataURLToBlob(dataUrl);
        await storeThumbToCache(item, blob, 'image/jpeg');
        const blobUrl = URL.createObjectURL(blob);
        setImageFromBlobUrl(imgEl, blobUrl);
      } else {
        // fallback white placeholder
        imgEl.src = WHITE_SVG;
      }
    }catch(e){
      imgEl.src = WHITE_SVG;
    }finally{
      spinner.style.display = 'none';
      thumbPending.delete(item.path);
      await new Promise(r => setTimeout(r, 80));
    }
  }
  thumbWorkerRunning = false;
}

/* ---------- small helper to set <img> from blobURL safely ---------- */
function setImageFromBlobUrl(imgEl, blobUrl){
  const old = imgEl.dataset.objectUrl;
  if(old && old !== blobUrl){
    try{ URL.revokeObjectURL(old); }catch(e){}
  }
  imgEl.dataset.objectUrl = blobUrl;
  imgEl.src = blobUrl;
  imgEl.onerror = () => { imgEl.src = WHITE_SVG; };
}

/* ---------- range-first fetch + extraction ---------- */
async function rangeFetchAndExtract(videoUrl, seekTime = 3.0, rangeBytes = 450000){
  try{
    const headers = { 'Range': `bytes=0-${rangeBytes}` };
    const res = await fetch(videoUrl, { method: 'GET', headers, cache: 'no-store', credentials: 'same-origin' });
    if(!res.ok) return null;
    const blob = await res.blob();
    const blobUrl = URL.createObjectURL(blob);
    try{
      const dataUrl = await extractFrameFromVideo(blobUrl, seekTime, 3500);
      URL.revokeObjectURL(blobUrl);
      return dataUrl;
    }catch(err){
      URL.revokeObjectURL(blobUrl);
      return null;
    }
  }catch(e){
    return null;
  }
}

/* ---------- extract a frame from a video sourceUrl (blob or remote) ---------- */
function extractFrameFromVideo(sourceUrl, seekTime = 3.0, timeoutMs = 3000){
  return new Promise((resolve, reject) => {
    const video = document.createElement('video');
    let settled = false;
    function cleanup(){ if(settled) return; settled = true; try{ video.pause(); video.removeAttribute('src'); video.load(); }catch(e){} }

    video.crossOrigin = 'anonymous';
    video.preload = 'metadata';
    video.muted = true;
    video.playsInline = true;
    video.src = sourceUrl;

    const onLoaded = () => {
      const dur = isFinite(video.duration) && video.duration > 0 ? video.duration : seekTime;
      const seekTarget = dur < 1 ? Math.max(0.01, dur / 2) : Math.min(seekTime, Math.max(0.05, Math.min(dur - 0.05, seekTime)));
      let didSeek = false;
      const onSeeked = () => {
        if(didSeek) return;
        didSeek = true;
        try{
          const canvas = document.createElement('canvas');
          canvas.width = video.videoWidth || 320;
          canvas.height = video.videoHeight || 180;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          const data = canvas.toDataURL('image/jpeg', 0.85);
          cleanup();
          resolve(data);
        }catch(err){
          cleanup();
          reject(err);
        }
      };
      video.currentTime = seekTarget;
      video.addEventListener('seeked', onSeeked, { once: true });
      setTimeout(()=>{ if(!didSeek){ cleanup(); reject(new Error('seek timeout')); } }, timeoutMs);
    };

    const onError = () => { cleanup(); reject(new Error('video load error')); };

    video.addEventListener('loadedmetadata', onLoaded, { once: true });
    video.addEventListener('error', onError, { once: true });
  });
}

/* ---------- small helpers ---------- */
function dataURLToBlob(dataURL){
  const parts = dataURL.split(',');
  const meta = parts[0];
  const base64 = parts[1] || '';
  const mimeMatch = meta.match(/:(.*?);/);
  const mime = mimeMatch ? mimeMatch[1] : 'image/jpeg';
  const binary = atob(base64);
  const len = binary.length;
  const u8 = new Uint8Array(len);
  for(let i=0;i<len;i++) u8[i] = binary.charCodeAt(i);
  return new Blob([u8], { type: mime });
}

function normalizePath(p){ if(!p) return '/'; p = String(p).trim().replace(/\\/g,'/').replace(/\/+/g,'/'); if(!p.startsWith('/')) p='/' + p; if(p.length>1 && p.endsWith('/')) p=p.slice(0,-1); return p; }
function joinPaths(a,b){ if(!a) return normalizePath(b||''); if(!b) return normalizePath(a||''); return normalizePath(a + '/' + b); }
function encodePathSegments(path){ if(!path) return ''; let p=String(path).replace(/\\/g,'/').replace(/\/+/g,'/'); const leading=p.startsWith('/')? '/' : ''; return leading + p.split('/').filter(Boolean).map(s=>encodeURIComponent(s)).join('/'); }
function fileUrlDirect(path){ return encodePathSegments(path); }
function mediaStreamUrl(path){ return '/media?file=' + encodeURIComponent(path); }
function extFromName(name){ const i = name.lastIndexOf('.'); return i>=0? name.slice(i).toLowerCase() : ''; }
function basename(path){ if(!path) return ''; const idx = path.lastIndexOf('/'); return idx>=0? path.slice(idx+1):path; }
function isImageName(n){ return IMAGE_EXTS.includes(extFromName(n)); }
function isVideoName(n){ return VIDEO_EXTS.includes(extFromName(n)); }
function prettify(name){ if(!name) return ''; let n = name.replace(/\.[^/.]+$/,''); let t = n.replace(/[_\.]+/g,' ').trim(); t = t.replace(/\s*\(?\d{4}\)?\s*$/,'').trim(); return t || name; }
function formatBytes(bytes){ if(!bytes && bytes !== 0) return '0 B'; const k=1024,s=['B','KB','MB','GB','TB']; const i=Math.floor(Math.log(Math.max(bytes,1))/Math.log(k)); return parseFloat((bytes/Math.pow(k,i)).toFixed(1)) + ' ' + s[i]; }
function fileUrlWithVersion(path,item){ const ver = item && (item.mt||item.sz||item.size) ? (item.mt||item.sz||item.size) : Date.now(); const base = fileUrlDirect(path); return base + (base.includes('?') ? '&' : '?') + 'v=' + encodeURIComponent(ver); }
function mediaStreamUrlWithVersion(path,item){ const ver = item && (item.mt||item.sz||item.size) ? (item.mt||item.sz||item.size) : Date.now(); const base = mediaStreamUrl(path); return base + (base.includes('?') ? '&' : '?') + 'v=' + encodeURIComponent(ver); }
function escapeHtml(s){ if(!s) return ''; return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---------- NDJSON parsing & index fetch ---------- */
function parseNDJSONWithHeader(text){
  const lines = text.split('\n').filter(Boolean);
  if(lines.length === 0) return { header: null, entries: [] };
  let header = null;
  const entries = [];
  for(let i=0;i<lines.length;i++){
    const line = lines[i];
    try{
      const parsed = JSON.parse(line);
      if(i===0 && parsed && (parsed._type || parsed.count !== undefined || parsed.path)) { header = parsed; continue; }
      entries.push(parsed);
    }catch(e){
      const brace = line.indexOf('{');
      if(brace >= 0){
        try{ const parsed = JSON.parse(line.slice(brace)); entries.push(parsed); continue; }catch(e2){}
      }
    }
  }
  return { header, entries };
}

async function fetchRawNDJSONFile(urlPath){
  const url = urlPath + '?_=' + Date.now();
  const res = await fetch(url, { cache:'no-store', credentials:'same-origin' });
  if(!res.ok) throw new Error('fetch failed ' + res.status);
  const text = await res.text();
  return parseNDJSONWithHeader(text);
}

async function fetchIndexWithFallback(path){
  try{
    const apiUrl = `${INDEX_ENDPOINT}?path=${encodeURIComponent(normalizePath(path))}&_=${Date.now()}`;
    const res = await fetch(apiUrl, { cache:'no-store', credentials:'same-origin' });
    if(res.ok){
      const text = await res.text();
      const parsed = parseNDJSONWithHeader(text);
      if(parsed.header && parsed.header.count !== undefined && parsed.entries.length < parsed.header.count){
        // partial -> fallback
      } else if(parsed.entries.length > 0){
        return { source: 'api', header: parsed.header, entries: parsed.entries };
      }
    }
  }catch(e){}
  for(const fname of FALLBACK_INDEX_FILES){
    try{
      const pathAttempt = joinPaths(ROOT, fname);
      const parsed = await fetchRawNDJSONFile(pathAttempt);
      if(parsed.entries && parsed.entries.length > 0){
        return { source: pathAttempt, header: parsed.header, entries: parsed.entries };
      }
    }catch(e){}
  }
  return { source: null, header: null, entries: [] };
}

/* ---------- build gallery ---------- */
async function buildGallery(){
  const map = new Map();
  const resp = await fetchIndexWithFallback(ROOT);
  for(const e of resp.entries){
    const n = e.n || e.name || null;
    const p = e.p || e.path || null;
    let entryPath = null;
    if(p) entryPath = String(p);
    else if(n && String(n).includes('/')) entryPath = String(n);
    else if(n) entryPath = joinPaths(ROOT, n);
    if(entryPath && !entryPath.startsWith('/')) entryPath = joinPaths(ROOT, entryPath);
    if(!entryPath) continue;
    entryPath = normalizePath(entryPath);
    const b = basename(entryPath);
    if(isImageName(b) || isVideoName(b)){
      const type = isVideoName(b) ? 'video' : 'image';
      const item = { name: prettify(b), path: entryPath, type, size: e.sz || e.size || 0, mt: e.mt || 0 };
      map.set(entryPath, item);
    }
  }
  return Array.from(map.values()).sort((a,b)=> a.name.localeCompare(b.name));
}

/* ---------- create card (register observer for videos) ---------- */
function createCard(item){
  const isVideo = item.type === 'video';
  const card = document.createElement('div');
  card.className = 'media-card';
  card.title = item.name;
  card.tabIndex = 0;

  const thumb = document.createElement('img');
  thumb.className = 'media-thumb';
  thumb.alt = item.name;
  thumb.loading = 'lazy';
  thumb.onerror = () => { thumb.src = WHITE_SVG; };

  const spinner = document.createElement('div');
  spinner.className = 'spinner';
  const dot = document.createElement('div'); dot.className = 'dot'; spinner.appendChild(dot);
  spinner.style.display = 'none';

  card.appendChild(thumb);
  card.appendChild(spinner);

  if(isVideo){
    thumb.src = WHITE_SVG;
    const overlay = document.createElement('div');
    overlay.className = 'play-overlay';
    overlay.innerHTML = '▶';
    card.appendChild(overlay);

    // attach job metadata to card and observe it (thumbnail will only be queued when visible)
    card._thumbJob = { item, imgEl: thumb, spinner };
    cardObserver.observe(card);
  } else {
    // image: try cached first, otherwise fetch and store to cache, then set blobURL.
    (async ()=>{
      const cached = await getCachedThumb(item);
      if(cached){
        setImageFromBlobUrl(thumb, cached.url);
      } else {
        try{
          const r = await fetch(fileUrlWithVersion(item.path,item), { cache:'no-store', credentials:'same-origin' });
          if(r.ok){
            const b = await r.blob();
            // store to cache for future loads
            await storeThumbToCache(item, b, b.type || 'image/jpeg');
            const url = URL.createObjectURL(b);
            setImageFromBlobUrl(thumb, url);
          } else {
            // fallback to direct URL if fetch failed
            thumb.src = fileUrlWithVersion(item.path,item);
          }
        }catch(e){
          thumb.src = fileUrlWithVersion(item.path,item);
        }
      }
    })();
  }

  card.addEventListener('click', ()=> openModal(item));
  card.addEventListener('keypress', (e)=> { if(e.key === 'Enter') openModal(item); });

  return card;
}

/* ---------- render & pagination ---------- */
function renderPage(){
  // clamp page size between 1 and 100
  pageSize = clampPageSize(parseInt(pageSizeInput.value,10) || pageSize);
  localStorage.setItem('nomadGallery.pageSize', pageSize);
  const start = (currentPage - 1) * pageSize;
  const end = start + pageSize;
  const pageItems = filtered.slice(start, end);
  grid.innerHTML = '';
  if(pageItems.length === 0){
    grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:var(--primary-dark);">No items.</p>`;
    return;
  }
  for(const item of pageItems){
    const c = createCard(item);
    grid.appendChild(c);
  }
  const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
  pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;
  prevBtn.disabled = currentPage === 1;
  nextBtn.disabled = currentPage === totalPages;
}

function setViewSize(size){
  currentSize = size;
  viewButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.size === size));
  grid.className = 'media-grid ' + size;
  localStorage.setItem('nomadGallery.viewSize', size);
}
viewButtons.forEach(btn => btn.addEventListener('click', ()=> setViewSize(btn.dataset.size)));

function applySort(){
  sortMode = sortSelect.value;
  localStorage.setItem('nomadGallery.sort', sortMode);
  filtered = [...items];
  if(sortMode.startsWith('name')) filtered.sort((a,b)=> sortMode === 'nameDesc' ? b.name.localeCompare(a.name) : a.name.localeCompare(b.name));
  else if(sortMode.startsWith('type')) filtered.sort((a,b)=> sortMode === 'typeDesc' ? b.type.localeCompare(a.type) : a.type.localeCompare(b.type));
  else if(sortMode.startsWith('size')) filtered.sort((a,b)=> sortMode === 'sizeDesc' ? (b.size||0)-(a.size||0) : (a.size||0)-(b.size||0));
  currentPage = 1;
  renderPage();
}
function changePage(delta){
  currentPage += delta;
  const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
  if(currentPage<1) currentPage=1;
  if(currentPage>totalPages) currentPage=totalPages;
  renderPage();
}

/* ---------- modal (zoom/pan + playback) ---------- */
function openModal(item){
  modalMedia.innerHTML = '';
  modalInfo.innerHTML = '';
  let mediaEl;
  if(item.type === 'video'){
    mediaEl = document.createElement('video');
    mediaEl.src = mediaStreamUrlWithVersion(item.path,item);
    mediaEl.controls = true; mediaEl.preload = 'metadata'; mediaEl.autoplay = false; mediaEl.setAttribute('playsinline','');
    (async ()=>{ const cached = await getCachedThumb(item); if(cached) mediaEl.poster = cached.url; })();
    modalMedia.appendChild(mediaEl);
  } else {
    mediaEl = document.createElement('img');
    (async ()=>{ const cached = await getCachedThumb(item); if(cached) mediaEl.src = cached.url; else mediaEl.src = fileUrlWithVersion(item.path,item); })();
    mediaEl.alt = item.name;
    modalMedia.appendChild(mediaEl);
  }

  modalInfo.innerHTML = `<p><strong>Name:</strong> ${escapeHtml(item.name)}</p>
                         <p><strong>Type:</strong> ${escapeHtml(item.type)}</p>
                         <p><strong>Size:</strong> ${formatBytes(item.size)}</p>`;
  modal.style.display = 'flex';

  mediaEl.style.transformOrigin = 'center center';
  mediaEl.style.cursor = 'zoom-in';
  mediaEl.style.transition = 'none';
  mediaEl.setAttribute('draggable','false');

  let zoom=1, offsetX=0, offsetY=0, dragStartX=0, dragStartY=0, isDragging=false, dragMoved=false;
  function updateTransform(){ mediaEl.style.transform = `scale(${zoom}) translate(${offsetX}px, ${offsetY}px)`; mediaEl.style.cursor = zoom>1 ? (isDragging? 'grabbing' : 'grab') : 'zoom-in'; }

  mediaEl.addEventListener('wheel', (e)=>{ e.preventDefault(); const rect = mediaEl.getBoundingClientRect(); const mx=e.clientX-rect.left, my=e.clientY-rect.top; const oldZoom=zoom; zoom = Math.min(Math.max(1, zoom + Math.sign(e.deltaY)*-0.2),5); const factor = zoom/oldZoom; offsetX -= (mx/oldZoom)*(factor-1); offsetY -= (my/oldZoom)*(factor-1); updateTransform(); });
  mediaEl.addEventListener('click', (e)=>{ if(dragMoved){ dragMoved=false; return; } const rect=mediaEl.getBoundingClientRect(); const mx=e.clientX-rect.left, my=e.clientY-rect.top; if(zoom===1){ const zoomFactor=2, cx=rect.width/2, cy=rect.height/2; zoom=zoomFactor; offsetX=(cx-mx)/zoom; offsetY=(cy-my)/zoom; } else { zoom=1; offsetX=0; offsetY=0; } updateTransform(); });
  mediaEl.addEventListener('mousedown', (e)=>{ if(zoom===1) return; isDragging=true; dragMoved=false; dragStartX=e.clientX; dragStartY=e.clientY; mediaEl.style.cursor='grabbing'; });
  window.addEventListener('mousemove', onMouseMove); window.addEventListener('mouseup', onMouseUp);
  function onMouseMove(e){ if(!isDragging) return; const dx=(e.clientX-dragStartX)/zoom; const dy=(e.clientY-dragStartY)/zoom; if(Math.abs(dx)>3 || Math.abs(dy)>3) dragMoved=true; offsetX+=dx; offsetY+=dy; dragStartX=e.clientX; dragStartY=e.clientY; updateTransform(); }
  function onMouseUp(){ if(!isDragging) return; isDragging=false; mediaEl.style.cursor='grab'; setTimeout(()=>dragMoved=false,100); }
  modal._cleanup = ()=>{ window.removeEventListener('mousemove', onMouseMove); window.removeEventListener('mouseup', onMouseUp); const v = modalMedia.querySelector('video'); if(v){ v.pause(); try{ v.removeAttribute('src'); v.load(); }catch(e){} } };
}
function closeModal(evt){
  if(modal._cleanup && evt && evt.type === 'click' && evt.clientX === 0 && evt.clientY === 0) return;
  if(evt.target === modal || (evt.target && evt.target.classList && evt.target.classList.contains('modal-close'))){
    if(modal._cleanup){ modal._cleanup(); modal._cleanup = null; }
    modal.style.display = 'none';
  }
}

/* ---------- upload (sequential XHR; sends dir=/Gallery) ---------- */
uploadBtn.addEventListener('click', ()=> uploadInput.click());
uploadInput.addEventListener('change', (e)=>{
  const files = Array.from(e.target.files || []);
  if(files.length === 0) return;
  (async ()=>{
    uploadBtn.disabled = true;
    const originalText = uploadBtn.textContent;
    uploadBtn.textContent = 'Uploading…';
    try{
      for(let i=0;i<files.length;i++){
        await uploadSingleFileXHR(files[i], ROOT);
      }
      await refreshIndex();
      uploadBtn.textContent = 'Uploaded ✓';
      setTimeout(()=>{ uploadBtn.textContent = originalText; uploadBtn.disabled = false; }, 1000);
    }catch(err){
      console.error('upload error', err);
      uploadBtn.textContent = 'Upload Failed';
      setTimeout(()=>{ uploadBtn.textContent = originalText; uploadBtn.disabled = false; }, 1500);
    } finally { uploadInput.value = ''; }
  })();
});
function uploadSingleFileXHR(file, dir){
  return new Promise((resolve,reject)=>{
    const xhr = new XMLHttpRequest();
    xhr.open('POST', UPLOAD_ENDPOINT, true);
    xhr.withCredentials = true;
    const fd = new FormData();
    fd.append('dir', (dir.startsWith('/') ? dir : '/' + dir));
    fd.append('file', file, file.name);
    xhr.onload = function(){
      if(xhr.status >= 200 && xhr.status < 300){ resolve(); }
      else { reject(new Error('Upload failed: ' + xhr.status)); }
    };
    xhr.onerror = function(){ reject(new Error('Upload network error')); };
    xhr.send(fd);
  });
}

/* ---------- Hash helpers (open via #open=...) ---------- */
function getHashParam(){
  const h = (location.hash || '').replace(/^#/,'');
  if(!h) return { action:null, path:null };
  const [k, ...rest] = h.split('=');
  const v = rest.join('=');
  try { return { action: k || null, path: v ? decodeURIComponent(v) : null }; } catch(e){ return { action: k || null, path: v || null }; }
}

async function handleHashNavigation(hashObj){
  if(!hashObj || !hashObj.action) return;
  if(hashObj.action === 'open' && hashObj.path){
    const want = normalizePath(hashObj.path);
    if(items.length === 0) await refreshIndex(); // ensure we have items
    // try exact normalized match -> basename match -> endsWith
    let found = items.find(it => normalizePath(it.path) === want);
    if(!found) found = items.find(it => normalizePath('/' + basename(it.path)) === want);
    if(!found){
      const wantBase = want.split('/').pop();
      found = items.find(it => normalizePath(it.path).endsWith(wantBase));
    }
    if(found){
      // try to set currentPage so card is visible (if present in filtered)
      const idx = filtered.findIndex(it => normalizePath(it.path) === normalizePath(found.path));
      if(idx >= 0){
        currentPage = Math.floor(idx / pageSize) + 1;
        renderPage();
        // allow the rendered card to exist and then open modal (cards create thumbnails async)
        setTimeout(()=> openModal(found), 120);
      } else {
        // not in filtered => open it directly (modal) anyway
        openModal(found);
      }
    } else {
      console.warn('gallery item not found for hash', want);
    }
  }
}
window.addEventListener('hashchange', ()=> handleHashNavigation(getHashParam()));

/* ---------- index & boot ---------- */
async function refreshIndex(){
  items = await buildGallery();
  filtered = items.slice();
  applySort();
}

async function init(){
  try{
    // UI wiring
    setViewSize(currentSize);
    pageSizeInput.value = pageSize;
    sortSelect.value = sortMode;
    pageSizeInput.addEventListener('change', ()=> { pageSize = clampPageSize(pageSizeInput.value); localStorage.setItem('nomadGallery.pageSize', pageSize); currentPage=1; renderPage(); });
    sortSelect.addEventListener('change', ()=> applySort());
    prevBtn.addEventListener('click', ()=> changePage(-1));
    nextBtn.addEventListener('click', ()=> changePage(1));
    viewButtons.forEach(btn => btn.addEventListener('click', ()=> setViewSize(btn.dataset.size)));

    items = await buildGallery();
    filtered = items.slice();
    applySort();

    // handle initial hash if present (open requested item)
    await handleHashNavigation(getHashParam());
  }catch(e){ console.error('init error', e); }
}
document.addEventListener('keydown', (e)=> { if(e.key === 'Escape'){ if(modal.style.display === 'flex') closeModal({ target: modal }); } });
init();
</script>

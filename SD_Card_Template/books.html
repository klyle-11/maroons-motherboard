    <script>
(function() {
  try {
    const isDark = localStorage.getItem('nomad_dark_mode') === 'true';
    if (isDark) document.documentElement.classList.add('dark');

    const saved = localStorage.getItem('nomad_custom_theme');
    if (saved) {
      const colors = JSON.parse(saved);
      const style = document.createElement('style');
      style.id = 'custom-theme-style';
      style.textContent = `
        :root {
          --primary: ${colors.primary} !important;
          --primary-dark: ${colors.primaryDark} !important;
          --bg: ${colors.bgLight} !important;
          --card: ${colors.cardLight} !important;
          --card-bg: ${colors.cardLight} !important;
          --text: ${colors.textLight} !important;
          --muted: ${colors.mutedLight} !important;
        }
        body.dark {
          --bg: ${colors.bgDark} !important;
          --card: ${colors.cardDark} !important;
          --card-bg: ${colors.cardDark} !important;
          --text: ${colors.textDark} !important;
          --muted: ${colors.mutedDark} !important;
          --primary: ${colors.primaryDarkTheme} !important;
        }
      `;
      document.head.appendChild(style);
    }
  } catch(e) {}
})();
</script>

    <script>
        /* Theme */
        const THEME_KEY = 'nomad_dark_mode';
        function applyThemeFlag(dark) {
            if (dark) document.body.classList.add('dark');
            else document.body.classList.remove('dark');
        }
        (function () { try { applyThemeFlag(localStorage.getItem(THEME_KEY) === 'true'); } catch (e) { } })();
        window.addEventListener('storage', (ev) => { if (ev.key === THEME_KEY) applyThemeFlag(ev.newValue === 'true'); });

        /* Constants */
        const ROOT = '/Books';
        const INDEX_ENDPOINT = '/api/index';
        const BOOK_EXTS = ['.pdf', '.epub', '.mobi', '.azw3', '.cbz', '.cbr', '.cbt', '.cb7', '.djvu', '.txt'];
        const AUDIO_EXTS = ['.mp3', '.m4b', '.m4a', '.ogg', '.wav', '.aac', '.flac'];
        const IMAGE_EXTS = ['.jpg', '.jpeg', '.png', '.webp', '.avif', '.gif', '.bmp'];
        const COMIC_EXTS = ['.cbz', '.cbr'];

        /* Utils */
        function normalizePath(p) { if (!p) return '/'; p = String(p); if (!p.startsWith('/')) p = '/' + p; while (p.length > 1 && p.endsWith('/')) p = p.slice(0, -1); return p; }
        function ext(name) { const i = name.lastIndexOf('.'); return i >= 0 ? name.slice(i).toLowerCase() : ''; }
        function isBookName(n) { return BOOK_EXTS.includes(ext(n)); }
        function isAudioName(n) { return AUDIO_EXTS.includes(ext(n)); }
        function isImageName(n) { return IMAGE_EXTS.includes(ext(n)); }
        function isComicName(n) { return COMIC_EXTS.includes(ext(n)); }
        function escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>\"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '\"': '&quot;', '\'': '&#39;' }[c])); }
        function prettify(filename) {
            if (!filename) return '';
            let base = filename.replace(/\.[^/.]+$/, '');
            let title = base.replace(/[_\.]+/g, ' ').trim();
            title = title.replace(/\s*($$\d{4}$$|\d{4})\s*$/, '').trim();
            return title || filename;
        }
        function fileUrlDirect(path) { if (!path) return ''; return `/media?file=${encodeURIComponent(normalizePath(path))}`; }
        function formatBytes(bytes) {
            if (!bytes && bytes !== 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(Math.max(bytes, 1)) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }
        function formatTime(seconds) {
            if (!isFinite(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return mins + ':' + secs.toString().padStart(2, '0');
        }

        /* Resume store */
        const RESUME_KEY = 'nomad_resume_store_v1';
        function readResume() { try { return JSON.parse(localStorage.getItem(RESUME_KEY) || '{}'); } catch (e) { return {}; } }
        function writeResume(obj) { try { localStorage.setItem(RESUME_KEY, JSON.stringify(obj)); } catch (e) { } }
        function fileKey(path, sz, mt) { return `${normalizePath(path)}|${sz || 0}|${mt || 0}`; }
        function findResume(movie) {
            const store = readResume();
            const norm = normalizePath(movie.path);
            const exact = fileKey(movie.path, movie.sz || 0, movie.mt || 0);
            if (store[exact]) return { key: exact, entry: store[exact] };
            for (const k of Object.keys(store)) { const p = (k.split('|')[0] || ''); if (normalizePath(p) === norm) return { key: k, entry: store[k] }; }
            for (const k of Object.keys(store)) { const p = (k.split('|')[0] || '').replace(/^\//, ''); if (p === norm.replace(/^\//, '')) return { key: k, entry: store[k] }; }
            const base = norm.split('/').pop().toLowerCase();
            for (const k of Object.keys(store)) { const p = (k.split('|')[0] || '').toLowerCase(); if (p.split('/').pop() === base) return { key: k, entry: store[k] }; }
            return null;
        }
        function clearResumeFor(path) {
            const store = readResume();
            const norm = normalizePath(path);
            let changed = false;
            for (const k of Object.keys(store)) {
                const p = (k.split('|')[0] || '');
                if (normalizePath(p) === norm || p.replace(/^\//, '') === norm.replace(/^\//, '')) {
                    delete store[k]; changed = true;
                }
            }
            if (changed) writeResume(store);
        }
        function updateResumeBadge(movie, positionOrPercent) {
            if (!movie || !movie.path) return;
            const cards = Array.from(gridEl.querySelectorAll('.media-card'));
            for (const card of cards) {
                if (card.dataset.path === movie.path) {
                    const badge = card.querySelector('.badge-resume');
                    const wrapper = card.querySelector('.thumb-wrapper');
                    const show = positionOrPercent && positionOrPercent > 1;
                    if (show) {
                        const text = typeof positionOrPercent === 'number' && positionOrPercent <= 100
                            ? `Resume ${Math.round(positionOrPercent)}%`
                            : `Resume ${formatTime(positionOrPercent)}`;
                        if (badge) { badge.textContent = text; }
                        else if (wrapper) {
                            const div = document.createElement('div');
                            div.className = 'badge-resume';
                            div.textContent = text;
                            wrapper.appendChild(div);
                        }
                    } else {
                        if (badge) badge.remove();
                    }
                    break;
                }
            }
        }

        /* DOM refs */
        const gridEl = document.getElementById('grid');
        const searchInput = document.getElementById('searchInput');
        const sortSelect = document.getElementById('sortSelect');
        const viewButtons = document.querySelectorAll('.view-btn');
        const listModal = document.getElementById('listModal');
        const listModalTitle = document.getElementById('listModalTitle');
        const listContainer = document.getElementById('listContainer');
        const listCloseBtn = document.getElementById('listCloseBtn');
        const actionModal = document.getElementById('actionModal');
        const actionTitle = document.getElementById('actionTitle');
        const viewButton = document.getElementById('viewButton');
        const downloadButton = document.getElementById('downloadButton');
        const actionCancelBtn = document.getElementById('actionCancelBtn');

        /* Audio refs */
        const audioPlayer = document.getElementById('audioPlayer');
        const audioTitle = document.getElementById('audioTitle');
        const audioElement = document.getElementById('audioElement');
        const playPauseBtn = document.getElementById('playPause');
        const speedBtn = document.getElementById('speedBtn');
        const audioProgressBar = document.getElementById('audioProgressBar');
        const audioProgressFill = document.getElementById('audioProgressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');

        /* EPUB refs */
        const readerContainer = document.getElementById('readerContainer');
        const readerTitle = document.getElementById('readerTitle');
        const epubViewer = document.getElementById('epub-viewer');
        const progressInfo = document.getElementById('progressInfo');
        const tocBtn = document.getElementById('tocBtn');
        const closeReaderBtn = document.getElementById('closeReader');
        const fontUpBtn = document.getElementById('fontSizeUp');
        const fontDownBtn = document.getElementById('fontSizeDown');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const tocPanel = document.getElementById('tocPanel');
        const tocContent = document.getElementById('tocContent');
        const closeToc = document.getElementById('closeToc');
        const viewModeBtn = document.getElementById('viewModeBtn');

        /* CBZ Comic refs */
        const comicReaderContainer = document.getElementById('comicReaderContainer');
        const comicReaderTitle = document.getElementById('comicReaderTitle');
        const comicViewer = document.getElementById('comic-viewer');
        const comicPageContainer = document.getElementById('comicPageContainer');
        const comicPageWrapper = document.getElementById('comicPageWrapper');
        const comicProgressInfo = document.getElementById('comicProgressInfo');
        const comicPrevBtn = document.getElementById('comicPrevBtn');
        const comicNextBtn = document.getElementById('comicNextBtn');
        const comicSettingsBtn = document.getElementById('comicSettingsBtn');
        const comicSettingsPanel = document.getElementById('comicSettingsPanel');
        const closeComicSettings = document.getElementById('closeComicSettings');
        const closeComicReader = document.getElementById('closeComicReader');
        const comicReadingModeBtn = document.getElementById('comicReadingModeBtn');

        /* State */
        let library = [];
        let filtered = [];
        let currentSize = localStorage.getItem('nomadBooksSize') || 'medium';
        let currentItem = null;
        let currentBook = null;
        let rendition = null;
        let epubFontSize = parseInt(localStorage.getItem('nomad_epub_font_pct') || '110', 10);
        let epubFlow = localStorage.getItem('nomad_epub_flow') || 'paginated';
        const ANIM_KEY = 'nomadBooksAnimated_v1';

        /* CBZ Comic State */
        let comicPages = [];
        let currentComicPage = 0;
        let comicReadingMode = localStorage.getItem('nomad_comic_mode') || 'standard';
        let comicPageFit = localStorage.getItem('nomad_comic_fit') || 'contain';
        let comicBackground = localStorage.getItem('nomad_comic_bg') || 'black';
        let currentComicFile = null;

        /* Audio bottom padding management */
        function updateAudioHeight() {
            const player = document.getElementById('audioPlayer');
            const height = (player && player.classList.contains('active')) ? player.offsetHeight : 0;
            document.documentElement.style.setProperty('--audio-height', height + 'px');
        }
        window.addEventListener('resize', updateAudioHeight);

        /* Index fetch (NDJSON) */
        async function fetchIndex(path) {
            const url = `${INDEX_ENDPOINT}?path=${encodeURIComponent(normalizePath(path))}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error('index fetch failed ' + res.status);
            const text = await res.text();
            const lines = text.split('\n').filter(Boolean);
            const header = lines.length ? (() => { try { return JSON.parse(lines[0]); } catch (e) { console.warn('index header parse failed', lines[0]); return null; } })() : null;
            const entries = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i];
                try { entries.push(JSON.parse(line)); }
                catch (err) {
                    const brace = line.indexOf('{');
                    if (brace >= 0) { try { entries.push(JSON.parse(line.slice(brace))); continue; } catch (e2) { } }
                    console.warn('index line parse failed', line);
                }
            }
            return { header, entries };
        }

        /* Build top-level library */
        async function buildLibrary() {
            const out = [];
            const rootResp = await fetchIndex(ROOT);

            const rootImages = new Map();
            for (const e of rootResp.entries) {
                if (e.n && e.n.includes('/')) continue;
                if (e.t === 'f' && isImageName(e.n)) {
                    rootImages.set(e.n.replace(/\.[^/.]+$/, '').toLowerCase(), normalizePath((ROOT === '/' ? '' : ROOT) + '/' + e.n));
                }
            }

            for (const e of rootResp.entries) {
                if (e.n && e.n.includes('/')) continue;
                
                if (e.t === 'd') {
                    const seriesName = e.n;
                    const dir = normalizePath((ROOT === '/' ? '' : ROOT) + '/' + seriesName);
                    let cover = null;
                    const variants = [
                        seriesName.toLowerCase(),
                        seriesName.toLowerCase().replace(/\s+/g, '-'),
                        seriesName.toLowerCase().replace(/\s+/g, '_')
                    ];
                    for (const v of variants) { if (rootImages.has(v)) { cover = rootImages.get(v); break; } }
                    if (!cover) ['poster', 'cover', 'folder', 'art'].forEach(k => { if (!cover && rootImages.has(k)) cover = rootImages.get(k); });
                    
                    const isComic = e.comic === true;
                    out.push({ name: seriesName.replace(/[_\.]+/g, ' ').trim(), dir, cover, type: 'dir', isComic });

                } else if (e.t === 'f') {
                    if (isBookName(e.n) || isAudioName(e.n) || isComicName(e.n)) {
                        const p = normalizePath((ROOT === '/' ? '' : ROOT) + '/' + e.n);
                        const base = e.n.replace(/\.[^/.]+$/, '').toLowerCase();
                        const cover = rootImages.has(base) ? rootImages.get(base) : null;
                        out.push({ name: prettify(e.n), dir: null, cover, type: 'file', fileEntry: { name: e.n, path: p, sz: e.sz || 0, mt: e.mt || 0 } });
                    }
                }
            }

            out.sort((a, b) => a.name.localeCompare(b.name));
            return out;
        }
        async function loadDirContents(dir) {
            try {
                const resp = await fetchIndex(dir);
                const files = [];
                const images = new Map();
                
                const normalizedDir = normalizePath(dir);
                
                for (const e of resp.entries) {
                    if (!e.p || !e.n) continue;
                    
                    const entryPath = normalizePath(e.p);
                    
                    if (entryPath === normalizedDir) continue;
                    
                    if (!entryPath.startsWith(normalizedDir + '/')) continue;
                    
                    const relativePath = entryPath.substring(normalizedDir.length + 1);
                    if (relativePath.includes('/')) continue;
                    
                    if (e.t === 'f' && isImageName(e.n)) {
                        const base = e.n.replace(/\.[^/.]+$/, '').toLowerCase();
                        images.set(base, entryPath);
                    }
                }
                
                for (const e of resp.entries) {
                    if (!e.p || !e.n) continue;
                    
                    const entryPath = normalizePath(e.p);
                    
                    if (entryPath === normalizedDir) continue;
                    
                    if (!entryPath.startsWith(normalizedDir + '/')) continue;
                    
                    const relativePath = entryPath.substring(normalizedDir.length + 1);
                    if (relativePath.includes('/')) continue;
                    
                    if (e.t === 'f' && (isBookName(e.n) || isAudioName(e.n) || isComicName(e.n))) {
                        const base = e.n.replace(/\.[^/.]+$/, '').toLowerCase();
                        const cover = images.has(base) ? images.get(base) : null;
                        files.push({ name: prettify(e.n), path: entryPath, sz: e.sz || 0, mt: e.mt || 0, cover });
                    } else if (e.t === 'd') {
                        const isComic = e.comic === true;
                        const base = e.n.toLowerCase();
                        const cover = images.has(base) ? images.get(base) : null;
                        files.push({ name: e.n, path: entryPath, isDir: true, isComic, cover });
                    }
                }
                files.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
                return { header: resp.header, files };
            } catch (err) {
                console.warn('loadDirContents failed', dir, err);
                return { header: null, files: [] };
            }
        }
        /* View controls */
        function setViewSize(size) {
            currentSize = size;
            viewButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.size === size));
            gridEl.className = `media-grid ${size}`;
            localStorage.setItem('nomadBooksSize', size);
        }
        setViewSize(currentSize);
        viewButtons.forEach(btn => btn.addEventListener('click', () => setViewSize(btn.dataset.size)));

        /* Render grid */
        function renderGrid() {
            if (filtered.length === 0) {
                gridEl.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--primary-dark);padding:12px">No books found.</p>';
                return;
            }

            const withImages = filtered.filter(item => item.cover);
            const noImages = filtered.filter(item => !item.cover);

            const useMixedMode = withImages.length > 0 && noImages.length > 0;

            if (useMixedMode) {
                gridEl.className = `media-grid ${currentSize}`;
            } else {
                gridEl.className = `media-grid ${currentSize}`;
            }

            const shouldAnimate = !localStorage.getItem(ANIM_KEY);
            let animIdx = 0;

            const frag = document.createDocumentFragment();

            if (withImages.length > 0 || !useMixedMode) {
                const itemsToRender = useMixedMode ? withImages : filtered;
                itemsToRender.forEach((item) => {
                    const card = document.createElement('div');
                    card.className = 'media-card';
                    if (item.type === 'dir') {
                        card.classList.add('is-directory');
                    }
                    card.setAttribute('role', 'listitem');
                    card.setAttribute('aria-label', item.name || '');
                    const pathVal = item.type === 'file' ? (item.fileEntry?.path || '') : (item.dir || '');
                    card.dataset.path = pathVal;

                    const coverPath = item.cover || '';
                    const imgHTML = coverPath ? `<img class="media-thumb" loading="lazy" src="${coverPath}" alt="${escapeHtml(item.name)}">` : '';

                    const showFolderIcon = item.type === 'dir' && !item.isComic;
                    const folderIconHTML = showFolderIcon ? '<span class="folder-icon">📁</span>' : '';

                    card.innerHTML = `
                    <div class="thumb-wrapper" aria-hidden="false">
                        <span class="fallback-text">${escapeHtml(item.name)}</span>
                        ${imgHTML}
                        ${folderIconHTML}
                    </div>
                    `;

                    const img = card.querySelector('img');
                    const fallback = card.querySelector('.fallback-text');
                    if (img && coverPath) {
                        img.addEventListener('load', () => { img.style.opacity = '1'; if (fallback) fallback.style.display = 'none'; });
                        img.addEventListener('error', () => { img.style.display = 'none'; if (fallback) fallback.style.display = 'block'; });
                        img.src = coverPath;
                    } else {
                        if (fallback) fallback.style.display = 'block';
                    }

                    card.addEventListener('click', async () => {
                        if (item.type === 'dir') {
                            if (item.isComic) {
                                window.location.href = `/comics.html?path=${encodeURIComponent(item.dir)}`;

        /* Action modal */
        function downloadFile(path, filename) {
            const a = document.createElement('a');
            a.href = path.startsWith('/') ? path : ('/' + path);

            document.body.appendChild(a);

            document.body.removeChild(a);

        /* Natural sort comparator for filenames */
        function naturalSortName(a, b) {
            const ax = String(a).split(/(\d+)/).map(s => (/\d+/.test(s) ? Number(s) : s.toLowerCase()));
            const bx = String(b).split(/(\d+)/).map(s => (/\d+/.test(s) ? Number(s) : s.toLowerCase()));
            for (let i = 0; i < Math.max(ax.length, bx.length); i++) {
                if (ax[i] === undefined) return -1;
                if (bx[i] === undefined) return 1;
                if (ax[i] === bx[i]) continue;
                return ax[i] < bx[i] ? -1 : 1;
            }
            return 0;
        }

        /* CBZ Comic Reader, Using Unzipit  */
        // Helper: simple is-image test (single definition)
        function isImageFile(name) {
            return /\.(jpe?g|png|gif|webp|bmp)$/i.test(name);
        }

        // Helper: check if server supports Range requests (tries a small Range GET)
        async function checkRangeSupport(url) {
            try {
                const r = await fetch(url, { method: 'GET', headers: { Range: 'bytes=0-0' } });
                const accept = (r.headers.get('accept-ranges') || '').toLowerCase();
                const contentRange = r.headers.get('content-range');
                // 206 Partial Content is the canonical sign of range support
                const supports = r.status === 206 || accept.includes('bytes') || !!contentRange;
                console.debug('checkRangeSupport', { status: r.status, accept, contentRange, supports });
                return supports;
            } catch (e) {
                console.warn('checkRangeSupport failed', e);
                return false;
            }
        }

        // Helper: promise timeout wrapper
        function withTimeout(promise, ms) {
            return Promise.race([
                promise,
                new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ms))
            ]);
        }

        async function openComicReader(file) {
            console.info('openComicReader start', file);
            if (!file || !file.path) {
                console.warn('openComicReader: invalid file', file);
                return;
            }

            // Show reader container immediately with loading indicator
            comicReaderTitle.textContent = file.name || 'Comic Book';
            comicReaderContainer.classList.add('active');
            comicPageContainer.innerHTML = '<p style="padding:20px;text-align:center;color:var(--muted)">Loading comic…</p>';
            comicPageWrapper.innerHTML = '';
            comicPages.forEach(p => p.url && URL.revokeObjectURL(p.url));
            comicPages = [];
            currentComicPage = 0;
            currentComicFile = file;

            const url = fileUrlDirect(file.path);

            try {
                // 1) Test server for range support
                const hasRange = await checkRangeSupport(url);

                if (hasRange) {
                    // Try unzipit (range-enabled) but with a timeout in case it stalls
                    comicPageContainer.innerHTML = '<p style="padding:20px;text-align:center;color:var(--muted)">Loading comic (range mode)…</p>';
                    try {
                        // Give unzipit 15s to make progress, otherwise fallback
                        const res = await withTimeout(unzipit.unzip(url), 15000);
                        const entries = res.entries || {};
                        const imageEntries = Object.entries(entries)
                            .filter(([name, entry]) => !entry.isDirectory && isImageFile(name))
                            .sort(([a], [b]) => naturalSortName(a, b));

                        if (imageEntries.length === 0) {
                            comicPageContainer.innerHTML = '<p style="padding:20px;text-align:center;color:var(--muted)">No images found in archive.</p>';
                            return;
                        }

                        // Extract images progressively (each entry.blob() will use range requests)
                        for (const [filename, entry] of imageEntries) {
                            try {
                                const blob = await entry.blob();
                                appendComicImageBlob(blob, filename);
                                // yield to UI so images appear progressively
                                await new Promise(r => setTimeout(r, 0));
                            } catch (ie) {
                                console.warn('Failed to extract image (unzipit)', filename, ie);
                            }
                        }

                        applyComicSettings();
                        console.info('openComicReader: loaded via unzipit (range)');
                        return; // success
                    } catch (e) {
                        console.warn('unzipit ranged load failed or timed out, falling back:', e);
                        // fall through to fallback below
                    }
                } else {
                    console.info('Server does not appear to support Range requests, will fetch full file as fallback.');
                }

                // Fallback: fetch entire file & extract with JSZip (Currently allways falls back to this since 206 isnt working in the backend)
                comicPageContainer.innerHTML = '<p style="padding:20px;text-align:center;color:var(--muted)">Loading comic (full download)…</p>';
                const resp = await fetch(url);
                if (!resp.ok) throw new Error('fetch failed: ' + resp.status);
                const arrayBuffer = await resp.arrayBuffer();

                // Use JSZip to load archive from ArrayBuffer
                if (typeof JSZip === 'undefined') throw new Error('JSZip not available for fallback extraction');
                const zip = await JSZip.loadAsync(arrayBuffer);

                // Collect image-file keys, natural-sort them
                const imageNames = Object.keys(zip.files)
                    .filter(name => !zip.files[name].dir && isImageFile(name))
                    .sort((a, b) => naturalSortName(a, b));

                if (imageNames.length === 0) {
                    comicPageContainer.innerHTML = '<p style="padding:20px;text-align:center;color:var(--muted)">No images found in archive.</p>';
                    return;
                }

                // Extract images one-by-one (async) and append to UI
                for (const name of imageNames) {
                    try {
                        const fileObj = zip.files[name];
                        const blob = await fileObj.async('blob');
                        appendComicImageBlob(blob, name);
                        // yield to UI
                        await new Promise(r => setTimeout(r, 0));
                    } catch (ie) {
                        console.warn('Failed to extract image (JSZip fallback)', name, ie);
                    }
                }

                applyComicSettings();
                console.info('openComicReader: loaded via JSZip fallback (full download)');
            } catch (err) {
                console.error('openComicReader caught error', err);
                comicPageContainer.innerHTML = '<p style="padding:20px;text-align:center;color:red">Failed to load comic.</p>';
                // keep reader visible so user can close or retry
            }
        }
        // is-image test
        function isImageFile(name) {
            return /\.(jpe?g|png|gif|webp|bmp)$/i.test(name);
        }
        // is-image test
        function isImageFile(name) {
            return /\.(jpe?g|png|gif|webp|bmp)$/i.test(name);
        }

        // Append blob -> UI 
        function appendComicImageBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const page = { url, filename };
            comicPages.push(page);
            console.debug('appendComicImage:', filename, 'pages=', comicPages.length);

            if (comicReadingMode === 'scroll') {
                let sc = comicPageContainer.querySelector('.comic-scroll-container');
                if (!sc) {
                    sc = document.createElement('div');
                    sc.className = 'comic-scroll-container';
                    comicPageContainer.innerHTML = '';
                    comicPageContainer.appendChild(sc);
                }
                const img = document.createElement('img');
                img.src = url;
                img.alt = filename || `Page ${comicPages.length}`;
                img.loading = 'lazy';
                img.style.display = 'block';
                img.style.width = '100%';
                img.style.margin = '0';
                sc.appendChild(img);
            } else {
                if (comicPages.length === 1) displayComicPage();
            }
            updateComicProgress && updateComicProgress();
        }
        function displayComicPage() {
            if (comicReadingMode === 'scroll') {
                displayComicScroll();
                return;
            }

            comicPageWrapper.innerHTML = '';

            if (comicReadingMode === 'twopage') {
                const img1 = document.createElement('img');
                img1.className = 'comic-page';
                img1.src = comicPages[currentComicPage].url;
                img1.alt = `Page ${currentComicPage + 1}`;
                comicPageWrapper.appendChild(img1);

                if (currentComicPage + 1 < comicPages.length) {
                    const img2 = document.createElement('img');
                    img2.className = 'comic-page';
                    img2.src = comicPages[currentComicPage + 1].url;
                    img2.alt = `Page ${currentComicPage + 2}`;
                    comicPageWrapper.appendChild(img2);
                }
            } else {
                const img = document.createElement('img');
                img.className = 'comic-page';
                img.src = comicPages[currentComicPage].url;
                img.alt = `Page ${currentComicPage + 1}`;
                comicPageWrapper.appendChild(img);
            }

            updateComicProgress();
            saveComicProgress();
        }

        function displayComicScroll() {
            comicPageContainer.innerHTML = '';
            const scrollContainer = document.createElement('div');
            scrollContainer.className = 'comic-scroll-container';

            comicPages.forEach((page, idx) => {
                const img = document.createElement('img');

        function updateComicProgress() {
            if (comicReadingMode === 'scroll') {
                comicProgressInfo.textContent = `All Pages (${comicPages.length})`;
            } else if (comicReadingMode === 'twopage') {
                const endPage = Math.min(currentComicPage + 2, comicPages.length);
                comicProgressInfo.textContent = `Pages ${currentComicPage + 1}-${endPage} / ${comicPages.length}`;
            } else {
                comicProgressInfo.textContent = `Page ${currentComicPage + 1} / ${comicPages.length}`;
            }

            comicPrevBtn.disabled = currentComicPage === 0;
            comicNextBtn.disabled = comicReadingMode === 'twopage'
                ? currentComicPage >= comicPages.length - 2
                : currentComicPage >= comicPages.length - 1;
        }

        function saveComicProgress() {
            if (!currentComicFile) return;
            const store = readResume();
            const key = fileKey(currentComicFile.path, currentComicFile.sz, currentComicFile.mt);
            const percent = Math.round((currentComicPage / comicPages.length) * 100);
            store[key] = { page: currentComicPage, percent, time: Date.now() };
            writeResume(store);
            updateResumeBadge(currentComicFile, percent);
        }

        /* applyComicSettings: operate on real DOM and global state; safe to call without args */
        function applyComicSettings(settings) {
            // Merge provided settings with current globals if passed
            if (settings) {
                if (settings.viewMode) comicReadingMode = settings.viewMode;
                if (settings.pageFit) comicPageFit = settings.pageFit;
                if (settings.background) comicBackground = settings.background;
            }

            // Targets 
            const container = document.getElementById('comicPageContainer'); // outer container
            const wrapper = document.getElementById('comicPageWrapper');     // inner wrapper for paged modes

            if (!container || !wrapper) {
                console.debug('applyComicSettings: missing container/wrapper');
                return;
            }

            // Clear layout classes
            container.classList.remove('fit-width', 'fit-height', 'original');
            wrapper.classList.remove('manga', 'two-page', 'single');

            // Reading mode handling
            if (comicReadingMode === 'manga') {
                wrapper.classList.add('manga');
            } else if (comicReadingMode === 'twopage') {
                wrapper.classList.add('two-page');
            } else if (comicReadingMode === 'scroll') {

            } else {
                wrapper.classList.add('single');
            }

            // Page fit
            if (comicPageFit === 'width') container.classList.add('fit-width');
            else if (comicPageFit === 'height') container.classList.add('fit-height');
            else if (comicPageFit === 'original') container.classList.add('original');

            // Background
            if (comicBackground === 'black') {
                container.style.background = '#000';
                wrapper.style.background = '#000';
            } else if (comicBackground === 'white') {
                container.style.background = '#fff';
                wrapper.style.background = '#fff';
            } else if (comicBackground === 'gray') {
                container.style.background = '#888';
                wrapper.style.background = '#888';
            }

            // Update existing images sizing for two-page mode
            const imgs = container.querySelectorAll('img.comic-page');
            imgs.forEach(img => {
                if (comicReadingMode === 'twopage') {
                    img.style.width = '50%';
                    img.style.display = 'inline-block';
                } else {
                    img.style.width = '';
                    img.style.display = 'block';
                }
            });

            // If switching to scroll mode, rebuild scroll view if pages exist
            if (comicReadingMode === 'scroll' && comicPages.length > 0) {
                displayComicScroll();
            } else if (comicReadingMode !== 'scroll' && comicPages.length > 0) {
                displayComicPage();
            }
        }

            if (comicReadingMode === 'twopage') {
                currentComicPage = Math.max(0, currentComicPage - 2);
            } else if (comicReadingMode === 'manga') {
                currentComicPage = Math.min(comicPages.length - 1, currentComicPage + 1);
            } else {
                currentComicPage = Math.max(0, currentComicPage - 1);
            }
            displayComicPage();
        });

        comicNextBtn.addEventListener('click', () => {
            if (comicReadingMode === 'scroll') return;

            if (comicReadingMode === 'twopage') {
                currentComicPage = Math.min(comicPages.length - 1, currentComicPage + 2);
            } else if (comicReadingMode === 'manga') {
                currentComicPage = Math.max(0, currentComicPage - 1);
            } else {
                currentComicPage = Math.min(comicPages.length - 1, currentComicPage + 1);
            }
            displayComicPage();
        });

        // Keyboard navigation for comics
        document.addEventListener('keydown', (e) => {
            if (!comicReaderContainer.classList.contains('active')) return;
            if (comicReadingMode === 'scroll') return;

            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                if (comicReadingMode === 'manga') comicNextBtn.click();
                else comicPrevBtn.click();
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                if (comicReadingMode === 'manga') comicPrevBtn.click();
                else comicNextBtn.click();
            }
        });

        comicSettingsBtn.addEventListener('click', () => {
            comicSettingsPanel.classList.toggle('open');
        });

        closeComicSettings.addEventListener('click', () => {
            comicSettingsPanel.classList.remove('open');
        });

        closeComicReader.addEventListener('click', () => {
            comicReaderContainer.classList.remove('active');
            comicPages.forEach(page => URL.revokeObjectURL(page.url));
            comicPages = [];
            currentComicFile = null;
            comicPageWrapper.innerHTML = '';
        });

        document.querySelectorAll('input[name="readingMode"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                comicReadingMode = e.target.value;
                localStorage.setItem('nomad_comic_mode', comicReadingMode);

                if (comicReadingMode === 'scroll') {
                    displayComicScroll();
                } else {
                    displayComicPage();
                }
                applyComicSettings();
            });
            if (radio.value === comicReadingMode) radio.checked = true;
        });

        // Comic settings panel listeners
        document.querySelectorAll('input[name="readingMode"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                comicReadingMode = e.target.value;
                localStorage.setItem('nomad_comic_mode', comicReadingMode);

                // Reset to first page when switching to/from scroll mode
                if (comicReadingMode === 'scroll' || e.target.value === 'scroll') {
                    currentComicPage = 0;
                }

                applyComicSettings();
                displayComicPage();
            });
            if (radio.value === comicReadingMode) radio.checked = true;
        });

        document.querySelectorAll('input[name="pageFit"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                comicPageFit = e.target.value;
                localStorage.setItem('nomad_comic_fit', comicPageFit);
                applyComicSettings();
                displayComicPage();
            });
            if (radio.value === comicPageFit) radio.checked = true;
        });

        document.querySelectorAll('input[name="readingMode"]').forEach(radio => {
            // Remove any existing listeners to prevent duplicates
            const newRadio = radio.cloneNode(true);
            radio.parentNode.replaceChild(newRadio, radio);

            newRadio.addEventListener('change', (e) => {
                comicReadingMode = e.target.value;
                localStorage.setItem('nomad_comic_mode', comicReadingMode);

                // Reset index when switching modes
                currentComicPage = 0;

                applyComicSettings();
                // Re-render immediately according to new mode
                if (comicReadingMode === 'scroll') {
                    displayComicScroll();
                } else {
                    displayComicPage();
                }
            });

            if (newRadio.value === comicReadingMode) newRadio.checked = true;
        });

        document.querySelectorAll('input[name="pageFit"]').forEach(radio => {
            // Remove any existing listeners to prevent duplicates
            const newRadio = radio.cloneNode(true);
            radio.parentNode.replaceChild(newRadio, radio);

            newRadio.addEventListener('change', (e) => {
                comicPageFit = e.target.value;
                localStorage.setItem('nomad_comic_fit', comicPageFit);
                applyComicSettings();
            });

            if (newRadio.value === comicPageFit) newRadio.checked = true;
        });

        document.querySelectorAll('input[name="background"]').forEach(radio => {
            // Remove any existing listeners to prevent duplicates
            const newRadio = radio.cloneNode(true);
            radio.parentNode.replaceChild(newRadio, radio);

            newRadio.addEventListener('change', (e) => {
                comicBackground = e.target.value;
                localStorage.setItem('nomad_comic_bg', comicBackground);
                applyComicSettings();
            });

            if (newRadio.value === comicBackground) newRadio.checked = true;
        });

        /* Audio Player */
        let currentAudio = null;
        let speeds = [0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0];
        let speedIndex = 2;

        function openAudioPlayer(file) {
            currentAudio = file;
            audioTitle.textContent = file.name || 'Audiobook';
            audioElement.pause();
            audioElement.src = fileUrlDirect(file.path);
            try { audioElement.load(); } catch(e){}
            audioPlayer.classList.add('active');
            updateAudioHeight();

            const resume = findResume(file);
            if (resume && resume.entry && resume.entry.time) {
                audioElement.currentTime = resume.entry.time;
            }

            audioElement.play();
            playPauseBtn.textContent = '⏸';
        }

        document.getElementById('closeAudio').addEventListener('click', () => {
            audioPlayer.classList.remove('active');
            audioElement.pause();
            audioElement.src = '';
            currentAudio = null;
            updateAudioHeight();
        });

        playPauseBtn.addEventListener('click', () => {
            if (audioElement.paused) {
                audioElement.play();
                playPauseBtn.textContent = '⏸';
            } else {
                audioElement.pause();
                playPauseBtn.textContent = '▶';
            }
        });

        document.getElementById('rewind').addEventListener('click', () => {
            audioElement.currentTime = Math.max(0, audioElement.currentTime - 15);
        });

        document.getElementById('forward').addEventListener('click', () => {
            audioElement.currentTime = Math.min(audioElement.duration, audioElement.currentTime + 15);
        });

        speedBtn.addEventListener('click', () => {
            speedIndex = (speedIndex + 1) % speeds.length;
            audioElement.playbackRate = speeds[speedIndex];
            speedBtn.textContent = speeds[speedIndex] + 'x';
        });

        audioElement.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audioElement.duration);
        });

        audioElement.addEventListener('timeupdate', () => {
            currentTimeEl.textContent = formatTime(audioElement.currentTime);
            const percent = (audioElement.currentTime / audioElement.duration) * 100;
            audioProgressFill.style.width = percent + '%';

            if (currentAudio && audioElement.duration > 0) {
                const store = readResume();
                const key = fileKey(currentAudio.path, currentAudio.sz, currentAudio.mt);
                store[key] = {
                    time: audioElement.currentTime,
                    duration: audioElement.duration,
                    percent: Math.round(percent),
                    timestamp: Date.now()
                };
                writeResume(store);
                updateResumeBadge(currentAudio, audioElement.currentTime);
            }
        });

        audioProgressBar.addEventListener('click', (e) => {
            const rect = audioProgressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audioElement.currentTime = percent * audioElement.duration;
        });

        /* Init */
        (async function init() {
            try {
                library = await buildLibrary();
                filtered = library;
                renderGrid();
            } catch (err) {
                console.error('Failed to load library', err);
                gridEl.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:red;padding:20px">Failed to load library.</p>';
            }
        })();
    </script>
</body>
</html>

    <script>
(function() {
  try {
    const isDark = localStorage.getItem('nomad_dark_mode') === 'true';
    if (isDark) document.documentElement.classList.add('dark');

    const saved = localStorage.getItem('nomad_custom_theme');
    if (saved) {
      const colors = JSON.parse(saved);
      const style = document.createElement('style');
      style.id = 'custom-theme-style';
      style.textContent = `
        :root {
          --primary: ${colors.primary} !important;
          --primary-dark: ${colors.primaryDark} !important;
          --bg: ${colors.bgLight} !important;
          --card: ${colors.cardLight} !important;
          --card-bg: ${colors.cardLight} !important;
          --text: ${colors.textLight} !important;
          --muted: ${colors.mutedLight} !important;
        }
        body.dark {
          --bg: ${colors.bgDark} !important;
          --card: ${colors.cardDark} !important;
          --card-bg: ${colors.cardDark} !important;
          --text: ${colors.textDark} !important;
          --muted: ${colors.mutedDark} !important;
          --primary: ${colors.primaryDarkTheme} !important;
        }
      `;
      document.head.appendChild(style);
    }
  } catch(e) {}
})();
</script>

    <style>

            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

    <script>
    const params      = new URLSearchParams(window.location.search);
    const comicPath   = params.get('path') || '';
    let   entries     = [];
    let   mode        = localStorage.getItem('nomad_comic_mode') || 'webtoon';
    let   direction   = localStorage.getItem('nomad_comic_direction') || 'ltr';
    let   currentPage = 0;
    const blobURLs    = {};
    const loading     = new Set();
    const PRELOAD     = 4;
    let   archive     = null;

    let cbzFetchQueue = Promise.resolve();
    let requestCounter = 0;

    function serializeCBZFetch(url, options) {
        const myRequestId = ++requestCounter;
        const rangeHeader = options?.headers?.Range || 'no-range';

        const executeRequest = async () => {
            console.log(`[Queue] Request ${myRequestId} starting: ${rangeHeader}`);
            try {
                const response = await fetch(url, options);
                if (!response.ok) {
                    console.log(`[Queue] Request ${myRequestId} failed: ${response.status}`);
                    return response;
                }

                const buffer = await response.arrayBuffer();
                console.log(`[Queue] Request ${myRequestId} completed: ${buffer.byteLength} bytes`);
                await new Promise(r => setTimeout(r, 150));

                return new Response(buffer, {
                    status: response.status,
                    statusText: response.statusText,
                    headers: response.headers
                });
            } catch (error) {
                console.log(`[Queue] Request ${myRequestId} error:`, error.message);
                await new Promise(r => setTimeout(r, 150));
                throw error;
            }
        };

        const myTask = cbzFetchQueue.then(executeRequest, executeRequest);
        cbzFetchQueue = myTask;
        return myTask;
    }

    function setStatus(msg) {
        document.getElementById('overlay-status').textContent = msg;
        console.log('[ComicReader]', msg);
    }
    function hideOverlay() {
        document.getElementById('overlay').classList.add('hidden');
    }
    function showError(msg) {
        const banner = document.getElementById('error-banner');
        banner.textContent = msg;
        banner.style.display = 'block';
        setTimeout(() => { banner.style.display = 'none'; }, 6000);
        console.error('[ComicReader]', msg);
    }
    function showFatalError(msg) {
        setStatus('❌ ' + msg);
        document.querySelector('#overlay .spinner').style.display = 'none';
    }

    async function init() {
        if (!comicPath) { showFatalError('No comic path specified.'); return; }

        const name = comicPath.split('/').pop();
        document.title = name + ' – Comic Reader';
        document.getElementById('comic-title').textContent = name;
        document.getElementById('back-btn').href = 'books.html';

        const savedMode = localStorage.getItem('nomad_comic_mode') || 'webtoon';
        const savedDirection = localStorage.getItem('nomad_comic_direction') || 'ltr';

        mode = savedMode;
        direction = savedDirection;

        document.getElementById('mode-select').value = savedMode;
        document.getElementById('direction-select').value = savedDirection;

        if (savedMode === 'paged' || savedMode === 'two-page') {
            document.getElementById('reader').className = savedMode;
            document.getElementById('page-controls').classList.add('visible');
            document.body.classList.add('paged-mode');
        } else {
            document.getElementById('reader').className = 'webtoon';
        }

        setStatus('Checking file type…');

        try {
            const isCBZ = comicPath.toLowerCase().endsWith('.cbz');
            const isCBR = comicPath.toLowerCase().endsWith('.cbr');
            const isArchive = isCBZ || isCBR;

            if (isArchive) {
                if (isCBZ) {
                    await loadCBZFile();
                } else if (isCBR) {
                    await loadCBRFile();
                }
            } else {
                await loadComicDirectory();
            }

            const savedPage = parseInt(localStorage.getItem('comic_page_' + comicPath) || '0');
            if (savedPage > 0 && savedPage < entries.length) {
                if (mode === 'paged' || mode === 'two-page') {
                    goToPage(savedPage);
                } else {
                    setTimeout(() => scrollToPage(savedPage), 300);
                }
            } else if (mode === 'paged' || mode === 'two-page') {
                goToPage(0);
            }

        } catch (err) {
            console.error('[ComicReader] Fatal:', err);
            if (err.message && err.message.includes('503')) {
                showFatalError('Indexing in progress. Please wait and try again.');
            } else {
                showFatalError('Failed to open comic: ' + (err.message || err));
            }
        }
    }

    async function loadCBZFile() {
        setStatus('Connecting to CBZ file…');
        console.log('[ComicReader] Opening CBZ with on-demand loading:', comicPath);

        const fileUrl = '/media?file=' + encodeURIComponent(comicPath);

        const headResponse = await serializeCBZFetch(fileUrl, { method: 'HEAD' });
        if (!headResponse.ok) {
            throw new Error('Failed to connect to CBZ file');
        }

        const fileSize = parseInt(headResponse.headers.get('content-length') || '0');
        console.log('[ComicReader] File size:', fileSize, 'bytes');

        if (fileSize === 0) {
            throw new Error('Invalid file size');
        }

        setStatus('Reading ZIP directory…');

        const eocdrSize = Math.min(fileSize, 65536);
        const eocdrStart = fileSize - eocdrSize;

        const eocdrResponse = await serializeCBZFetch(fileUrl, {
            headers: { 'Range': `bytes=${eocdrStart}-${fileSize - 1}` }
        });

        if (!eocdrResponse.ok) {
            throw new Error('Failed to read ZIP directory');
        }

        const eocdrData = await eocdrResponse.arrayBuffer();
        const eocdrView = new DataView(eocdrData);

        let centralDirOffset = -1;
        let centralDirSize = 0;

        for (let i = eocdrData.byteLength - 22; i >= 0; i--) {
            if (eocdrView.getUint32(i, true) === 0x06054b50) {
                centralDirSize = eocdrView.getUint32(i + 12, true);
                centralDirOffset = eocdrView.getUint32(i + 16, true);
                break;
            }
        }

        if (centralDirOffset === -1) {
            throw new Error('Invalid ZIP file - EOCD not found');
        }

        setStatus('Loading file index…');

        const cdResponse = await serializeCBZFetch(fileUrl, {
            headers: { 'Range': `bytes=${centralDirOffset}-${centralDirOffset + centralDirSize - 1}` }
        });

        if (!cdResponse.ok) {
            throw new Error('Failed to read central directory');
        }

        const cdData = await cdResponse.arrayBuffer();
        const cdView = new DataView(cdData);

        const imageExts = /\.(jpe?g|png|gif|webp|bmp|avif)$/i;
        const tempEntries = [];

        let offset = 0;
        while (offset < cdData.byteLength) {
            if (cdView.getUint32(offset, true) !== 0x02014b50) break;

            const compressedSize = cdView.getUint32(offset + 20, true);
            const uncompressedSize = cdView.getUint32(offset + 24, true);
            const fileNameLength = cdView.getUint16(offset + 28, true);
            const extraFieldLength = cdView.getUint16(offset + 30, true);
            const fileCommentLength = cdView.getUint16(offset + 32, true);
            const localHeaderOffset = cdView.getUint32(offset + 42, true);
            const compressionMethod = cdView.getUint16(offset + 10, true);

            const nameBytes = new Uint8Array(cdData, offset + 46, fileNameLength);
            const fileName = new TextDecoder().decode(nameBytes);

            if (imageExts.test(fileName)) {
                tempEntries.push({
                    filename: fileName,
                    hintOffset: localHeaderOffset,
                    compressedSize: compressedSize,
                    uncompressedSize: uncompressedSize,
                    compressionMethod: compressionMethod
                });
            }

            offset += 46 + fileNameLength + extraFieldLength + fileCommentLength;
        }

        setStatus('Verifying file locations…');
        entries = [];

        const PRIORITY_COUNT = 20;
        const itemsToVerify = Math.min(PRIORITY_COUNT, tempEntries.length);

        for (let i = 0; i < itemsToVerify; i++) {
            const entry = tempEntries[i];
            const searchRange = 128 * 1024;
            const searchStart = Math.max(0, entry.hintOffset - searchRange);
            const searchEnd = Math.min(fileSize, entry.hintOffset + searchRange);

            const searchResponse = await serializeCBZFetch(fileUrl, {
                headers: { 'Range': `bytes=${searchStart}-${searchEnd - 1}` }
            });

            if (!searchResponse.ok) continue;

            const searchData = await searchResponse.arrayBuffer();
            const searchView = new DataView(searchData);

            let found = false;
            for (let j = 0; j < searchData.byteLength - 30; j++) {
                if (searchView.getUint32(j, true) === 0x04034b50) {
                    const fnLen = searchView.getUint16(j + 26, true);

                    if (j + 30 + fnLen <= searchData.byteLength) {
                        const nameBytes = new Uint8Array(searchData, j + 30, fnLen);
                        const fileName = new TextDecoder().decode(nameBytes);

                        if (fileName === entry.filename) {
                            const actualOffset = searchStart + j;
                            const actualCompressionMethod = searchView.getUint16(j + 8, true);
                            const actualCompressedSize = searchView.getUint32(j + 18, true);
                            const actualUncompressedSize = searchView.getUint32(j + 22, true);
                            const extraLen = searchView.getUint16(j + 28, true);
                            const dataOffset = actualOffset + 30 + fnLen + extraLen;

                            entries.push({
                                type: 'cbz',
                                filename: entry.filename,
                                localHeaderOffset: actualOffset,
                                dataOffset: dataOffset,
                                compressedSize: actualCompressedSize,
                                uncompressedSize: actualUncompressedSize,
                                compressionMethod: actualCompressionMethod,
                                fileUrl: fileUrl
                            });
                            found = true;
                            break;
                        }
                    }
                }
            }

            if (!found) {
                console.warn('[ComicReader] Could not locate:', entry.filename);
            }

            if (i % 5 === 0) {
                setStatus(`Verifying priority files… ${Math.round((i / itemsToVerify) * 100)}%`);
            }
        }

        entries.sort((a, b) =>
            a.filename.localeCompare(b.filename, undefined, { numeric: true, sensitivity: 'base' })
        );

        console.log('[ComicReader] Priority verified', entries.length, 'files, building reader...');
        console.log('[ComicReader] First 5 filenames:', entries.slice(0, 5).map(e => e.filename));
        console.log('[ComicReader] tempEntries.length:', tempEntries.length, 'PRIORITY_COUNT:', PRIORITY_COUNT);

        setStatus('Building reader…');
        buildReader();
        updateIndicator();
        hideOverlay();

        if (tempEntries.length > PRIORITY_COUNT) {
            console.log('[ComicReader] ===== STARTING BACKGROUND VERIFICATION =====');
            console.log('[ComicReader] Background verifying remaining', tempEntries.length - PRIORITY_COUNT, 'files...');

            (async () => {
                for (let i = PRIORITY_COUNT; i < tempEntries.length; i++) {
                    const entry = tempEntries[i];
                    const searchRange = 128 * 1024;
                    const searchStart = Math.max(0, entry.hintOffset - searchRange);
                    const searchEnd = Math.min(fileSize, entry.hintOffset + searchRange);

                    const searchResponse = await serializeCBZFetch(fileUrl, {
                        headers: { 'Range': `bytes=${searchStart}-${searchEnd - 1}` }
                    });

                    if (!searchResponse.ok) {
                        if (i % 20 === 0) {
                            console.log(`[ComicReader] Background verification progress: ${i}/${tempEntries.length}`);
                        }
                        continue;
                    }

                    const searchData = await searchResponse.arrayBuffer();
                    const searchView = new DataView(searchData);

                    let found = false;
                    for (let j = 0; j < searchData.byteLength - 30; j++) {
                        if (searchView.getUint32(j, true) === 0x04034b50) {
                            const fnLen = searchView.getUint16(j + 26, true);

                            if (j + 30 + fnLen <= searchData.byteLength) {
                                const nameBytes = new Uint8Array(searchData, j + 30, fnLen);
                                const fileName = new TextDecoder().decode(nameBytes);

                                if (fileName === entry.filename) {
                                    const actualOffset = searchStart + j;
                                    const actualCompressionMethod = searchView.getUint16(j + 8, true);
                                    const actualCompressedSize = searchView.getUint32(j + 18, true);
                                    const actualUncompressedSize = searchView.getUint32(j + 22, true);
                                    const extraLen = searchView.getUint16(j + 28, true);
                                    const dataOffset = actualOffset + 30 + fnLen + extraLen;

                                    const oldLength = entries.length;
                                    entries.push({
                                        type: 'cbz',
                                        filename: entry.filename,
                                        localHeaderOffset: actualOffset,
                                        dataOffset: dataOffset,
                                        compressedSize: actualCompressedSize,
                                        uncompressedSize: actualUncompressedSize,
                                        compressionMethod: actualCompressionMethod,
                                        fileUrl: fileUrl
                                    });

                                    entries.sort((a, b) =>
                                        a.filename.localeCompare(b.filename, undefined, { numeric: true, sensitivity: 'base' })
                                    );

                                    const newIndex = entries.findIndex(e => e.filename === fileName);

                                    const reader = document.getElementById('reader');
                                    const wrapper = document.createElement('div');
                                    wrapper.className = 'page-wrapper';
                                    wrapper.id = `page-wrapper-${newIndex}`;
                                    wrapper.dataset.index = newIndex;

                                    const placeholder = document.createElement('div');
                                    placeholder.className = 'page-placeholder';
                                    placeholder.id = `placeholder-${newIndex}`;
                                    wrapper.appendChild(placeholder);

                                    const img = document.createElement('img');
                                    img.id = `img-${newIndex}`;
                                    img.className = 'comic-page';
                                    img.alt = `Page ${newIndex + 1}`;
                                    img.dataset.loaded = 'false';
                                    img.dataset.retryCount = '0';
                                    img.style.display = 'none';
                                    wrapper.appendChild(img);

                                    if (newIndex >= reader.children.length) {
                                        reader.appendChild(wrapper);
                                    } else {
                                        reader.insertBefore(wrapper, reader.children[newIndex]);
                                    }

                                    for (let k = newIndex + 1; k < reader.children.length; k++) {
                                        const child = reader.children[k];
                                        child.id = `page-wrapper-${k}`;
                                        child.dataset.index = k;
                                        const childPlaceholder = child.querySelector('.page-placeholder');
                                        if (childPlaceholder) childPlaceholder.id = `placeholder-${k}`;
                                        const childImg = child.querySelector('.comic-page');
                                        if (childImg) {
                                            childImg.id = `img-${k}`;
                                            childImg.alt = `Page ${k + 1}`;
                                        }
                                    }

                                    if (mode === 'webtoon' && observer) {
                                        observer.observe(wrapper);
                                    }

                                    updateIndicator();

                                    found = true;
                                    break;
                                }
                            }
                        }
                    }

                    if (!found) {
                        console.warn('[ComicReader] Could not locate:', entry.filename);
                    }

                    if (i % 20 === 0) {
                        console.log(`[ComicReader] Background verification progress: ${i}/${tempEntries.length} (${entries.length} total)`);
                    }
                }

                console.log('[ComicReader] Background verification complete. Total files:', entries.length);
            })();
        }

        console.log('[ComicReader] Found', entries.length, 'image files in CBZ');

        if (entries.length === 0) {
            showFatalError('No images found in this CBZ file.');
            return;
        }
    }

    async function loadCBRFile() {
        setStatus('Downloading CBR file…');
        console.log('[ComicReader] Opening CBR file (full download required):', comicPath);

        const fileUrl = '/media?file=' + encodeURIComponent(comicPath);

        const response = await fetch(fileUrl);
        if (!response.ok) {
            throw new Error('Failed to download CBR: ' + response.statusText);
        }

        const contentLength = parseInt(response.headers.get('content-length') || '0');
        const reader = response.body.getReader();
        const chunks = [];
        let receivedLength = 0;

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            chunks.push(value);
            receivedLength += value.length;

            if (contentLength > 0) {
                const percent = Math.floor((receivedLength / contentLength) * 100);
                setStatus(`Downloading CBR file… ${percent}%`);
            }
        }

        const arrayBuffer = new Uint8Array(receivedLength);
        let position = 0;
        for (const chunk of chunks) {
            arrayBuffer.set(chunk, position);
            position += chunk.length;
        }

        setStatus('Extracting RAR archive…');
        console.log('[ComicReader] Uncompressing RAR with uncompress.js');

        const archive = await new Promise((resolve, reject) => {
            archiveOpenArrayBuffer(comicPath.split('/').pop(), arrayBuffer.buffer, (archive, error) => {
                if (error) {
                    reject(error);
                } else {
                    resolve(archive);
                }
            });
        });

        console.log('[ComicReader] Archive opened, type:', archive.archive_type, 'entries:', archive.entries.length);

        const imageExts = /\.(jpe?g|png|gif|webp|bmp|avif)$/i;
        const imageEntries = archive.entries.filter(entry => entry.is_file && imageExts.test(entry.name));

        console.log('[ComicReader] Found', imageEntries.length, 'image files');

        setStatus('Loading image data…');

        const loadedEntries = await Promise.all(
            imageEntries.map((entry, idx) => {
                return new Promise((resolve, reject) => {
                    entry.readData((data, error) => {
                        if (error) {
                            console.warn('[ComicReader] Failed to read:', entry.name, error);
                            reject(error);
                        } else {
                            resolve({
                                type: 'rar',
                                data: data,
                                filename: entry.name
                            });
                        }
                    });
                });
            })
        );

        entries = loadedEntries.sort((a, b) =>
            a.filename.localeCompare(b.filename, undefined,
                { numeric: true, sensitivity: 'base' })
        );

        archiveClose(archive);

        if (entries.length === 0) {
            showFatalError('No images found in this CBR file.');
            return;
        }

        setStatus('Building reader…');
        buildReader();
        updateIndicator();
        hideOverlay();
    }

    async function loadComicDirectory() {
        setStatus('Loading comic directory…');

        const listUrl = '/list?dir=' + encodeURIComponent(comicPath);
        const response = await fetch(listUrl);

        if (!response.ok) {
            throw new Error('Failed to load directory: ' + response.statusText);
        }

        const data = await response.json();

        const imageExts = /\.(jpe?g|png|gif|webp|bmp|avif)$/i;
        entries = data
            .filter(item => item.t === 'f' && imageExts.test(item.n))
            .map(item => ({
                type: 'direct',
                path: comicPath + '/' + item.n,
                filename: item.n
            }))
            .sort((a, b) =>
                a.filename.localeCompare(b.filename, undefined,
                    { numeric: true, sensitivity: 'base' })
            );

        if (entries.length === 0) {
            showFatalError('No images found in this directory.');
            return;
        }

        setStatus('Building reader…');
        buildReader();
        updateIndicator();
        hideOverlay();
    }

    function buildReader() {
        const reader = document.getElementById('reader');
        reader.innerHTML = '';

        entries.forEach((entry, idx) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'page-wrapper';
            wrapper.id = `page-wrapper-${idx}`;
            wrapper.dataset.index = idx;

            const placeholder = document.createElement('div');
            placeholder.className = 'page-placeholder';
            placeholder.id = `placeholder-${idx}`;
            wrapper.appendChild(placeholder);

            const img = document.createElement('img');
            img.id = `img-${idx}`;
            img.className = 'comic-page';
            img.alt = `Page ${idx + 1}`;
            img.dataset.loaded = 'false';
            img.dataset.retryCount = '0';
            img.style.display = 'none';
            wrapper.appendChild(img);

            reader.appendChild(wrapper);
        });

        document.getElementById('mode-select').value = mode;
        document.getElementById('direction-select').value = direction;
        applyDirection();
        applyMode();

        const savedPage = parseInt(localStorage.getItem('comic_page_' + comicPath) || '0');
        currentPage = Math.min(savedPage, entries.length - 1);

        if (mode === 'webtoon') {
            setupWebtoonObserver();
        } else {
            goToPage(currentPage);
        }
    }

    function rebuildReaderPages() {
        const reader = document.getElementById('reader');
        const existingCount = reader.querySelectorAll('.page-wrapper').length;

        for (let idx = existingCount; idx < entries.length; idx++) {
            const entry = entries[idx];
            const wrapper = document.createElement('div');
            wrapper.className = 'page-wrapper';
            wrapper.id = `page-wrapper-${idx}`;
            wrapper.dataset.index = idx;

            const placeholder = document.createElement('div');
            placeholder.className = 'page-placeholder';
            placeholder.id = `placeholder-${idx}`;
            wrapper.appendChild(placeholder);

            const img = document.createElement('img');
            img.id = `img-${idx}`;
            img.className = 'comic-page';
            img.alt = `Page ${idx + 1}`;
            img.dataset.loaded = 'false';
            img.dataset.retryCount = '0';
            img.style.display = 'none';
            wrapper.appendChild(img);

            reader.appendChild(wrapper);
        }

        if (mode === 'webtoon' && observer) {
            reader.querySelectorAll('.page-wrapper').forEach(w => {
                if (!w.dataset.observed) {
                    observer.observe(w);
                    w.dataset.observed = 'true';
                }
            });
        }

        console.log(`[ComicReader] Rebuilt reader: added ${entries.length - existingCount} new pages (total: ${entries.length})`);
    }



    let observer = null;

    function setupWebtoonObserver() {
        if (observer) observer.disconnect();

        observer = new IntersectionObserver((changes) => {
            let topVisible = Infinity;
            changes.forEach(change => {
                if (change.isIntersecting) {
                    const idx = parseInt(change.target.dataset.index);
                    if (idx < topVisible) topVisible = idx;
                    for (let i = idx; i < Math.min(entries.length, idx + PRELOAD); i++) {
                        decodeImage(i);
                    }
                }
            });
            if (topVisible !== Infinity) {
                currentPage = topVisible;
                updateIndicator();
                localStorage.setItem('comic_page_' + comicPath, topVisible);
            }
        }, {
            root: null,
            rootMargin: '600px 0px 600px 0px',
            threshold: 0.01
        });

        document.querySelectorAll('.page-wrapper').forEach(w => observer.observe(w));

        for (let i = 0; i < Math.min(entries.length, 5); i++) {
            decodeImage(i);
        }
    }

    function scrollToPage(idx) {
        const el = document.getElementById(`page-wrapper-${idx}`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function goToPage(idx) {
        if (idx < 0) idx = 0;
        if (idx >= entries.length) idx = entries.length - 1;
        currentPage = idx;

        document.querySelectorAll('.page-wrapper').forEach(w => {
            w.classList.remove('active');
        });
        const wrapper = document.getElementById(`page-wrapper-${idx}`);
        if (wrapper) wrapper.classList.add('active');

        decodeImage(idx);
        for (let i = idx + 1; i < Math.min(entries.length, idx + PRELOAD); i++) {
            decodeImage(i);
        }
        updateIndicator();
        localStorage.setItem('comic_page_' + comicPath, idx);
    }

    function prevPage() {
        if (currentPage > 0) goToPage(currentPage - 1);
    }
    function nextPage() {
        if (currentPage < entries.length - 1) goToPage(currentPage + 1);
    }

    async function decodeImage(idx) {
        const wrapper = document.getElementById(`page-wrapper-${idx}`);
        const placeholder = document.getElementById(`placeholder-${idx}`);
        const img = document.getElementById(`img-${idx}`);

        if (placeholder) placeholder.classList.add('loading');
        if (!img) return;
        if (img.dataset.loaded === 'true') return;
        img.dataset.loaded = 'true';

        const MAX_RETRIES = 3;
        const retryCount = parseInt(img.dataset.retryCount || '0');

        if (retryCount >= MAX_RETRIES) {
            console.error(`[ComicReader] Page ${idx} failed after ${MAX_RETRIES} retries, giving up`);
            if (placeholder) {
                placeholder.classList.remove('loading');
                placeholder.textContent = '⚠ Failed to load';
            }
            return;
        }

        try {
            const entry = entries[idx];
            let blob;

            if (entry.type === 'cbz') {
                console.log(`[ComicReader] Loading page ${idx}: ${entry.filename} at offset ${entry.localHeaderOffset}`);

                if (!entry.dataOffset) {
                    console.log(`[ComicReader] No dataOffset cached, fetching header for page ${idx}`);
                    const headerSize = 30 + 256;
                    const localHeaderResponse = await serializeCBZFetch(entry.fileUrl, {
                        headers: { 'Range': `bytes=${entry.localHeaderOffset}-${entry.localHeaderOffset + headerSize - 1}` }
                    });

                    if (!localHeaderResponse.ok) {
                        throw new Error('Failed to fetch local header: ' + localHeaderResponse.statusText);
                    }

                    const localHeaderData = await localHeaderResponse.arrayBuffer();
                    const localHeaderView = new DataView(localHeaderData);

                    const signature = localHeaderView.getUint32(0, true);
                    console.log(`[ComicReader] Local header signature: 0x${signature.toString(16)} (expected 0x04034b50)`);

                    if (signature !== 0x04034b50) {
                        throw new Error(`Invalid local file header signature: 0x${signature.toString(16)}`);
                    }

                    const localFileNameLength = localHeaderView.getUint16(26, true);
                    const localExtraFieldLength = localHeaderView.getUint16(28, true);

                    console.log(`[ComicReader] Filename length: ${localFileNameLength}, Extra: ${localExtraFieldLength}`);

                    entry.dataOffset = entry.localHeaderOffset + 30 + localFileNameLength + localExtraFieldLength;
                }

                const dataEnd = entry.dataOffset + entry.compressedSize - 1;

                console.log(`[ComicReader] Fetching image data: bytes ${entry.dataOffset}-${dataEnd} (${entry.compressedSize} bytes, method ${entry.compressionMethod})`);

                const imageDataResponse = await serializeCBZFetch(entry.fileUrl, {
                    headers: { 'Range': `bytes=${entry.dataOffset}-${dataEnd}` }
                });

                if (!imageDataResponse.ok) {
                    throw new Error('Failed to fetch image data: ' + imageDataResponse.statusText);
                }

                let imageData = await imageDataResponse.arrayBuffer();

                if (entry.compressionMethod === 8) {
                    console.log(`[ComicReader] Decompressing ${entry.compressedSize} bytes -> ${entry.uncompressedSize} bytes`);
                    const compressed = new Uint8Array(imageData);
                    const decompressed = pako.inflateRaw(compressed);
                    imageData = decompressed.buffer;
                    console.log(`[ComicReader] Decompressed to ${imageData.byteLength} bytes`);
                } else if (entry.compressionMethod !== 0) {
                    throw new Error('Unsupported compression method: ' + entry.compressionMethod);
                }

                blob = new Blob([imageData]);
                console.log(`[ComicReader] Page ${idx} loaded successfully`);
            } else if (entry.type === 'rar') {
                blob = new Blob([entry.data]);
            } else {
                const response = await fetch('/media?file=' + encodeURIComponent(entry.path));
                if (!response.ok) throw new Error('Failed to load image');
                blob = await response.blob();
            }

            const url = URL.createObjectURL(blob);
            blobURLs[idx] = url;

            img.onload = () => {
                if (placeholder) placeholder.remove();
                img.style.display = 'block';
                img.dataset.loaded = 'true';
                img.dataset.retryCount = '0';
            };

            img.onerror = () => {
                console.error(`[ComicReader] Image element failed to load for page ${idx}`);
                img.dataset.loaded = 'false';
                if (placeholder) {
                    placeholder.classList.remove('loading');
                    placeholder.textContent = '⚠ Failed';
                }
                URL.revokeObjectURL(url);
                delete blobURLs[idx];
            };

            img.src = url;

        } catch (err) {
            console.error(`[ComicReader] Page ${idx} decode error:`, err.message || err);
            img.dataset.loaded = 'false';
            if (placeholder) {
                placeholder.classList.remove('loading');
                placeholder.textContent = '⚠ Failed';
            }

            const newRetryCount = retryCount + 1;
            if (newRetryCount < MAX_RETRIES) {
                const retryDelay = Math.min(1000 * Math.pow(2, retryCount), 30000);
                img.dataset.retryCount = newRetryCount.toString();
                console.log(`[ComicReader] Retry ${newRetryCount}/${MAX_RETRIES} for page ${idx} in ${retryDelay}ms`);
                setTimeout(() => decodeImage(idx), retryDelay);
            } else {
                console.error(`[ComicReader] Page ${idx} failed permanently after ${MAX_RETRIES} retries`);
            }
        }
    }

    function changeMode() {
        const modeSelect = document.getElementById('mode-select');
        mode = modeSelect.value;
        localStorage.setItem('nomad_comic_mode', mode);
        applyMode();
    }

    function changeDirection() {
        const directionSelect = document.getElementById('direction-select');
        direction = directionSelect.value;
        localStorage.setItem('nomad_comic_direction', direction);
        applyDirection();
    }

    function applyDirection() {
        if (direction === 'rtl') {
            document.body.classList.add('rtl');
        } else {
            document.body.classList.remove('rtl');
        }
    }

    function applyMode() {
        const reader   = document.getElementById('reader');
        const controls = document.getElementById('page-controls');

        if (mode === 'paged' || mode === 'two-page') {
            reader.className = mode;
            controls.classList.add('visible');
            document.body.classList.add('paged-mode');
            if (observer) { observer.disconnect(); observer = null; }
            goToPage(currentPage);
        } else {
            reader.className = 'webtoon';
            controls.classList.remove('visible');
            document.body.classList.remove('paged-mode');
            document.querySelectorAll('.page-wrapper').forEach(w => {
                w.classList.remove('active');
                w.style.display = '';
            });
            setupWebtoonObserver();
            setTimeout(() => scrollToPage(currentPage), 100);
        }
        updateIndicator();
    }

    function goToPage(idx) {
        if (idx < 0) idx = 0;
        if (idx >= entries.length) idx = entries.length - 1;
        currentPage = idx;

        document.querySelectorAll('.page-wrapper').forEach(w => {
            w.classList.remove('active');
        });

        if (mode === 'two-page') {
            const firstPage = idx % 2 === 0 ? idx : idx - 1;
            for (let i = firstPage; i < Math.min(firstPage + 2, entries.length); i++) {
                const wrapper = document.getElementById(`page-wrapper-${i}`);
                if (wrapper) wrapper.classList.add('active');
                decodeImage(i);
            }
            for (let i = firstPage + 2; i < Math.min(entries.length, firstPage + 2 + PRELOAD); i++) {
                decodeImage(i);
            }
        } else {
            const wrapper = document.getElementById(`page-wrapper-${idx}`);
            if (wrapper) wrapper.classList.add('active');
            decodeImage(idx);
            for (let i = idx + 1; i < Math.min(entries.length, idx + PRELOAD); i++) {
                decodeImage(i);
            }
        }

        updateIndicator();
        localStorage.setItem('comic_page_' + comicPath, idx);
    }

    function prevPage() {
        if (mode === 'two-page') {
            const step = direction === 'rtl' ? 2 : -2;
            const newPage = currentPage + step;
            if (newPage >= 0 && newPage < entries.length) {
                goToPage(newPage);
            }
        } else {
            if (direction === 'rtl') {
                if (currentPage < entries.length - 1) goToPage(currentPage + 1);
            } else {
                if (currentPage > 0) goToPage(currentPage - 1);
            }
        }
    }

    function nextPage() {
        if (mode === 'two-page') {
            const step = direction === 'rtl' ? -2 : 2;
            const newPage = currentPage + step;
            if (newPage >= 0 && newPage < entries.length) {
                goToPage(newPage);
            }
        } else {
            if (direction === 'rtl') {
                if (currentPage > 0) goToPage(currentPage - 1);
            } else {
                if (currentPage < entries.length - 1) goToPage(currentPage + 1);
            }
        }
    }

    function updateIndicator() {
        const total = entries.length;
        const cur   = currentPage + 1;
        document.getElementById('page-indicator').textContent = cur + ' / ' + total;
        const paged = document.getElementById('paged-indicator');
        if (paged) paged.textContent = cur + ' / ' + total;
        const prev = document.getElementById('btn-prev');
        const next = document.getElementById('btn-next');
        if (prev) prev.disabled = currentPage === 0;
        if (next) next.disabled = currentPage === total - 1;
    }

    document.addEventListener('keydown', e => {
        if (mode === 'paged' || mode === 'two-page') {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); nextPage(); }
            if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); prevPage(); }
        }
        if (e.key === 'f' || e.key === 'F') toggleMode();
    });

    let lastScrollY = 0;
    window.addEventListener('scroll', () => {
        if (mode !== 'webtoon') return;
        const topbar = document.getElementById('topbar');
        const dy = window.scrollY - lastScrollY;
        lastScrollY = window.scrollY;
        if (dy > 10) {
            topbar.classList.add('hidden');
        } else if (dy < -10) {
            topbar.classList.remove('hidden');
        }
    }, { passive: true });

    if (typeof pako === 'undefined') {
        showFatalError('pako library not loaded. Please check /assets/pako.min.js (needed for CBZ).');
    } else if (typeof archiveOpenArrayBuffer === 'undefined') {
        showFatalError('uncompress.js library not loaded. Please check /assets/uncompress.js (needed for CBR).');
    } else {
        console.log('[ComicReader] Libraries loaded, initializing...');
        loadArchiveFormats(['rar']);
        init();
    }
    </script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Playlists</title>
<link rel="stylesheet" href="master.css">
<script>
(function() {
  try {
    const isDark = localStorage.getItem('nomad_dark_mode') === 'true';
    if (isDark) document.documentElement.classList.add('dark');

    const saved = localStorage.getItem('nomad_custom_theme');
    if (saved) {
      const colors = JSON.parse(saved);
      const style = document.createElement('style');
      style.id = 'custom-theme-style';
      style.textContent = `
        :root {
          --primary: ${colors.primary} !important;
          --primary-dark: ${colors.primaryDark} !important;
          --bg: ${colors.bgLight} !important;
          --card: ${colors.cardLight} !important;
          --card-bg: ${colors.cardLight} !important;
          --text: ${colors.textLight} !important;
          --muted: ${colors.mutedLight} !important;
        }
        body.dark {
          --bg: ${colors.bgDark} !important;
          --card: ${colors.cardDark} !important;
          --card-bg: ${colors.cardDark} !important;
          --text: ${colors.textDark} !important;
          --muted: ${colors.mutedDark} !important;
          --primary: ${colors.primaryDarkTheme} !important;
        }
      `;
      document.head.appendChild(style);
    }
  } catch(e) {}
})();
</script>
<script src="theme-manager.js"></script>
<style>
body{margin:0;padding:0;background:var(--bg);font-family:Inter,Arial,sans-serif;}
.toolbar{background:var(--card);padding:.6rem 14px;display:flex;gap:.6rem;align-items:center;border-bottom:1px solid var(--black-alpha-4);position:sticky;top:0;z-index:55;flex-wrap:wrap;}
.search-wrap{display:flex;flex:1;gap:12px;align-items:center;}
.toolbar input[type="search"]{flex:1;padding:.56rem .8rem;border-radius:12px;border:1px solid var(--black-alpha-6);background:var(--card);font-size:0.95rem;color:var(--text);}
.playlist-count{color:var(--muted);font-weight:700;font-size:0.95rem;margin-left:auto;}
main{padding:14px;max-width:1100px;margin:0 auto;padding-bottom:20px;}
.playlists{display:flex;flex-direction:column;gap:12px;}
.playlist{background:var(--card);border-radius:12px;border:1px solid var(--black-alpha-6);overflow:hidden;box-shadow:var(--shadow);}
.playlist-header{display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer;user-select:none;background:linear-gradient(to right, var(--primary-alpha-5), transparent);}
.playlist-header:hover{background:var(--primary-alpha-5);}
.playlist-header .name{font-weight:800;flex:1;color:var(--text);}
.playlist-header .count{color:var(--muted);font-weight:700;}
.playlist-header .icon{transition:transform 0.2s;color:var(--muted);font-size:0.8rem;}
.playlist-header.open .icon{transform:rotate(90deg);}
.playlist-body{display:none;padding:10px;border-top:1px solid var(--black-alpha-6);background:var(--primary-alpha-5);}
.playlist-body.open{display:block;}
.folder-card{background:var(--black-alpha-4);border:1px solid var(--black-alpha-8);border-radius:8px;margin:8px 4px;overflow:hidden;transition:all 0.2s;}
.folder-card.expanded{background:var(--primary-alpha-8);border-color:var(--primary-alpha-30);}
.folder{padding:10px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;font-weight:700;}
.folder .name{flex:1;}
.folder .meta{color:var(--muted);font-size:0.85rem;}
.folder.expanded{background:var(--primary-alpha-5);}
.subtracks{padding:0 8px 8px 8px;}
.track{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;cursor:pointer;transition:all .15s;margin:4px 0;}
.track:hover{background:var(--primary-alpha-8);transform:translateY(-1px);}
.track.playing{background:var(--primary);color:var(--color-white);}
.track .track-name{flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.track.playing .track-name{color:var(--color-white);}
.track .meta{color:var(--muted);font-size:0.85rem;font-weight:600;}
.track.playing .meta{color:var(--white-alpha-80);}
.add-queue-btn{padding:4px 8px;background:var(--card);border:1px solid var(--black-alpha-10);border-radius:6px;font-size:0.85rem;font-weight:700;color:var(--primary);cursor:pointer;transition:all .15s;}
.add-queue-btn:hover{background:var(--primary);color:var(--color-white);transform:scale(1.05);}
.track.playing .add-queue-btn{background:var(--white-alpha-20);color:var(--color-white);border-color:var(--white-alpha-30);}
</style>
</head>
<body>

<div class="toolbar">
  <div class="search-wrap">
    <input id="search" type="search" placeholder="Search playlists…">
  </div>
  <div id="playlistCount" class="playlist-count">0 playlists</div>
</div>

<main>
  <div id="playlists" class="playlists"></div>
</main>

<script>
const ROOT = '/Music';
const INDEX_ENDPOINT = '/api/index';
const AUDIO_EXTS = ['.mp3','.m4a','.flac','.aac','.ogg','.wav','.opus','.alac','.aiff'];

let directoryMap = new Map();
let topPlaylists = [];
let sortAsc = true;
let currentPlayingPath = null;
let openTopPath = null;
let openSubPath = null;

const playlistsEl = document.getElementById('playlists');
const playlistCountEl = document.getElementById('playlistCount');
const searchEl = document.getElementById('search');

function normalizePath(p){
  if(!p) return '/';
  p = String(p);
  if(!p.startsWith('/')) p = '/' + p;
  while(p.length > 1 && p.endsWith('/')) p = p.slice(0, -1);
  return p;
}

function ext(name){
  const i = name.lastIndexOf('.');
  return i >= 0 ? name.slice(i).toLowerCase() : '';
}

function isAudio(n){
  return AUDIO_EXTS.includes(ext(n));
}

function prettify(n){
  if(!n) return '';
  let s = n.replace(/\.[^/.]+$/, '');
  s = s.replace(/[_\.]+/g, ' ').trim();
  return s;
}

async function fetchIndex(path){
  const url = `${INDEX_ENDPOINT}?path=${encodeURIComponent(normalizePath(path))}`;
  const res = await fetch(url, { cache: 'no-store' });
  if(!res.ok) throw new Error('index fetch failed '+res.status);
  const text = await res.text();
  const lines = text.split('\n').filter(Boolean);
  const header = lines.length ? (()=>{ try{ return JSON.parse(lines[0]); }catch(e){return null;} })() : null;
  const entries = [];
  for(let i=1;i<lines.length;i++){
    try{
      entries.push(JSON.parse(lines[i]));
    }catch(e){
      const idx = lines[i].indexOf('{');
      if(idx>=0){
        try{ entries.push(JSON.parse(lines[i].slice(idx))); }catch(_){}
      }
    }
  }
  return { header, entries };
}

function addTrackToMap(mapRef, fullPath){
  const normalized = normalizePath(fullPath);
  const parts = normalized.split('/').filter(Boolean);
  if(parts.length < 2) return;
  const filename = parts[parts.length - 1];
  if(!isAudio(filename)) return;
  const dirPath = '/' + parts.slice(0, parts.length - 1).join('/');
  if(!mapRef.has(dirPath)){
    mapRef.set(dirPath, {
      path: dirPath,
      name: dirPath.split('/').filter(Boolean).pop() || '/',
      files: [],
      dirs: new Set()
    });
  }
  const entry = mapRef.get(dirPath);
  if(!entry.files.some(f => f.path === normalized)){
    const t = { name: prettify(filename), file: filename, path: normalized, dirPath };
    entry.files.push(t);
  }
}

async function scanLibrary(){
  const newDirMap = new Map();
  
  try{
    const resp = await fetchIndex(ROOT);
    
    for(const e of resp.entries){
      const type = e.t || e.type || (e.kind === 'file' ? 'f' : (e.kind === 'dir' ? 'd' : undefined));
      let fullPath = e.p || e.path;
      if(!fullPath && e.n){
        fullPath = e.n.startsWith('/') ? e.n : normalizePath(ROOT + '/' + e.n);
      }
      if(!fullPath) continue;
      fullPath = normalizePath(fullPath);
      if(!fullPath.startsWith(ROOT + '/') && fullPath !== ROOT) continue;
      
      if(type === 'd'){
        if(!newDirMap.has(fullPath)){
          const name = fullPath.split('/').filter(Boolean).pop() || '/';
          newDirMap.set(fullPath, {
            path: fullPath,
            name: name,
            files: [],
            dirs: new Set()
          });
        }
      }
    }
    
    for(const e of resp.entries){
      const type = e.t || e.type || (e.kind === 'file' ? 'f' : (e.kind === 'dir' ? 'd' : undefined));
      let fullPath = e.p || e.path;
      if(!fullPath && e.n){
        fullPath = e.n.startsWith('/') ? e.n : normalizePath(ROOT + '/' + e.n);
      }
      if(!fullPath) continue;
      fullPath = normalizePath(fullPath);
      if(!fullPath.startsWith(ROOT + '/') && fullPath !== ROOT) continue;
      
      if(type === 'f' && isAudio(fullPath)){
        addTrackToMap(newDirMap, fullPath);
        
        const parts = fullPath.split('/').filter(Boolean);
        for(let i = 1; i < parts.length; i++){
          const dirPath = '/' + parts.slice(0, i).join('/');
          if(!newDirMap.has(dirPath)){
            newDirMap.set(dirPath, {
              path: dirPath,
              name: parts[i-1],
              files: [],
              dirs: new Set()
            });
          }
        }
      }
      
      if(type === 'd'){
        const parts = fullPath.split('/').filter(Boolean);
        if(parts.length > 1){
          const parentPath = '/' + parts.slice(0, -1).join('/');
          if(!newDirMap.has(parentPath)){
            newDirMap.set(parentPath, {
              path: parentPath,
              name: parts[parts.length-2],
              files: [],
              dirs: new Set()
            });
          }
          const parent = newDirMap.get(parentPath);
          if(parent) parent.dirs.add(fullPath);
        }
      }
    }
  }catch(err){
    console.warn('[Playlists] index failed', err);
  }
  
  directoryMap = newDirMap;
  
  const children = Array.from(directoryMap.values()).filter(d => {
    const parts = d.path.split('/').filter(Boolean);
    return parts.length === 2 && parts[0] === ROOT.replace(/^\//,'');
  }).sort((a,b)=> a.name.localeCompare(b.name, undefined, {numeric:true}));
  
  topPlaylists = children.map(c => c.path).filter(p => {
    const entry = directoryMap.get(p);
    return entry && (entry.files.length > 0 || entry.dirs.size > 0);
  });
  
  for(const [k,v] of directoryMap.entries()){
    if(v.files && v.files.length){
      v.files.sort((a,b)=> sortAsc ? a.name.localeCompare(b.name, undefined, {numeric:true}) : b.name.localeCompare(a.name, undefined, {numeric:true}));
    }
  }
  
  console.log('[Playlists] scan complete. playlists:', topPlaylists.length);
  render();
}

function gatherRecursive(dirPath){
  dirPath = normalizePath(dirPath);
  const result = [];
  const stack = [dirPath];
  while(stack.length){
    const d = stack.shift();
    const entry = directoryMap.get(d);
    if(entry){
      (entry.files || []).forEach(f => result.push(f));
      const children = Array.from(entry.dirs).sort();
      children.forEach(c => stack.push(c));
    }
  }
  result.sort((a,b)=> sortAsc ? a.name.localeCompare(b.name, undefined, {numeric:true}) : b.name.localeCompare(a.name, undefined, {numeric:true}));
  return result;
}

function gatherDirect(dirPath){
  dirPath = normalizePath(dirPath);
  const entry = directoryMap.get(dirPath);
  if(!entry || !entry.files) return [];
  const arr = entry.files.filter(f => f.dirPath === dirPath);
  arr.sort((a,b)=> sortAsc ? a.name.localeCompare(b.name, undefined, {numeric:true}) : b.name.localeCompare(a.name, undefined, {numeric:true}));
  return arr;
}

function render(){
  playlistsEl.innerHTML = '';
  if(!topPlaylists.length){
    playlistsEl.innerHTML = '<p style="padding:10px;color:var(--muted)">No playlists found.</p>';
    playlistCountEl.textContent = '0 playlists';
    return;
  }
  
  const q = (searchEl.value || '').trim().toLowerCase();
  
  topPlaylists.forEach(path => {
    const info = directoryMap.get(path) || { path: path, name: path.split('/').filter(Boolean).pop(), files: [], dirs: new Set() };
    const songs = gatherRecursive(path);
    if(!songs.length) return;
    
    if(q){
      const topMatch = info.name.toLowerCase().includes(q);
      const contains = songs.some(s => s.name.toLowerCase().includes(q) || (s.dirPath||'').toLowerCase().includes(q));
      if(!topMatch && !contains) return;
    }
    
    const wrap = document.createElement('div');
    wrap.className = 'playlist';
    wrap.dataset.path = path;
    
    const header = document.createElement('div');
    header.className = 'playlist-header';
    if(openTopPath === path) header.classList.add('open');
    header.dataset.path = path;
    
    const icon = document.createElement('span');
    icon.className = 'icon';
    icon.textContent = '▶';
    
    const name = document.createElement('div');
    name.className = 'name';
    name.textContent = info.name;
    
    const count = document.createElement('div');
    count.className = 'count';
    count.textContent = `${songs.length} tracks`;
    
    header.appendChild(icon);
    header.appendChild(name);
    header.appendChild(count);
    
    const body = document.createElement('div');
    body.className = 'playlist-body';
    if(openTopPath === path){
      body.classList.add('open');
      renderPlaylistBody(path, body);
    }
    
    header.addEventListener('click', ()=> {
      if(openTopPath === path){
        openTopPath = null;
        openSubPath = null;
      } else {
        openTopPath = path;
        openSubPath = null;
      }
      render();
    });
    
    wrap.appendChild(header);
    wrap.appendChild(body);
    playlistsEl.appendChild(wrap);
  });
  
  playlistCountEl.textContent = `${playlistsEl.querySelectorAll('.playlist').length} playlists`;
}

function renderPlaylistBody(topPath, bodyEl){
  bodyEl.innerHTML = '';
  const topEntry = directoryMap.get(topPath) || { path: topPath, files: [], dirs: new Set() };
  const children = Array.from(topEntry.dirs).sort();
  const q = (searchEl.value || '').trim().toLowerCase();
  
  if(children.length){
    children.forEach(childPath => {
      const childTracks = gatherDirect(childPath);
      if(q && !childPath.split('/').pop().toLowerCase().includes(q) && !childTracks.some(t => t.name.toLowerCase().includes(q))) return;
      
      const childName = childPath.split('/').filter(Boolean).pop();
      const card = document.createElement('div');
      card.className = 'folder-card';
      if(openSubPath === childPath) card.classList.add('expanded');
      card.dataset.path = childPath;
      
      const folderEl = document.createElement('div');
      folderEl.className = 'folder';
      if(openSubPath === childPath) folderEl.classList.add('expanded');
      folderEl.dataset.path = childPath;
      
      const nameDiv = document.createElement('div');
      nameDiv.className = 'name';
      nameDiv.textContent = childName;
      
      const metaDiv = document.createElement('div');
      metaDiv.className = 'meta';
      metaDiv.textContent = `${childTracks.length} tracks`;
      
      folderEl.appendChild(nameDiv);
      folderEl.appendChild(metaDiv);
      card.appendChild(folderEl);
      
      folderEl.addEventListener('click', (ev)=> {
        ev.stopPropagation();
        openSubPath = (openSubPath === childPath) ? null : childPath;
        render();
      });
      
      if(openSubPath === childPath){
        const tracks = gatherDirect(childPath);
        const subDiv = document.createElement('div');
        subDiv.className = 'subtracks';
        tracks.forEach(t => {
          if(q && !t.name.toLowerCase().includes(q)) return;
          const tr = document.createElement('div');
          tr.className = 'track';
          if(t.path === currentPlayingPath) tr.classList.add('playing');
          tr.dataset.path = t.path;
          
          const tname = document.createElement('div');
          tname.className = 'track-name';
          tname.textContent = t.name;
          
          const meta = document.createElement('div');
          meta.className = 'meta';
          meta.textContent = '';
          
          const queueBtn = document.createElement('button');
          queueBtn.className = 'add-queue-btn';
          queueBtn.textContent = '+';
          queueBtn.title = 'Add to queue';
          queueBtn.onclick = (e) => {
            e.stopPropagation();
            window.parent.postMessage({
              type: 'ADD_TO_QUEUE',
              payload: t
            }, '*');
          };
          
          tr.appendChild(tname);
          tr.appendChild(meta);
          tr.appendChild(queueBtn);
          
          tr.addEventListener('click', (ev)=> {
            ev.stopPropagation();
            const playlist = gatherDirect(childPath);
            const idx = playlist.findIndex(x => x.path === t.path);
            window.parent.postMessage({
              type: 'PLAY_PLAYLIST',
              payload: {
                tracks: playlist,
                startIndex: idx >= 0 ? idx : 0
              }
            }, '*');
          });
          
          subDiv.appendChild(tr);
        });
        card.appendChild(subDiv);
      }
      
      bodyEl.appendChild(card);
    });
  }
  
  const topFiles = topEntry.files || [];
  if(topFiles && topFiles.length){
    const sorted = topFiles.slice().sort((a,b)=> sortAsc ? a.name.localeCompare(b.name, undefined, {numeric:true}) : b.name.localeCompare(a.name, undefined, {numeric:true}));
    sorted.forEach(t => {
      if(q && !t.name.toLowerCase().includes(q)) return;
      if(t.dirPath !== topPath) return;
      
      const tr = document.createElement('div');
      tr.className = 'track';
      if(t.path === currentPlayingPath) tr.classList.add('playing');
      tr.dataset.path = t.path;
      
      const tname = document.createElement('div');
      tname.className = 'track-name';
      tname.textContent = t.name;
      
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = '';
      
      const queueBtn = document.createElement('button');
      queueBtn.className = 'add-queue-btn';
      queueBtn.textContent = '+';
      queueBtn.onclick = (e) => {
        e.stopPropagation();
        window.parent.postMessage({
          type: 'ADD_TO_QUEUE',
          payload: t
        }, '*');
      };
      
      tr.appendChild(tname);
      tr.appendChild(meta);
      tr.appendChild(queueBtn);
      
      tr.addEventListener('click', (ev)=> {
        ev.stopPropagation();
        const playlist = gatherRecursive(topPath);
        const idx = playlist.findIndex(x => x.path === t.path);
        window.parent.postMessage({
          type: 'PLAY_PLAYLIST',
          payload: {
            tracks: playlist,
            startIndex: idx >= 0 ? idx : 0
          }
        }, '*');
      });
      
      bodyEl.appendChild(tr);
    });
  }
  
  if(bodyEl.children.length === 0){
    const p = document.createElement('p');
    p.style.cssText = 'padding:10px;color:var(--muted)';
    p.textContent = 'No songs here.';
    bodyEl.appendChild(p);
  }
}

searchEl.addEventListener('input', render);

window.addEventListener('message', (event) => {
  const { type, payload } = event.data;
  
  if(type === 'PLAYBACK_UPDATE'){
    currentPlayingPath = payload.currentTrack ? payload.currentTrack.path : null;
    document.querySelectorAll('.track').forEach(track => {
      if(track.dataset.path === currentPlayingPath){
        track.classList.add('playing');
      } else {
        track.classList.remove('playing');
      }
    });
  }
});

scanLibrary();
</script>
</body>
</html>

; mm26-nomad - LILYGO TTGO LoRa32 T3 v1.6.1
; Offline media-distribution captive portal (Nomad mode).
; Sister firmware: stock Meshtastic, flashed to OTA slot 0.

[env:ttgo-lora32-v1]
platform = espressif32
board = ttgo-lora32-v1
framework = arduino
monitor_speed = 115200
upload_speed = 460800

build_flags =
    -D NOMAD_FIRMWARE_NAME=\"mm26-nomad\"
    -D NOMAD_VERSION=\"0.2.0\"

lib_deps =
    esphome/ESPAsyncWebServer-esphome @ ^3.3.0
    esphome/AsyncTCP-esphome @ ^2.1.4
    adafruit/Adafruit SSD1306 @ ^2.5.13
    adafruit/Adafruit GFX Library @ ^1.11.11
